name: Production HA proof

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Production rollout gate
        type: choice
        options: [inventory, desktop-only, laptop-only, failover, laptop-power]
        default: inventory
      drain-wait-minutes:
        description: Hosted wait for the manual desktop drain
        type: choice
        options: ['10', '15', '20', '25']
        default: '20'
      laptop-proof-minutes:
        description: Laptop power-survival heartbeat duration
        type: choice
        options: ['10', '15', '20', '25', '30']
        default: '20'

permissions: {}

concurrency:
  group: production-ha-proof
  cancel-in-progress: false

jobs:
  proof:
    name: Production HA proof
    permissions: {}
    uses: melodic-software/ci-workflows/.github/workflows/production-ha-proof.yml@4e2fe8829bcfd593079346868f13b19364ce3535 # reviewed production HA contract
    with:
      mode: ${{ inputs.mode }}
      observer-client-id: ${{ vars.CI_RUNNER_OBSERVER_CLIENT_ID }}
      drain-wait-minutes: ${{ fromJSON(inputs.drain-wait-minutes) }}
      laptop-proof-minutes: ${{ fromJSON(inputs.laptop-proof-minutes) }}
    secrets:
      observer-private-key: ${{ secrets.CI_RUNNER_OBSERVER_PRIVATE_KEY }}
