name: machine-specific-paths
description: >-
  Reject machine-specific absolute paths (Windows / macOS / Linux user-home and
  repo-checkout roots) in tracked files. Portable placeholders such as
  C:\Users\<user>\ and <repo-root>/ are allowed.

inputs:
  extensions:
    description: >-
      Pathspec allowlist to scan, space-separated globs. Default targets common
      code, config, and docs extensions.
    default: >-
      *.cs *.csproj *.json *.jsonc *.js *.jsx *.md *.props *.ps1 *.psm1 *.py
      *.sh *.slnx *.targets *.toml *.ts *.tsx *.yaml *.yml
  exclude:
    description: >-
      Additional git pathspec exclusions, space-separated (e.g.
      ':(exclude)docs/**'). Appended to the scan. Default none.
    default: ''

runs:
  using: composite
  steps:
    - name: Verify no machine-specific absolute paths
      shell: bash
      env:
        EXTENSIONS: ${{ inputs.extensions }}
        EXCLUDE: ${{ inputs.exclude }}
      run: bash "$GITHUB_ACTION_PATH/check-machine-specific-paths.sh"
