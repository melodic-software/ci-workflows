name: typos
description: Spell-check source code with typos against a caller-supplied config.

inputs:
  paths:
    description: >-
      Files/dirs to check (relative to the caller repo), space-separated.
      Directories recurse. Default checks the whole repo.
    default: '.'
  config:
    description: Path to the typos config (_typos.toml) in the caller repo.
    default: _typos.toml
  exclude:
    description: >-
      Gitignore-syntax globs to skip, space-separated (e.g. intentionally-bad
      fixtures). Additive on top of the config's own extend-exclude and typos'
      defaults, never replacing them.
    default: ''
  format:
    description: >-
      Output format: silent, brief, long, json, or sarif. Empty uses typos'
      default (long). For a code-scanning upload set sarif together with
      report-path, which writes the SARIF to a file (stdout alone is not
      uploadable).
    default: ''
  report-path:
    description: >-
      Path to write the gate pass's output when set (pair with a machine format
      such as sarif). Written before a non-zero exit, so the file exists even
      when typos are found. Empty (the default) prints to the step log.
    default: ''
  annotations:
    description: >-
      Emit GitHub inline PR-diff annotations for each typo (a json pass piped to
      `::warning` workflow commands, ported from crate-ci/typos-action).
      Advisory — the gate pass owns pass/fail. Set false for summary output only.
    default: 'true'
  version:
    description: Exact typos version to install.
    default: 1.48.0
  sha256:
    description: >-
      SHA-256 of the x86_64-unknown-linux-musl .tar.gz release asset for
      `version`. Change together with `version`.
    default: 72a930c9a94fc3914aa56835c5b859c892a797d40c1c42638b98d93f16ff519c

runs:
  using: composite
  steps:
    - name: Install typos
      shell: bash
      env:
        URL: https://github.com/crate-ci/typos/releases/download/v${{ inputs.version }}/typos-v${{ inputs.version }}-x86_64-unknown-linux-musl.tar.gz
        SHA256: ${{ inputs.sha256 }}
        BIN: typos
        ARCHIVE_MEMBER: ./typos
      run: bash "$GITHUB_ACTION_PATH/../_shared/install-release.sh"

    - name: Spell-check
      shell: bash
      env:
        PATHS: ${{ inputs.paths }}
        CONFIG: ${{ inputs.config }}
        EXCLUDE: ${{ inputs.exclude }}
        FORMAT: ${{ inputs.format }}
        REPORT_PATH: ${{ inputs.report-path }}
        ANNOTATIONS: ${{ inputs.annotations }}
      run: |
        set -euo pipefail
        if [[ ! -f "$CONFIG" ]]; then
          echo "::error::typos: config file not found: $CONFIG"
          exit 2
        fi
        args=(--config "$CONFIG")
        # Each exclude is a separate --exclude (repeatable, additive). $EXCLUDE
        # word-splits so multiple globs are honoured; set -f stops bash from
        # pathname-expanding a gitignore-glob (e.g. fixtures/**) before typos.
        set -f
        for e in $EXCLUDE; do args+=(--exclude "$e"); done
        set +f
        # Inline PR annotations: a json pass piped to GitHub `::warning` commands
        # (ports crate-ci/typos-action's format_gh.sh). Advisory — `|| true` so
        # the gate pass below owns pass/fail; col is the 1-based byte offset.
        # $PATHS unquoted so multiple targets word-split.
        if [[ "$ANNOTATIONS" == "true" ]]; then
          typos "${args[@]}" --format json $PATHS 2>/dev/null \
            | jq -r 'select(.type == "typo")
                | "::warning file=\(.path),line=\(.line_num),col=\(.byte_offset + 1)::\"\(.typo)\" should be \"\(.corrections | join("\", \""))\"."' \
            || true
        fi
        # Gate pass: respects the caller's format (default long); its exit fails.
        if [[ -n "${FORMAT// }" ]]; then args+=(--format "$FORMAT"); fi
        # When report-path is set, redirect the formatted report to that file so
        # a caller can upload it (e.g. SARIF). typos still exits non-zero on a
        # finding, and the file is written before that exit, so the gate fails
        # AND the report exists. $PATHS unquoted so multiple targets word-split.
        if [[ -n "${REPORT_PATH// }" ]]; then
          typos "${args[@]}" $PATHS >"$REPORT_PATH"
        else
          typos "${args[@]}" $PATHS
        fi
