name: dotnet-format
description: >-
  Verify C# formatting that the build does not own: whitespace/layout via `dotnet
  format whitespace --verify-no-changes`, and using-directive organization via
  `dotnet format style --diagnostics IDE0055 --verify-no-changes`. The build-time
  analyzers own code-style (IDExxxx) and code-quality (CAxxxx); these two lanes
  cover only formatting and import ordering, so none of the three double-report.

inputs:
  project:
    description: >-
      Project or solution to check (relative to the caller repo). Leave empty to
      use the project/solution in the working directory.
    default: ''
  dotnet-version:
    description: >-
      .NET SDK version to install. Left empty (the default),
      `actions/setup-dotnet` falls back to reading the caller's own
      global.json, so the installed SDK always matches what the caller's repo
      declares instead of a version hardcoded here. Pass an explicit value to
      override that.
    default: ''

runs:
  using: composite
  steps:
    - name: Set up .NET
      id: setup-dotnet
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Set up .NET (fallback — no version or global.json found)
      # setup-dotnet leaves its `dotnet-version` output unset (empty string
      # here) when the `dotnet-version` input is empty AND it can't find a
      # global.json anywhere in the caller's tree: it logs "nothing will be
      # installed" and exits 0 without provisioning an SDK, so the `dotnet
      # format` steps below would otherwise fall through to whatever (if
      # anything) happens to be preinstalled on the runner. Re-run pinned to
      # the same SDK this repo's own root global.json and
      # local-runner-canary.yml's dotnet-version default track, so a caller
      # that never declared a version keeps the exact behaviour it had before
      # dotnet-version's default changed here — bump this value in lockstep
      # with those two.
      if: steps.setup-dotnet.outputs.dotnet-version == ''
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
      with:
        dotnet-version: 10.0.301

    - name: Verify whitespace
      shell: bash
      env:
        PROJECT: ${{ inputs.project }}
      # The `whitespace` subcommand runs only the formatting fixers (no IDE/CA
      # analyzers), so it never double-reports what the build enforces.
      # --verify-no-changes exits non-zero on any file that is not already
      # formatted. $PROJECT is unquoted so an empty value expands to nothing.
      run: dotnet format whitespace $PROJECT --verify-no-changes

    - name: Verify import ordering
      shell: bash
      env:
        PROJECT: ${{ inputs.project }}
      # `dotnet format style` restricted to IDE0055 gates only using-directive
      # organization. The OrganizeImports pass runs regardless of IDE0055's
      # configured severity, and --diagnostics IDE0055 keeps this lane from
      # re-reporting whitespace or any other IDExxxx/CAxxxx rule the build
      # already owns — so the build, whitespace lane, and this lane never
      # double-report.
      run: dotnet format style $PROJECT --diagnostics IDE0055 --verify-no-changes
