name: comment-hygiene
description: >-
  Scan code comments for deferred-work markers (TODO/FIXME/HACK/XXX) and
  issue-tracker references. Uses the bundled organization policy by default;
  callers may supply a complete replacement.

inputs:
  patterns-file:
    description: >-
      Optional path to a complete replacement comment-hygiene policy library in
      the caller repo. Empty uses the policy bundled with this action.
    default: ''
  extensions:
    description: >-
      Pathspec allowlist of code files to scan, space-separated globs.
    default: >-
      *.cs *.ts *.tsx *.js *.jsx *.mjs *.cjs *.mts *.cts *.py *.sh *.ps1
      *.razor *.cshtml
  exclude:
    description: >-
      Additional git pathspec exclusions, space-separated (e.g.
      ':(exclude)docs/**'). Appended to the scan. Default none.
    default: ''

runs:
  using: composite
  steps:
    - name: Scan comment hygiene
      shell: bash
      env:
        PATTERNS_FILE: ${{ inputs.patterns-file }}
        EXTENSIONS: ${{ inputs.extensions }}
        EXCLUDE: ${{ inputs.exclude }}
      run: |
        set -euo pipefail
        patterns_file="$PATTERNS_FILE"
        if [[ -z "${patterns_file// }" ]]; then
          patterns_file="$GITHUB_ACTION_PATH/comment-hygiene-patterns.sh"
        fi
        PATTERNS_FILE="$patterns_file" bash "$GITHUB_ACTION_PATH/scan-tree.sh"
