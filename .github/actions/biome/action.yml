name: biome
description: Lint and format-check JavaScript/TypeScript with Biome against a caller-supplied config.

inputs:
  paths:
    description: >-
      Files/dirs to check (relative to the caller repo), space-separated.
      Directories recurse. Default checks the whole repo. Biome has no CLI
      exclude flag and treats path arguments as literal (no glob/negation), so
      narrow scope here, or via `files.includes` (with `!` negation) in the
      config.
    default: '.'
  config:
    description: >-
      Path to the biome.json ruleset in the caller repo, passed as Biome's
      --config-path.
    default: biome.json
  version:
    description: Exact Biome version to run.
    default: 2.5.4
  node-version:
    description: Node.js version to set up.
    default: 24.18.0

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}

    - name: Lint and format-check
      shell: bash
      env:
        PATHS: ${{ inputs.paths }}
        CONFIG: ${{ inputs.config }}
        VERSION: ${{ inputs.version }}
      # `biome ci` is the read-only CI command — formatter, linter and import
      # sorting in one non-mutating pass. --error-on-warnings makes any warning
      # fail the build (strict posture, the analog of pyright --warnings).
      # --reporter=github emits inline PR annotations. $PATHS is unquoted so
      # multiple targets word-split.
      run: |
        set -euo pipefail

        if [[ ! -f "$CONFIG" ]]; then
          echo "::error::biome: config file not found: $CONFIG"
          exit 2
        fi
        npx --yes "@biomejs/biome@$VERSION" ci --config-path="$CONFIG" --error-on-warnings --reporter=github $PATHS
