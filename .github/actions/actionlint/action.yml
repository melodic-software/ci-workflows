name: actionlint
description: Lint GitHub Actions workflow files with actionlint.

inputs:
  paths:
    description: >-
      Workflow files/dirs to lint, space-separated. Empty (default) lets
      actionlint auto-discover .github/workflows/*.{yml,yaml}.
    default: ''
  config-file:
    description: >-
      Path to an actionlint.yaml config in the caller repo. Empty (default)
      auto-discovers .github/actionlint.yaml if one exists.
    default: ''
  color:
    description: Force colored output (true/false).
    default: 'true'
  version:
    description: Exact actionlint version to install.
    default: 1.7.12
  sha256:
    description: >-
      SHA-256 of the linux_amd64 .tar.gz release asset for `version`. Change
      together with `version`.
    default: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
  shellcheck-version:
    description: >-
      Exact ShellCheck version used by actionlint for embedded bash/sh `run:`
      scripts. Kept in lockstep with the standalone ShellCheck action.
    default: 0.11.0
  shellcheck-sha256:
    description: >-
      SHA-256 of ShellCheck's linux x86_64 release archive for
      `shellcheck-version`. Change together with that version.
    default: b7af85e41cc99489dcc21d66c6d5f3685138f06d34651e6d34b42ec6d54fe6f6

runs:
  using: composite
  steps:
    - name: Install actionlint
      shell: bash
      env:
        URL: https://github.com/rhysd/actionlint/releases/download/v${{ inputs.version }}/actionlint_${{ inputs.version }}_linux_amd64.tar.gz
        SHA256: ${{ inputs.sha256 }}
        BIN: actionlint
        ARCHIVE_MEMBER: actionlint
      run: bash "$GITHUB_ACTION_PATH/../_shared/install-release.sh"

    - name: Install ShellCheck for embedded scripts
      shell: bash
      env:
        URL: https://github.com/koalaman/shellcheck/releases/download/v${{ inputs.shellcheck-version }}/shellcheck-v${{ inputs.shellcheck-version }}.linux.x86_64.tar.gz
        SHA256: ${{ inputs.shellcheck-sha256 }}
        BIN: shellcheck
        ARCHIVE_MEMBER: shellcheck-v${{ inputs.shellcheck-version }}/shellcheck
      run: bash "$GITHUB_ACTION_PATH/../_shared/install-release.sh"

    - name: Lint workflows
      shell: bash
      env:
        PATHS: ${{ inputs.paths }}
        CONFIG_FILE: ${{ inputs.config-file }}
        COLOR: ${{ inputs.color }}
      run: |
        set -euo pipefail
        # ShellCheck is installed above instead of relying on a runner image, so
        # embedded bash/sh `run:` scripts receive identical checks on hosted and
        # self-hosted workers. Pyflakes remains actionlint's optional PATH-based
        # integration; neither supported runner contract preinstalls it.
        args=()
        if [[ "$COLOR" == "true" ]]; then args+=(-color); fi
        if [[ -n "${CONFIG_FILE// }" ]]; then args+=(-config-file "$CONFIG_FILE"); fi
        # $PATHS unquoted so multiple targets word-split; empty appends nothing
        # and actionlint auto-discovers .github/workflows.
        actionlint "${args[@]}" $PATHS
