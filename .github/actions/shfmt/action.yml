name: shfmt
description: Check shell script formatting with shfmt, driven by the repo .editorconfig.

inputs:
  paths:
    description: >-
      Roots to search for shell scripts (*.sh, *.bash), space-separated.
      Empty (the default) runs git-tracked discovery: only files tracked by
      git are checked, so ignored or generated artifacts present in a dirty or
      post-build tree are never gated (mirrors the shellcheck and editorconfig
      actions' git-aware default). Pass explicit roots to opt into a raw
      filesystem walk that does NOT consult .gitignore — checking exactly what
      is found under those roots, including untracked files.
    default: ''
  exclude:
    description: >-
      Path substrings to skip, space-separated (e.g. intentionally-bad
      fixtures). The .git directory is always skipped.
    default: ''
  version:
    description: Exact shfmt version to install.
    default: 3.13.1
  sha256:
    description: >-
      SHA-256 of the linux_amd64 release binary for `version`. Change together
      with `version`.
    default: fb096c5d1ac6beabbdbaa2874d025badb03ee07929f0c9ff67563ce8c75398b1

runs:
  using: composite
  steps:
    - name: Install shfmt
      shell: bash
      env:
        URL: https://github.com/mvdan/sh/releases/download/v${{ inputs.version }}/shfmt_v${{ inputs.version }}_linux_amd64
        SHA256: ${{ inputs.sha256 }}
        BIN: shfmt
      run: bash "$GITHUB_ACTION_PATH/../_shared/install-release.sh"

    - name: Check formatting
      shell: bash
      env:
        PATHS: ${{ inputs.paths }}
        EXCLUDE: ${{ inputs.exclude }}
      run: |
        set -euo pipefail
        if [[ -z "${PATHS// }" ]]; then
          # Git-tracked discovery (default): tracked *.sh/*.bash only, so ignored
          # or generated scripts in a dirty tree are never gated. NUL-delimited so
          # any path is safe; ls-files output is already sorted.
          mapfile -d '' -t files < <(git ls-files -z -- '*.sh' '*.bash')
        else
          # $PATHS unquoted so multiple roots word-split. Explicit roots opt into
          # a raw filesystem walk that does not consult .gitignore.
          mapfile -t files < <(find $PATHS -type f \( -name '*.sh' -o -name '*.bash' \) -not -path '*/.git/*' | sort)
        fi
        # Keep only on-disk files: a sparse checkout leaves tracked-but-absent
        # (skip-worktree) entries that shfmt cannot open.
        present=()
        for f in ${files[@]+"${files[@]}"}; do [[ -f "$f" ]] && present+=("$f"); done
        files=(${present[@]+"${present[@]}"})
        # Drop excluded substrings (space-separated, fixed-string match). The
        # outer guard plus the per-iteration break keep an emptied list from
        # feeding printf a lone newline, which grep -vF would pass back as a
        # spurious empty-string element (length 1, not 0).
        if [[ ${#files[@]} -gt 0 ]]; then
          for sub in $EXCLUDE; do
            mapfile -t files < <(printf '%s\n' "${files[@]}" | grep -vF -- "$sub" || true)
            [[ ${#files[@]} -eq 0 ]] && break
          done
        fi
        if [[ ${#files[@]} -eq 0 ]]; then
          echo 'No shell scripts to check.'
          exit 0
        fi
        printf 'Checking %d file(s):\n' "${#files[@]}"
        printf '  %s\n' "${files[@]}"
        # No formatting flags: shfmt reads each file's .editorconfig for indent
        # width, switch-case indent, and binary-next-line. Passing any -i/-ci/-bn
        # would make shfmt IGNORE .editorconfig entirely, so formatting policy
        # stays externalized in the caller's .editorconfig. -d prints a unified
        # diff and exits non-zero when a file is not already formatted.
        shfmt -d "${files[@]}"
