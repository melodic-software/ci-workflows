name: lychee-offline
description: Deterministic offline link/anchor reference-integrity check via lychee.

inputs:
  globs:
    description: >-
      File globs to scan, space-separated. Default scans all markdown.
    default: '**/*.md'
  config:
    description: Path to the lychee.toml ruleset in the caller repo.
    default: modules/lychee/lychee.toml
  exclude:
    description: >-
      Path-exclude regexes, space-separated (e.g. intentionally-bad fixtures).
      Build/dependency dirs are excluded by the ruleset itself.
    default: ''
  version:
    description: Exact lychee version to install.
    default: 0.24.2
  sha256:
    description: >-
      SHA-256 of the linux x86_64 .tar.gz release asset for `version`. Change
      together with `version`.
    default: 1f4e0ef7f6554a6ed33dd7ac144fb2e1bbed98598e7af973042fc5cd43951c9a

runs:
  using: composite
  steps:
    - name: Install lychee
      shell: bash
      env:
        URL: https://github.com/lycheeverse/lychee/releases/download/lychee-v${{ inputs.version }}/lychee-x86_64-unknown-linux-gnu.tar.gz
        SHA256: ${{ inputs.sha256 }}
        BIN: lychee
        ARCHIVE_MEMBER: lychee-x86_64-unknown-linux-gnu/lychee
        STRIP_COMPONENTS: '1'
      run: bash "$GITHUB_ACTION_PATH/../_shared/install-release.sh"

    - name: Check links (offline)
      shell: bash
      env:
        GLOBS: ${{ inputs.globs }}
        CONFIG: ${{ inputs.config }}
        EXCLUDE: ${{ inputs.exclude }}
      run: |
        set -euo pipefail
        # --offline skips all network requests, so only local file links and
        # (when the ruleset sets include_fragments, as the standard lychee.toml
        # does) #anchors are checked — fully deterministic. lychee's own CLI
        # default for fragment checking is off, so anchor integrity is ruleset-
        # driven; the config is intentionally not overridden here.
        args=(--offline --no-progress --config "$CONFIG")
        # noglob for the rest of the step: $EXCLUDE entries are --exclude-path
        # REGEXES and $GLOBS are lychee's own globs (lychee expands ** itself and
        # documents quoting the pattern). Without set -f, GH Actions bash (globstar
        # off) would pathname-expand both before lychee — mangling `**/*.md` into
        # one-directory-deep matches and expanding regex metacharacters.
        set -f
        for e in $EXCLUDE; do
          args+=(--exclude-path "$e")
        done
        # $GLOBS word-splits into multiple lychee path/glob args (still noglob).
        lychee "${args[@]}" $GLOBS
