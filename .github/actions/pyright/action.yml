name: pyright
description: Type-check Python with Pyright (strict, warnings-as-errors) against a caller-supplied config.

inputs:
  paths:
    description: >-
      Files/dirs to type-check (relative to the caller repo), space-separated.
      Leave empty to let the config's `include` drive discovery (the recommended
      consumer setup); set it to scope a repo whose shipped ruleset carries no
      project-scope keys. Pyright has no CLI exclude — narrow via `paths` here or
      via `exclude` in the config.
    default: ''
  config:
    description: >-
      Path to the pyrightconfig.json ruleset (or its directory) in the caller
      repo, passed as Pyright's --project.
    default: pyrightconfig.json
  warnings-as-errors:
    description: >-
      Treat residual Pyright warnings as build failures (passes --warnings).
      Default true keeps the strict posture; set false to let a ruleset that
      deliberately downgrades rules to "warning" (e.g. reportMissingTypeStubs)
      pass.
    default: 'true'
  version:
    description: Exact Pyright version to run.
    default: 1.1.411
  python-version:
    description: Python version uv provisions for the ephemeral tool environment.
    default: '3.14'

runs:
  using: composite
  steps:
    - name: Set up uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      with:
        python-version: ${{ inputs.python-version }}

    - name: Type-check
      shell: bash
      env:
        PATHS: ${{ inputs.paths }}
        CONFIG: ${{ inputs.config }}
        WARNINGS_AS_ERRORS: ${{ inputs.warnings-as-errors }}
        VERSION: ${{ inputs.version }}
        # Pin the pyright-python wrapper to the requested build exactly. Its
        # "new version available" notice (stderr, exit stays 0) is benign and
        # left unsuppressed so a genuine toolchain change stays visible.
        PYRIGHT_PYTHON_FORCE_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        if [[ ! -e "$CONFIG" ]]; then
          echo "::error::pyright: config path not found: $CONFIG"
          exit 2
        fi
        # --warnings makes residual warnings fail the build (strict posture, the
        # default). Pyright has no native GitHub-annotation output format, so
        # findings are plain text. The flag is a defined (possibly empty) array
        # so unquoted expansion is set -u-safe. $PATHS unquoted so multiple
        # targets word-split; an empty value appends nothing and the config's
        # `include` drives discovery.
        warn=()
        if [[ "$WARNINGS_AS_ERRORS" == "true" ]]; then warn=(--warnings); fi
        uvx "pyright@${VERSION}" "${warn[@]}" -p "$CONFIG" $PATHS
