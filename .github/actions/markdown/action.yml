name: markdown
description: Lint Markdown with markdownlint-cli2 against a caller-supplied config.

inputs:
  globs:
    description: >-
      markdownlint-cli2 glob arguments, space-separated (word-split on the
      runner). Prefix a glob with '!' to exclude. Default lints all markdown.
    default: '**/*.md'
  config:
    description: Path to the markdownlint-cli2 config file in the caller repo.
    default: .markdownlint-cli2.jsonc
  annotations:
    description: >-
      Register a problem matcher so each finding renders as a GitHub inline
      PR-diff annotation (markdownlint-cli2 has no native GitHub formatter; the
      matcher parses its `file:line:col … MD### …` output). Self-contained — no
      change to the caller's config. Set false for summary output only.
    default: 'true'
  version:
    description: Exact markdownlint-cli2 version to run.
    default: 0.23.0
  node-version:
    description: Node.js version to set up.
    default: 24.18.0

runs:
  using: composite
  steps:
    - name: Set up Node
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: ${{ inputs.node-version }}
    - name: Lint markdown
      shell: bash
      env:
        GLOBS: ${{ inputs.globs }}
        CONFIG: ${{ inputs.config }}
        ANNOTATIONS: ${{ inputs.annotations }}
        VERSION: ${{ inputs.version }}
        MATCHER: ${{ github.action_path }}/markdownlint-problem-matcher.json
      run: |
        if [[ ! -f "$CONFIG" ]]; then
          echo "::error::markdown: config file not found: $CONFIG"
          exit 2
        fi
        # Register the matcher so the lint output below is annotated inline;
        # remove it afterwards and exit with the real lint result.
        if [[ "$ANNOTATIONS" == "true" ]]; then echo "::add-matcher::$MATCHER"; fi
        rc=0
        # $GLOBS is unquoted so multiple glob arguments word-split. set -f keeps
        # bash from pathname-expanding them first: GH Actions bash runs with
        # globstar off, so an unquoted `**/*.md` would otherwise collapse to
        # one-directory-deep matches (dropping root-level and deeper files) before
        # markdownlint-cli2 — which expands the globs itself via globby — runs.
        set -f
        npx --yes "markdownlint-cli2@$VERSION" --config "$CONFIG" $GLOBS || rc=$?
        if [[ "$ANNOTATIONS" == "true" ]]; then echo "::remove-matcher owner=markdownlint-cli2::"; fi
        exit $rc
