name: gitleaks
description: Scan a directory for secrets with gitleaks against a caller-supplied config.

inputs:
  path:
    description: Directory or file to scan (relative to the caller repo).
    default: '.'
  scan-mode:
    description: >-
      What to scan: `dir` (the working tree, the default) or `git` (all commits
      reachable from HEAD and every ref under refs/ present locally, including
      refs advertised by the remote and fetched into the checkout, via an
      explicit --all revision set). Git mode requires a valid, non-shallow local
      worktree or repository. Callers must check out with fetch-depth: 0 for
      advertised branch and tag history and fetch every other intended ref;
      hidden, unadvertised, or unfetched remote refs are absent locally and
      cannot be scanned.
    default: dir
  config:
    description: Path to the gitleaks config (.gitleaks.toml) in the caller repo.
    default: .gitleaks.toml
  report-format:
    description: >-
      Report format to emit: json, csv, junit, sarif, or template. Empty emits
      no report file. SARIF enables safe local annotations without uploading an
      artifact. Private callers must not upload it to GitHub code scanning unless
      they have intentionally purchased the required Code Security entitlement.
    default: ''
  report-path:
    description: >-
      Path to write the report when report-format is set. Written before a
      non-zero exit, so it exists even when secrets are found.
    default: ''
  redact:
    description: >-
      Deprecated compatibility input. Secret values are always redacted from
      gitleaks output and reports; false is accepted but cannot disable redaction.
    default: 'true'
  version:
    description: Exact gitleaks version to install.
    default: 8.30.1
  sha256:
    description: >-
      SHA-256 of the linux_x64 .tar.gz release asset for `version`. Change
      together with `version`.
    default: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb

runs:
  using: composite
  steps:
    - name: Install gitleaks
      shell: bash
      env:
        URL: https://github.com/gitleaks/gitleaks/releases/download/v${{ inputs.version }}/gitleaks_${{ inputs.version }}_linux_x64.tar.gz
        SHA256: ${{ inputs.sha256 }}
        BIN: gitleaks
        ARCHIVE_MEMBER: gitleaks
        VERSION_CMD: version
      run: bash "$GITHUB_ACTION_PATH/../_shared/install-release.sh"

    - name: Scan for secrets
      shell: bash
      env:
        PATH_TO_SCAN: ${{ inputs.path }}
        SCAN_MODE: ${{ inputs.scan-mode }}
        CONFIG: ${{ inputs.config }}
        REPORT_FORMAT: ${{ inputs.report-format }}
        REPORT_PATH: ${{ inputs.report-path }}
        REDACT: ${{ inputs.redact }}
      run: bash "$GITHUB_ACTION_PATH/scan.sh"
