name: gitleaks
description: Scan a directory for secrets with gitleaks against a caller-supplied config.

inputs:
  path:
    description: Directory or file to scan (relative to the caller repo).
    default: '.'
  scan-mode:
    description: >-
      What to scan: `dir` (the working tree, the default) or `git` (the full
      commit history). History mode catches secrets that were committed and
      later removed, and requires the caller to check out with fetch-depth: 0.
    default: dir
  config:
    description: Path to the gitleaks config (.gitleaks.toml) in the caller repo.
    default: modules/gitleaks/.gitleaks.toml
  report-format:
    description: >-
      Report format to emit: json, csv, junit, sarif, or template. Empty emits
      no report file. Use sarif together with report-path to feed GitHub code
      scanning; the caller uploads it (security-events: write, if: always()).
    default: ''
  report-path:
    description: >-
      Path to write the report when report-format is set. Written before a
      non-zero exit, so it exists even when secrets are found.
    default: ''
  version:
    description: Exact gitleaks version to install.
    default: 8.30.1
  sha256:
    description: >-
      SHA-256 of the linux_x64 .tar.gz release asset for `version`. Change
      together with `version`.
    default: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb

runs:
  using: composite
  steps:
    - name: Install gitleaks
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        SHA256: ${{ inputs.sha256 }}
      run: |
        set -euo pipefail
        url="https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
        curl -fsSL "$url" -o gitleaks.tar.gz
        echo "${SHA256}  gitleaks.tar.gz" | sha256sum -c -
        tar -xzf gitleaks.tar.gz gitleaks
        sudo install gitleaks /usr/local/bin/gitleaks
        rm -f gitleaks gitleaks.tar.gz
        gitleaks version

    - name: Scan for secrets
      shell: bash
      env:
        PATH_TO_SCAN: ${{ inputs.path }}
        SCAN_MODE: ${{ inputs.scan-mode }}
        CONFIG: ${{ inputs.config }}
        REPORT_FORMAT: ${{ inputs.report-format }}
        REPORT_PATH: ${{ inputs.report-path }}
      run: |
        set -euo pipefail
        # `dir` scans the working tree at the given path; `git` scans the commit
        # history of the repo rooted at that path. Both take the path as the
        # positional source argument.
        case "$SCAN_MODE" in
          dir | git) ;;
          *) echo "::error::gitleaks: invalid scan-mode '$SCAN_MODE' (expected dir or git)"; exit 1 ;;
        esac
        args=("$SCAN_MODE" "$PATH_TO_SCAN" --config "$CONFIG" --no-banner)
        if [[ -n "${REPORT_FORMAT// }" ]]; then args+=(--report-format "$REPORT_FORMAT"); fi
        if [[ -n "${REPORT_PATH// }" ]]; then args+=(--report-path "$REPORT_PATH"); fi
        gitleaks "${args[@]}"
