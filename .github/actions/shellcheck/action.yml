name: shellcheck
description: Lint shell scripts with ShellCheck against a caller-supplied rcfile.

inputs:
  paths:
    description: >-
      Roots to search for shell scripts (*.sh, *.bash), space-separated.
      Empty (the default) runs git-tracked discovery: only files tracked by
      git are linted, so ignored or generated artifacts present in a dirty or
      post-build tree are never gated (mirrors the editorconfig action's
      git-aware default). Pass explicit roots to opt into a raw filesystem walk
      that does NOT consult .gitignore — checking exactly what is found under
      those roots, including untracked files.
    default: ''
  rcfile:
    description: Path to the .shellcheckrc ruleset in the caller repo.
    default: modules/shellcheck/.shellcheckrc
  exclude:
    description: >-
      Path substrings to skip, space-separated (e.g. intentionally-bad
      fixtures). The .git directory is always skipped.
    default: ''
  severity:
    description: >-
      Minimum severity to report and fail on: error, warning, info, or style.
      Empty (the default) omits --severity, so ShellCheck applies its own
      default (style) and reports everything. Set e.g. warning to ignore
      info/style findings. Not expressible via the rcfile, hence an input.
    default: ''
  version:
    description: Exact ShellCheck version to install.
    default: 0.11.0
  sha256:
    description: >-
      SHA-256 of the linux x86_64 .tar.gz release asset for `version`. Change
      together with `version`.
    default: b7af85e41cc99489dcc21d66c6d5f3685138f06d34651e6d34b42ec6d54fe6f6

runs:
  using: composite
  steps:
    - name: Install ShellCheck
      shell: bash
      env:
        URL: https://github.com/koalaman/shellcheck/releases/download/v${{ inputs.version }}/shellcheck-v${{ inputs.version }}.linux.x86_64.tar.gz
        SHA256: ${{ inputs.sha256 }}
        BIN: shellcheck
        ARCHIVE_MEMBER: shellcheck-v${{ inputs.version }}/shellcheck
      run: bash "$GITHUB_ACTION_PATH/../_shared/install-release.sh"

    - name: Run ShellCheck
      shell: bash
      env:
        PATHS: ${{ inputs.paths }}
        RCFILE: ${{ inputs.rcfile }}
        EXCLUDE: ${{ inputs.exclude }}
        SEVERITY: ${{ inputs.severity }}
      run: |
        set -euo pipefail
        if [[ -z "${PATHS// }" ]]; then
          # Git-tracked discovery (default): tracked *.sh/*.bash only, so ignored
          # or generated scripts in a dirty tree are never gated. NUL-delimited so
          # any path is safe; ls-files output is already sorted.
          mapfile -d '' -t files < <(git ls-files -z -- '*.sh' '*.bash')
        else
          # $PATHS unquoted so multiple roots word-split. Explicit roots opt into
          # a raw filesystem walk that does not consult .gitignore.
          mapfile -t files < <(find $PATHS -type f \( -name '*.sh' -o -name '*.bash' \) -not -path '*/.git/*' | sort)
        fi
        # Keep only on-disk files: a sparse checkout leaves tracked-but-absent
        # (skip-worktree) entries that ShellCheck cannot open.
        present=()
        for f in ${files[@]+"${files[@]}"}; do [[ -f "$f" ]] && present+=("$f"); done
        files=(${present[@]+"${present[@]}"})
        # Drop excluded substrings (space-separated, fixed-string match). The
        # outer guard plus the per-iteration break keep an emptied list from
        # feeding printf a lone newline, which grep -vF would pass back as a
        # spurious empty-string element (length 1, not 0).
        if [[ ${#files[@]} -gt 0 ]]; then
          for sub in $EXCLUDE; do
            mapfile -t files < <(printf '%s\n' "${files[@]}" | grep -vF -- "$sub" || true)
            [[ ${#files[@]} -eq 0 ]] && break
          done
        fi
        if [[ ${#files[@]} -eq 0 ]]; then
          echo 'No shell scripts to check.'
          exit 0
        fi
        printf 'Checking %d file(s):\n' "${#files[@]}"
        printf '  %s\n' "${files[@]}"
        args=(--rcfile="$RCFILE")
        # Empty severity omits the flag, leaving ShellCheck's own default (style).
        if [[ -n "${SEVERITY// }" ]]; then args+=(--severity="$SEVERITY"); fi
        shellcheck "${args[@]}" "${files[@]}"
