name: powershell
description: Analyze PowerShell exactly once per file with fail-closed PSScriptAnalyzer handling.

inputs:
  paths:
    description: >-
      Files/dirs to analyze (relative to the caller repo), space-separated.
      Directories recurse. Empty (the default) runs git-tracked discovery: only
      *.ps1/*.psm1 files tracked by git are analyzed, so ignored or generated
      scripts in a dirty or post-build tree are never gated (mirrors the
      editorconfig/shellcheck git-aware default). Pass explicit paths to opt into
      a raw filesystem walk that does NOT consult .gitignore.
    default: ''
  settings:
    description: Path to the PSScriptAnalyzerSettings.psd1 ruleset in the caller repo.
    default: PSScriptAnalyzerSettings.psd1
  exclude:
    description: >-
      Path substrings to skip, space-separated (e.g. intentionally-bad
      fixtures). The .git directory is always skipped.
    default: ''
  fail-on-no-files:
    description: >-
      Fail (exit 1) when no .ps1/.psm1 files are found instead of passing.
      Default false. Set true as a tripwire where a sparse-checkout or path
      mistake would otherwise silently pass the gate on zero files. Only applies
      when PSScriptAnalyzer is installed (a missing analyzer still self-skips).
    default: 'false'
  analyzer-version:
    description: Exact PSScriptAnalyzer version to install and require.
    default: 1.25.0

runs:
  using: composite
  steps:
    - name: Ensure PSScriptAnalyzer
      shell: pwsh
      env:
        REQUIRED: ${{ inputs.analyzer-version }}
      run: |
        $required = $env:REQUIRED
        $have = Get-Module -ListAvailable PSScriptAnalyzer |
            Where-Object { $_.Version -eq [version]$required }
        if (-not $have) {
            try {
                Install-Module PSScriptAnalyzer -RequiredVersion $required -Scope CurrentUser -Force -SkipPublisherCheck -ErrorAction Stop
            } catch {
                Install-PSResource PSScriptAnalyzer -Version $required -Scope CurrentUser -TrustRepository -Reinstall -ErrorAction Stop
            }
        }
        Import-Module PSScriptAnalyzer -RequiredVersion $required -ErrorAction Stop
        Write-Output "PSScriptAnalyzer $((Get-Module PSScriptAnalyzer).Version) on pwsh $($PSVersionTable.PSVersion)"

    - name: Analyze
      shell: pwsh
      env:
        PATHS: ${{ inputs.paths }}
        SETTINGS: ${{ inputs.settings }}
        EXCLUDE: ${{ inputs.exclude }}
        FAIL_ON_NO_FILES: ${{ inputs.fail-on-no-files }}
        REQUIRED: ${{ inputs.analyzer-version }}
        ACTION_PATH: ${{ github.action_path }}
      run: |
        if (-not (Test-Path -LiteralPath $env:SETTINGS -PathType Leaf)) {
            Write-Output "::error::powershell: settings file not found: $($env:SETTINGS)"
            exit 2
        }
        # Wrap in @() so an empty input stays an empty array, never $null
        # (a bare null would violate the runner's non-null parameter contract).
        $paths = @($env:PATHS -split '\s+' | Where-Object { $_ })
        $exclude = @($env:EXCLUDE -split '\s+' | Where-Object { $_ })
        $failOnNoFiles = $env:FAIL_ON_NO_FILES -eq 'true'
        & "$env:ACTION_PATH/Invoke-Pssa.ps1" -Path $paths -Settings $env:SETTINGS -ExcludePath $exclude -FailOnNoFiles:$failOnNoFiles -AnalyzerVersion $env:REQUIRED
        exit $LASTEXITCODE
