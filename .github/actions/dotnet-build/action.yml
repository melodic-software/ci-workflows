name: dotnet-build
description: >-
  Build .NET projects with Roslyn analyzers and code-style enforced as
  warnings-as-errors — the analysis owner (code-quality CAxxxx + code-style
  IDExxxx + nullable + compiler warnings). Whitespace is owned by dotnet-format.

inputs:
  project:
    description: >-
      Project or solution to build (relative to the caller repo). Leave empty to
      build the project/solution in the working directory.
    default: ''
  configuration:
    description: Build configuration passed to `dotnet build --configuration`.
    default: Release
  dotnet-version:
    description: >-
      .NET SDK version to install. The strict analyzer + code-style ruleset is
      supplied by the caller's copied Directory.Build.props + .globalconfig
      (standards modules/dotnet), which MSBuild discovers by walking the tree;
      this action only provisions the SDK and runs the build.
    default: 10.0.301
  locked-mode:
    description: >-
      Restore in NuGet locked mode (RestoreLockedMode=true): a committed
      packages.lock.json that no longer matches the project dependencies fails
      the build with NU1004 instead of silently re-resolving, so the lock file
      OSV-Scanner reads stays the exact dependency set the build used. The
      default is safe for every caller — locked mode only engages where
      lock-file usage is enabled (RestorePackagesWithLockFile or a committed
      packages.lock.json) and is a no-op elsewhere. Set false only to unblock a
      drifted lock file temporarily; the durable fix is regenerating it with
      `dotnet restore --force-evaluate` and committing the result.
    default: 'true'

runs:
  using: composite
  steps:
    - name: Set up .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
      with:
        dotnet-version: ${{ inputs.dotnet-version }}

    - name: Build
      shell: bash
      env:
        PROJECT: ${{ inputs.project }}
        CONFIGURATION: ${{ inputs.configuration }}
        LOCKED_MODE: ${{ inputs.locked-mode }}
      # Warnings-as-errors lives in the caller's Directory.Build.props
      # (TreatWarningsAsErrors), which Roslyn honours for both compiler and
      # analyzer (CA + IDE) diagnostics — so no rule flags are needed here.
      # RestoreLockedMode rides the build's implicit restore as an MSBuild
      # property, so there is no separate restore step to drift from the build.
      # $PROJECT is unquoted so an empty value expands to nothing and the
      # working-directory project/solution is built.
      run: |
        set -euo pipefail
        args=(--configuration "$CONFIGURATION" --nologo)
        if [[ "$LOCKED_MODE" == 'true' ]]; then
          args+=(-p:RestoreLockedMode=true)
        fi
        dotnet build $PROJECT "${args[@]}"
