version: 2
updates:
  # Keep SHA-pinned actions current. Review every PR before merge; never
  # auto-merge (a SHA bump is executable CI logic). The "/" target scans
  # .github/workflows; the glob target is required to also scan the composite
  # actions' own action.yml files (Dependabot does not descend into
  # .github/actions/<name>/ from "/" alone).
  #
  # Dependabot only updates `uses:` action SHAs. The tool versions pinned inside
  # the actions' run scripts and input defaults have no ecosystem manifest here
  # and are tracked manually at the weekly review.
  - package-ecosystem: github-actions
    directories:
      - /
      - /.github/actions/*
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: build
    # Delay version bumps so a compromised or yanked release is caught before we
    # adopt it; security updates bypass cooldown. Defense-in-depth for the
    # SHA-rewrite supply-chain risk that motivates SHA-pinning (architecture D5).
    cooldown:
      default-days: 7
    # Collapse all action bumps into a single PR to cut review noise.
    groups:
      github-actions:
        patterns:
          - '*'
