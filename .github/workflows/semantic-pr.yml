name: semantic-pr

# Reusable workflow — validates that the pull request TITLE follows the
# Conventional Commits spec (https://www.conventionalcommits.org). GATING by
# design: a non-conforming title fails the job, so a caller that requires this
# check blocks the merge until the title is fixed.
#
# Why the title (not the commits): governed repos are squash-merge-only with the
# squash commit title set to PR_TITLE, so the PR title becomes the subject line
# on the default branch. Enforcing Conventional Commits here is therefore the
# single lever that produces a Conventional-Commits history — branch commits are
# squashed away and need no separate commit-msg hook.
#
# The caller owns the triggers and must include `edited` so a re-titled PR
# re-validates; see the consumer-side caller example in the README. This is a
# standalone required check, NOT a ci-status lane: title edits should not re-run
# the file-lint lanes, so it lives in its own thin caller workflow.
on:
  workflow_call:
    inputs:
      types:
        description: >-
          Allowed Conventional Commits types (newline-delimited regex patterns,
          auto-wrapped in `^ $`). Empty uses the action's spec-aligned defaults
          (build, chore, ci, docs, feat, fix, perf, refactor, revert, style,
          test).
        type: string
        default: ''
      scopes:
        description: >-
          Allowed scopes (newline-delimited regex patterns). Empty allows any
          scope.
        type: string
        default: ''
      require-scope:
        description: Require a scope to always be present in the title.
        type: boolean
        default: false
      subject-pattern:
        description: >-
          Optional regex the subject must match (e.g. `^(?![A-Z]).+$` to forbid
          a leading uppercase). Empty disables the extra subject check.
        type: string
        default: ''
      subject-pattern-error:
        description: >-
          Error message shown when `subject-pattern` does not match; the
          `subject` and `title` variables are interpolated.
        type: string
        default: ''
      validate-single-commit:
        description: >-
          Also validate the lone commit message on single-commit PRs. Off by
          default: governed repos set the squash title to PR_TITLE, so the
          branch commit never becomes the subject and validating it would fail a
          one-commit PR with a valid title for no gain. Enable it only on repos
          that squash from the commit message rather than PR_TITLE.
        type: boolean
        default: false
      ignore-labels:
        description: >-
          Skip validation when the PR carries one of these labels
          (newline-delimited). Add `labeled`/`unlabeled` to the caller's
          triggers to re-validate on label changes.
        type: string
        default: ''

permissions:
  pull-requests: read

jobs:
  pr-title:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Validate PR title against Conventional Commits
        # Runs on both `pull_request` AND `pull_request_target`, skipping only the
        # merge queue. Guarding on `!= 'merge_group'` (not `== 'pull_request'`) is
        # load-bearing: a caller on `pull_request_target` (base-branch definition,
        # so a head-branch edit to the caller cannot bypass the gate) must still
        # reach this step. An `== 'pull_request'` guard would skip it there, the job
        # would pass vacuously, and the gate would be silently disabled.
        # Merge-queue safe: a caller that also triggers on `merge_group` (required
        # for repos with a merge queue, or the required check never reports and the
        # queue deadlocks) reaches this job with no PR context. The title was
        # already validated when the PR was opened/edited, so on `merge_group` this
        # step is skipped and the job succeeds, reporting the required check.
        if: ${{ github.event_name != 'merge_group' }}
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          types: ${{ inputs.types }}
          scopes: ${{ inputs.scopes }}
          requireScope: ${{ inputs.require-scope }}
          subjectPattern: ${{ inputs.subject-pattern }}
          subjectPatternError: ${{ inputs.subject-pattern-error }}
          validateSingleCommit: ${{ inputs.validate-single-commit }}
          ignoreLabels: ${{ inputs.ignore-labels }}
