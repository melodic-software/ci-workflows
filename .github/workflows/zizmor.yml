name: zizmor

# Reusable workflow — GitHub Actions security/static analysis with zizmor
# (supply-chain risks, dangerous triggers, excessive permissions, template
# injection). zizmor runs in its own native --format=github mode: it emits a
# GitHub annotation for every finding directly (no SARIF intermediate, no
# hand-rolled parser) and reports its own graduated exit code keyed to the
# highest severity found (11 informational, 12 low, 13 medium, 14 high).
# ADVISORY by default (fail-on-severity: never): findings annotate without
# blocking. Callers opt in to blocking by raising fail-on-severity to low,
# medium, or high; the legacy fail-on-findings boolean stays a back-compat
# alias for low (blocks on any finding, informational and up — zizmor's own
# note-level docs: https://docs.zizmor.sh/usage/). Uploading SARIF to the
# Security tab remains a separate, later decision; it would add the matching
# security-events: write permission, so this lane needs only contents: read.
# The ci-status gateway stays consumer-local — this is a lane, not the
# gateway.
on:
  workflow_call:
    inputs:
      runner:
        description: Runner label selected by the caller.
        type: string
        default: ubuntu-24.04
      paths:
        description: >-
          Whitespace-separated paths to audit. zizmor discovers workflow and
          composite-action definitions under them.
        type: string
        default: .github/workflows
      version:
        description: >-
          Exact zizmor CLI version, 1.6.0 or newer (this workflow's
          --format=github invocation requires it). 'latest' is a
          compatibility alias for the workflow's reviewed default, never a
          mutable download.
        type: string
        default: v1.27.0
      sha256:
        description: >-
          SHA-256 of the x86_64-unknown-linux-gnu release archive. Change
          together with version.
        type: string
        default: 277f2bd8fd37cf60c42ab7afca6faa884e65440fa31e02b44bdaae60f62a358f
      online-audits:
        description: Run online audits (uses the workflow token).
        type: boolean
        default: true
      persona:
        description: 'Audit persona: regular, pedantic, or auditor.'
        type: string
        default: regular
      fail-on-severity:
        description: >-
          Blocking threshold: one of never, low, medium, or high. When above
          'never', the job fails on zizmor's own graduated exit code for any
          finding at or above that severity (low also blocks on
          informational-level findings, matching zizmor's note-level
          annotation kind — see https://docs.zizmor.sh/usage/). Default
          'never' keeps the lane advisory. Takes precedence over
          fail-on-findings.
        type: string
        default: never
      fail-on-findings:
        description: >-
          Back-compat alias. When true and fail-on-severity is 'never', the job
          blocks on any finding (equivalent to fail-on-severity: low). Prefer
          fail-on-severity. Default false keeps the lane advisory.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        shell: bash
        env:
          PATHS: ${{ inputs.paths }}
          REQUESTED_VERSION: ${{ inputs.version }}
          EXPECTED_SHA256: ${{ inputs.sha256 }}
          ONLINE_AUDITS: ${{ inputs.online-audits }}
          PERSONA: ${{ inputs.persona }}
          FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
          FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
          ZIZMOR_TOKEN: ${{ github.token }}
          PINNED_VERSION: 1.27.0
          ASSET_NAME: zizmor-x86_64-unknown-linux-gnu.tar.gz
        run: |
          set -euo pipefail

          # Keep the token out of curl/tar's environment. It is exported only
          # to the already checksum-verified zizmor process below.
          token=$ZIZMOR_TOKEN
          unset ZIZMOR_TOKEN

          if [[ "${RUNNER_OS:-}" != Linux || "${RUNNER_ARCH:-}" != X64 ]]; then
            echo '::error::The native zizmor release requires a Linux X64 runner.'
            exit 2
          fi

          case "$REQUESTED_VERSION" in
            latest) resolved_version=$PINNED_VERSION ;;
            *)
              resolved_version=${REQUESTED_VERSION#v}
              if [[ ! "$resolved_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "::error::zizmor version must be 'latest' or an exact X.Y.Z version."
                exit 2
              fi
              ;;
          esac
          # --format=github was added in zizmor v1.6.0; a caller-pinned older
          # version would otherwise fail argument parsing well past this
          # point, so reject it here with a clear reason.
          IFS='.' read -r zizmor_major zizmor_minor _ <<<"$resolved_version"
          if ((zizmor_major < 1 || (zizmor_major == 1 && zizmor_minor < 6))); then
            echo "::error::zizmor version must be 1.6.0 or newer (this workflow requires --format=github, added in v1.6.0)."
            exit 2
          fi
          if [[ ! "$EXPECTED_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo '::error::zizmor sha256 must be exactly 64 lowercase hexadecimal characters.'
            exit 2
          fi
          case "$ONLINE_AUDITS:$FAIL_ON_FINDINGS" in
            true:true|true:false|false:true|false:false) ;;
            *)
              echo '::error::zizmor boolean inputs must resolve to true or false.'
              exit 2
              ;;
          esac
          case "$FAIL_ON_SEVERITY" in
            never|low|medium|high) ;;
            *)
              echo '::error::zizmor fail-on-severity must be never, low, medium, or high.'
              exit 2
              ;;
          esac

          work_dir=$(mktemp -d "${RUNNER_TEMP:?}/zizmor.XXXXXX")
          trap 'rm -rf -- "$work_dir"' EXIT
          archive="$work_dir/$ASSET_NAME"
          url="https://github.com/zizmorcore/zizmor/releases/download/v${resolved_version}/${ASSET_NAME}"
          curl --fail --show-error --location --proto '=https' \
            --proto-redir '=https' --tlsv1.2 \
            --connect-timeout 10 --max-time 120 \
            --retry 2 --retry-max-time 300 \
            --output "$archive" "$url"
          printf '%s  %s\n' "$EXPECTED_SHA256" "$archive" \
            | sha256sum --check --strict -
          tar --extract --gzip --file="$archive" --directory="$work_dir" \
            --no-same-owner zizmor
          binary="$work_dir/zizmor"
          if [[ ! -x "$binary" ]]; then
            echo '::error::Verified zizmor archive did not contain an executable zizmor binary.'
            exit 2
          fi
          version_output=$("$binary" --version)
          actual_version=${version_output##* }
          if [[ "$actual_version" != "$resolved_version" ]]; then
            echo "::error::Expected zizmor $resolved_version, got $version_output."
            exit 2
          fi
          mkdir -- "$work_dir/cache"

          normalized_paths=${PATHS//$'\n'/ }
          targets=()
          read -r -a targets <<< "$normalized_paths"
          if [[ ${#targets[@]} -eq 0 ]]; then
            echo '::error::zizmor paths must contain at least one input.'
            exit 2
          fi

          # Resolve the effective blocking threshold: fail-on-severity wins when
          # above 'never'; otherwise the legacy fail-on-findings boolean maps
          # true to low and false to never.
          if [[ "$FAIL_ON_SEVERITY" != never ]]; then
            effective_severity=$FAIL_ON_SEVERITY
          elif [[ "$FAIL_ON_FINDINGS" == true ]]; then
            effective_severity=low
          else
            effective_severity=never
          fi

          args=(
            --format=github
            "--persona=$PERSONA"
            --color=never
            "--cache-dir=$work_dir/cache"
          )
          if [[ "$ONLINE_AUDITS" == false ]]; then
            args+=(--no-online-audits)
          fi

          # --format=github emits native ::error/::warning/::notice workflow
          # commands to stdout for every finding, so the run must stream
          # straight through (tee, not a redirect) for the runner to parse
          # them as annotations; a captured copy lets the summary line below
          # count them without re-parsing zizmor's own output format. zizmor
          # then exits with its own graduated code keyed to the highest
          # severity found: 0 none, 11 informational, 12 low, 13 medium, 14
          # high (https://docs.zizmor.sh/usage/#exit-codes). Any other
          # nonzero code is a download, argument, or collection failure,
          # which fails closed rather than trusting a partial result.
          annotations="$work_dir/zizmor-annotations.txt"
          set +e
          GH_TOKEN="$token" "$binary" "${args[@]}" -- "${targets[@]}" | tee -- "$annotations"
          status=${PIPESTATUS[0]}
          set -e
          unset token

          case "$status" in
          0 | 11 | 12 | 13 | 14) ;;
          *)
            echo "::error::zizmor exited $status; results are not trusted."
            exit 2
            ;;
          esac

          # The blocking threshold maps directly onto zizmor's own graduated
          # exit codes. 'low' blocks on any finding (11-14), matching the
          # legacy fail-on-findings alias and zizmor's note-level annotation
          # grouping of informational and low together; 'medium' blocks on
          # 13-14; 'high' blocks only on 14.
          blocking=false
          case "$effective_severity" in
          never) ;;
          low)
            if ((status >= 11)); then blocking=true; fi
            ;;
          medium)
            if ((status >= 13)); then blocking=true; fi
            ;;
          high)
            if ((status == 14)); then blocking=true; fi
            ;;
          *)
            echo '::error::fail-on-severity must resolve to never, low, medium, or high.'
            exit 2
            ;;
          esac

          total_count=$(grep -c '^::' -- "$annotations" || true)

          if [[ "$blocking" == true ]]; then
            echo "::error::zizmor reported $total_count finding(s) at or above severity $effective_severity."
            exit 1
          fi

          if ((total_count == 0)); then
            echo 'zizmor completed with no findings.'
          elif [[ "$effective_severity" == never ]]; then
            echo "::notice::zizmor reported $total_count finding(s); advisory mode keeps this lane successful."
          else
            echo "::notice::zizmor reported $total_count finding(s); none at or above severity $effective_severity."
          fi
