name: zizmor

# Reusable workflow — GitHub Actions security/static analysis with zizmor
# (supply-chain risks, dangerous triggers, excessive permissions, template
# injection). zizmor runs in SARIF mode; a bundled guard emits a PR annotation
# for every finding and gates the job on severity. ADVISORY by default
# (fail-on-severity: never): findings annotate without blocking. Callers opt in
# to blocking by raising fail-on-severity to low, medium, or high (mapped to the
# SARIF note/warning/error levels); the legacy fail-on-findings boolean stays a
# back-compat alias for low. Uploading SARIF to the Security tab remains a
# separate, later decision; it would add the matching security-events: write
# permission, so this lane needs only contents: read. The ci-status gateway
# stays consumer-local — this is a lane, not the gateway.
on:
  workflow_call:
    inputs:
      runner:
        description: Runner label selected by the caller.
        type: string
        default: ubuntu-24.04
      paths:
        description: >-
          Whitespace-separated paths to audit. zizmor discovers workflow and
          composite-action definitions under them.
        type: string
        default: .github/workflows
      version:
        description: >-
          Exact zizmor CLI version. 'latest' is a compatibility alias for the
          workflow's reviewed default, never a mutable download.
        type: string
        default: v1.27.0
      sha256:
        description: >-
          SHA-256 of the x86_64-unknown-linux-gnu release archive. Change
          together with version.
        type: string
        default: 277f2bd8fd37cf60c42ab7afca6faa884e65440fa31e02b44bdaae60f62a358f
      online-audits:
        description: Run online audits (uses the workflow token).
        type: boolean
        default: true
      persona:
        description: 'Audit persona: regular, pedantic, or auditor.'
        type: string
        default: regular
      fail-on-severity:
        description: >-
          Blocking threshold: one of never, low, medium, or high. When above
          'never', the job fails on any finding at or above that severity
          (high maps to SARIF error, medium to warning, low to note). Default
          'never' keeps the lane advisory. Takes precedence over
          fail-on-findings.
        type: string
        default: never
      fail-on-findings:
        description: >-
          Back-compat alias. When true and fail-on-severity is 'never', the job
          blocks on any finding (equivalent to fail-on-severity: low). Prefer
          fail-on-severity. Default false keeps the lane advisory.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  zizmor:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run zizmor
        shell: bash
        env:
          PATHS: ${{ inputs.paths }}
          REQUESTED_VERSION: ${{ inputs.version }}
          EXPECTED_SHA256: ${{ inputs.sha256 }}
          ONLINE_AUDITS: ${{ inputs.online-audits }}
          PERSONA: ${{ inputs.persona }}
          FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
          FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
          ZIZMOR_TOKEN: ${{ github.token }}
          PINNED_VERSION: 1.27.0
          ASSET_NAME: zizmor-x86_64-unknown-linux-gnu.tar.gz
        run: |
          set -euo pipefail

          # Keep the token out of curl/tar's environment. It is exported only
          # to the already checksum-verified zizmor process below.
          token=$ZIZMOR_TOKEN
          unset ZIZMOR_TOKEN

          if [[ "${RUNNER_OS:-}" != Linux || "${RUNNER_ARCH:-}" != X64 ]]; then
            echo '::error::The native zizmor release requires a Linux X64 runner.'
            exit 2
          fi

          case "$REQUESTED_VERSION" in
            latest) resolved_version=$PINNED_VERSION ;;
            *)
              resolved_version=${REQUESTED_VERSION#v}
              if [[ ! "$resolved_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "::error::zizmor version must be 'latest' or an exact X.Y.Z version."
                exit 2
              fi
              ;;
          esac
          if [[ ! "$EXPECTED_SHA256" =~ ^[0-9a-f]{64}$ ]]; then
            echo '::error::zizmor sha256 must be exactly 64 lowercase hexadecimal characters.'
            exit 2
          fi
          case "$ONLINE_AUDITS:$FAIL_ON_FINDINGS" in
            true:true|true:false|false:true|false:false) ;;
            *)
              echo '::error::zizmor boolean inputs must resolve to true or false.'
              exit 2
              ;;
          esac
          case "$FAIL_ON_SEVERITY" in
            never|low|medium|high) ;;
            *)
              echo '::error::zizmor fail-on-severity must be never, low, medium, or high.'
              exit 2
              ;;
          esac

          work_dir=$(mktemp -d "${RUNNER_TEMP:?}/zizmor.XXXXXX")
          trap 'rm -rf -- "$work_dir"' EXIT
          archive="$work_dir/$ASSET_NAME"
          url="https://github.com/zizmorcore/zizmor/releases/download/v${resolved_version}/${ASSET_NAME}"
          curl --fail --show-error --location --proto '=https' \
            --proto-redir '=https' --tlsv1.2 \
            --connect-timeout 10 --max-time 120 \
            --retry 2 --retry-max-time 300 \
            --output "$archive" "$url"
          printf '%s  %s\n' "$EXPECTED_SHA256" "$archive" \
            | sha256sum --check --strict -
          tar --extract --gzip --file="$archive" --directory="$work_dir" \
            --no-same-owner zizmor
          binary="$work_dir/zizmor"
          if [[ ! -x "$binary" ]]; then
            echo '::error::Verified zizmor archive did not contain an executable zizmor binary.'
            exit 2
          fi
          version_output=$("$binary" --version)
          actual_version=${version_output##* }
          if [[ "$actual_version" != "$resolved_version" ]]; then
            echo "::error::Expected zizmor $resolved_version, got $version_output."
            exit 2
          fi
          mkdir -- "$work_dir/cache"

          normalized_paths=${PATHS//$'\n'/ }
          targets=()
          read -r -a targets <<< "$normalized_paths"
          if [[ ${#targets[@]} -eq 0 ]]; then
            echo '::error::zizmor paths must contain at least one input.'
            exit 2
          fi

          sarif="$work_dir/zizmor.sarif"
          args=(
            --format=sarif
            "--persona=$PERSONA"
            --color=never
            "--cache-dir=$work_dir/cache"
          )
          if [[ "$ONLINE_AUDITS" == false ]]; then
            args+=(--no-online-audits)
          fi

          # SARIF mode emits the document to stdout and exits 0; a nonzero code
          # is a download, argument, or collection failure, which the guard
          # treats as an infrastructure error. Redirect the report to a file and
          # capture the exit code for the guard to validate.
          set +e
          GH_TOKEN="$token" "$binary" "${args[@]}" -- "${targets[@]}" >"$sarif"
          status=$?
          set -e
          unset token

          # Resolve the effective blocking threshold: fail-on-severity wins when
          # above 'never'; otherwise the legacy fail-on-findings boolean maps
          # true to low and false to never.
          if [[ "$FAIL_ON_SEVERITY" != never ]]; then
            effective_severity=$FAIL_ON_SEVERITY
          elif [[ "$FAIL_ON_FINDINGS" == true ]]; then
            effective_severity=low
          else
            effective_severity=never
          fi

          ZIZMOR_EXIT_CODE=$status
          ZIZMOR_SARIF=$sarif
          ZIZMOR_VERSION=$resolved_version
          FAIL_ON_SEVERITY=$effective_severity
          export ZIZMOR_EXIT_CODE ZIZMOR_SARIF ZIZMOR_VERSION FAIL_ON_SEVERITY
          # BEGIN GENERATED ZIZMOR SARIF GUARD - DO NOT EDIT
          # Source: .github/scripts/zizmor-sarif-guard.sh
          # shellcheck shell=bash
          set -euo pipefail

          : "${ZIZMOR_EXIT_CODE:?ZIZMOR_EXIT_CODE is required}"
          : "${ZIZMOR_SARIF:?ZIZMOR_SARIF is required}"
          : "${ZIZMOR_VERSION:?ZIZMOR_VERSION is required}"
          : "${FAIL_ON_SEVERITY:?FAIL_ON_SEVERITY is required}"

          case "$FAIL_ON_SEVERITY" in
          never | low | medium | high) ;;
          *)
            echo '::error::fail-on-severity must resolve to never, low, medium, or high.'
            exit 2
            ;;
          esac

          if [[ ! "$ZIZMOR_EXIT_CODE" =~ ^[0-9]+$ ]]; then
            echo '::error::zizmor did not report a numeric exit code.'
            exit 2
          fi
          # zizmor exits 0 in SARIF mode regardless of findings, so any nonzero code is an
          # infrastructure failure (download, argument, or collection error), not a
          # finding signal; fail closed rather than trust a partial result.
          if ((ZIZMOR_EXIT_CODE != 0)); then
            echo "::error::zizmor exited $ZIZMOR_EXIT_CODE in SARIF mode; results are not trusted."
            exit 2
          fi
          if [[ ! -f "$ZIZMOR_SARIF" || -L "$ZIZMOR_SARIF" ]]; then
            echo '::error::zizmor SARIF output is missing or is not a regular file.'
            exit 2
          fi

          # zizmor's SARIF driver reports the plain X.Y.Z semanticVersion (no leading v),
          # so strip any caller-supplied prefix before pinning provenance.
          expected_version="${ZIZMOR_VERSION#v}"
          if ! jq -e --arg version "$expected_version" '
            type == "object" and
            .version == "2.1.0" and
            (.runs | type == "array" and length == 1) and
            (.runs[0].tool.driver | type == "object") and
            .runs[0].tool.driver.name == "zizmor" and
            .runs[0].tool.driver.semanticVersion == $version and
            (.runs[0].results | type == "array") and
            all(.runs[0].results[];
              type == "object" and
              (.ruleId | type == "string" and length > 0) and
              (.level == "error" or .level == "warning" or .level == "note") and
              (.message.text | type == "string" and length > 0)
            )
          ' "$ZIZMOR_SARIF" >/dev/null 2>&1; then
            echo '::error::zizmor SARIF is malformed or violates the pinned provenance schema.'
            exit 2
          fi

          annotate_findings() {
            local level kind file line message normalized_file uri_safe uri_base64 message_safe message_base64
            escape_property() {
              local v="$1"
              v=${v//'%'/'%25'}
              v=${v//$'\r'/'%0D'}
              v=${v//$'\n'/'%0A'}
              v=${v//':'/'%3A'}
              v=${v//','/'%2C'}
              printf '%s' "$v"
            }
            escape_data() {
              local v="$1"
              v=${v//'%'/'%25'}
              v=${v//$'\r'/'%0D'}
              v=${v//$'\n'/'%0A'}
              printf '%s' "$v"
            }
            decode_base64_field() {
              local encoded="$1" target="$2" decoded status
              decoded="$(
                set +e
                jq -jnr --arg encoded "$encoded" '$encoded | @base64d' 2>/dev/null
                status=$?
                printf '\036'
                exit "$status"
              )" || return 1
              decoded="${decoded%$'\036'}"
              printf -v "$target" '%s' "$decoded"
            }
            normalize_sarif_uri() {
              local uri="$1" encoded decoded='' remainder prefix hex byte
              local workspace candidate resolved relative

              [[ -n "$uri" && -n "${GITHUB_WORKSPACE:-}" ]] || return 1
              workspace="$(realpath -e -- "$GITHUB_WORKSPACE" 2>/dev/null)" || return 1
              [[ -d "$workspace" ]] || return 1

              if [[ "$uri" == file:///* ]]; then
                encoded="${uri#file://}"
              elif [[ "$uri" == file://* || "$uri" =~ ^[A-Za-z][A-Za-z0-9+.-]*: ]]; then
                return 1
              elif [[ "$uri" == /* ]]; then
                return 1
              else
                encoded="$uri"
              fi
              [[ -n "$encoded" && "$encoded" != *'?'* && "$encoded" != *'#'* ]] || return 1
              [[ "${encoded,,}" != *'%00'* ]] || return 1

              remainder="$encoded"
              while [[ "$remainder" == *%* ]]; do
                prefix="${remainder%%\%*}"
                remainder="${remainder#*\%}"
                [[ "$remainder" =~ ^([0-9A-Fa-f]{2}) ]] || return 1
                hex="${BASH_REMATCH[1]}"
                if ((16#$hex < 32 || 16#$hex == 127)); then
                  return 1
                fi
                printf -v byte '%b' "\\x$hex"
                decoded+="$prefix$byte"
                remainder="${remainder:2}"
              done
              decoded+="$remainder"
              [[ -n "$decoded" && "$decoded" != *\\* ]] || return 1
              if printf '%s' "$decoded" | LC_ALL=C grep -q '[[:cntrl:]]'; then
                return 1
              fi

              if [[ "$uri" == file:///* ]]; then
                candidate="$decoded"
              else
                candidate="$workspace/$decoded"
              fi
              resolved="$(realpath -e -- "$candidate" 2>/dev/null)" || return 1
              [[ "$resolved" == "$workspace" || "$resolved" == "$workspace/"* ]] || return 1
              if [[ "$resolved" == "$workspace" ]]; then
                relative='.'
              else
                relative="${resolved#"$workspace/"}"
              fi
              printf '%s' "$relative"
            }
            while IFS='|' read -r level uri_safe uri_base64 line message_safe message_base64; do
              message_base64="${message_base64%$'\r'}"
              case "$level" in
              error) kind=error ;;
              warning) kind=warning ;;
              note) kind=notice ;;
              *) kind=error ;;
              esac
              if [[ "$message_safe" == true ]]; then
                # shellcheck disable=SC2310 # decoder status selects a safe fallback explicitly.
                if ! decode_base64_field "$message_base64" message; then
                  message='zizmor finding'
                fi
              else
                message='zizmor finding'
              fi
              message="$(escape_data "$message")"
              # shellcheck disable=SC2310 # normalization returns status; fallible body commands are checked.
              if [[ "$uri_safe" == true ]] && decode_base64_field "$uri_base64" file && normalized_file="$(normalize_sarif_uri "$file")"; then
                file="$(escape_property "$normalized_file")"
                [[ "$line" =~ ^[1-9][0-9]*$ ]] || line=1
                line="$(escape_property "$line")"
                echo "::$kind file=$file,line=$line::$message"
              else
                echo "::$kind::$message"
              fi
            done < <(jq -r '
              [.runs[0].results[]][:50][]
              | (.locations[0].physicalLocation.artifactLocation.uri // "") as $uri
              | (.message.text // "zizmor finding") as $message
              | [
                  .level,
                  (if ($uri | type) == "string" then ($uri | explode | all(. >= 32 and . != 127)) else false end),
                  ($uri | if type == "string" then @base64 else "" end),
                  (.locations[0].physicalLocation.region.startLine // 1 | if type == "number" and . >= 1 and . == floor then tostring else "1" end),
                  (if ($message | type) == "string" then ($message | explode | all((. >= 32 or . == 9 or . == 10 or . == 13) and . != 127)) else false end),
                  ($message | if type == "string" then @base64 else ("zizmor finding" | @base64) end)
                ]
              | join("|")
            ' "$ZIZMOR_SARIF")
          }

          annotate_findings

          # Emit annotations for every finding above, then gate on severity. The blocking
          # level set maps FAIL_ON_SEVERITY to SARIF result levels (high->error,
          # medium->warning, low|informational->note); never blocks on nothing.
          case "$FAIL_ON_SEVERITY" in
          never) blocking_levels='[]' ;;
          low) blocking_levels='["error","warning","note"]' ;;
          medium) blocking_levels='["error","warning"]' ;;
          high) blocking_levels='["error"]' ;;
          *)
            echo '::error::fail-on-severity must resolve to never, low, medium, or high.'
            exit 2
            ;;
          esac

          total_count="$(jq '.runs[0].results | length' "$ZIZMOR_SARIF")"
          blocking_count="$(jq --argjson levels "$blocking_levels" '
            [.runs[0].results[] | select(.level as $l | $levels | index($l))] | length
          ' "$ZIZMOR_SARIF")"

          if ((blocking_count > 0)); then
            ids="$(jq -r --argjson levels "$blocking_levels" '
              [.runs[0].results[] | select(.level as $l | $levels | index($l)) | .ruleId] | unique | join(", ")
            ' "$ZIZMOR_SARIF")"
            echo "::error::zizmor reported $blocking_count finding(s) at or above severity $FAIL_ON_SEVERITY: $ids"
            exit 1
          fi

          if ((total_count == 0)); then
            echo 'zizmor completed with no findings.'
          elif [[ "$FAIL_ON_SEVERITY" == never ]]; then
            echo "::notice::zizmor reported $total_count finding(s); advisory mode keeps this lane successful."
          else
            echo "::notice::zizmor reported $total_count finding(s); none at or above severity $FAIL_ON_SEVERITY."
          fi
          # END GENERATED ZIZMOR SARIF GUARD
