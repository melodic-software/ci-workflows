name: Claude E2E Verify

# Dogfood caller: this repo is the first consumer of its own claude-e2e-verify
# reusable workflow, exercising the exact pattern downstream consumers use
# (caller owns `on:` + permissions; reusable workflow owns the action pin, the
# pinned browser toolchain, and safe handling). Local `./` ref works because the
# checkout IS this repo.
#
# This repo has no web app, so the dogfood serves a tiny static fixture page with
# Python's stdlib HTTP server and passes a two-journey verification spec. The
# path filter keeps the lane scoped to changes that touch it.
#
# Requires `ci-workflows` to be in the CLAUDE_CODE_OAUTH_TOKEN org secret's
# "selected repositories" scope (UI-managed); without it, fork PRs and an
# unscoped run get no token and verification degrades to a warning (no leak).
on:
  pull_request:
    paths:
      - .github/workflows/claude-e2e-verify.yml
      - .github/workflows/claude-e2e-verify-self.yml
      - .github/test-fixtures/e2e-demo/**
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  e2e:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/claude-e2e-verify.yml
    with:
      app-start-command: python3 -m http.server 8000 --directory .github/test-fixtures/e2e-demo
      app-url: http://localhost:8000/
      e2e-spec: |
        Journey 1 — page load: opening the page shows the level-one heading
        "End-to-end verification demo" and a status line reading
        "Not toggled yet".

        Journey 2 — toggle button: clicking the "Toggle status" button changes
        the status line from "Not toggled yet" to "Toggled on", and clicking it
        again changes it to "Toggled off".
    # Pass only the one named secret (least privilege) rather than `secrets:
    # inherit`, which would forward every parent secret to the called workflow.
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
