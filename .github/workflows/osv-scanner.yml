name: osv-scanner

# Reusable workflow — dependency vulnerability scan with OSV-Scanner. ADVISORY by
# default (fail-on-vuln: false): findings are surfaced as GitHub PR annotations and
# a scanner/reporter hiccup is swallowed, so the lane never reddens a consumer's
# aggregating ci-status. The SAME scan runs on every event (no pull_request/full-tree
# split), so a PR-green check cannot turn red when the merge lands on the default
# branch.
#
# It composes Google's two SHA-pinnable Docker sub-actions directly
# (osv-scanner-action -> osv-reporter-action) instead of calling Google's reusable
# workflow: that workflow references actions/download-artifact by a mutable tag
# internally, which the org "pin every action to a full-length commit SHA" policy
# rejects at "Set up job". Composing the sub-actions reproduces the reusable
# workflow's reporter — including PR annotations via osv-reporter's --gh-annotations
# — while staying fully SHA-pinned and free: annotations are workflow-command output
# (no permissions, no GitHub Advanced Security / code-scanning SKU).
on:
  workflow_call:
    inputs:
      scan-args:
        description: >-
          OSV-Scanner arguments (newline-separated), e.g. scan paths. Default scans
          the tree recursively from the repo root. Do not pass --format or --output;
          this workflow sets them so the reporter can consume the scan results.
        type: string
        default: |-
          -r
          ./
      fail-on-vuln:
        description: >-
          Fail the job on a vulnerability OR an empty scan (mis-scoped args / no
          supported manifests). Default false keeps the lane advisory (annotations
          only); in that mode a scanner or reporter error is likewise non-blocking.
        type: boolean
        default: false
      allow-no-lockfiles:
        description: >-
          Declare the repo genuinely dependency-less: a scan that finds no
          supported lockfiles passes without complaint. Leave false (the
          default) wherever dependencies exist — OSV-Scanner reads lockfiles
          (for .NET: a committed packages.lock.json via
          RestorePackagesWithLockFile, kept honest by the dotnet-build action's
          locked-mode restore), never .csproj/PackageReference, so a repo with
          dependencies but no lockfile scans zero sources. Under the default an
          empty scan surfaces a coverage warning (advisory) or fails the job
          (fail-on-vuln) instead of reporting green-but-empty.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run OSV-Scanner
        # Scan to JSON for the reporter to consume. continue-on-error so a finding
        # (OSV exits non-zero), an error, or an empty scan never fails the job here;
        # the guard and the reporter own the pass/fail decision.
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          # The image's entrypoint word-splits scan-args, so the blank line the
          # expression leaves when the input is false disappears harmlessly —
          # and a caller still passing the bare flag through scan-args keeps
          # working (no conflicting =false to fight it).
          scan-args: |-
            --output=results.json
            --format=json
            ${{ inputs.allow-no-lockfiles && '--allow-no-lockfiles' || '' }}
            ${{ inputs.scan-args }}

      - name: Guard against an empty scan
        # A repo whose dependencies live outside any lockfile (e.g. .NET
        # PackageReference with no committed packages.lock.json) or a mis-scoped
        # scan-args scans zero sources while looking green — false assurance.
        # Empty is fine only when the caller declared the repo dependency-less;
        # otherwise it fails a blocking run and annotates an advisory one.
        env:
          ALLOW_NO_LOCKFILES: ${{ inputs.allow-no-lockfiles }}
          FAIL_ON_VULN: ${{ inputs.fail-on-vuln }}
        run: |
          count=$(jq '.results | length' results.json 2>/dev/null || echo 0)
          if [ "${count:-0}" -gt 0 ]; then
            echo "OSV-Scanner scanned ${count} source(s)."
          elif [ "$ALLOW_NO_LOCKFILES" = "true" ]; then
            echo "Empty scan accepted: the caller declared the repo dependency-less (allow-no-lockfiles)."
          elif [ "$FAIL_ON_VULN" = "true" ]; then
            echo "::error::OSV-Scanner scanned 0 sources (mis-scoped scan-args, or dependencies without a committed lockfile); failing because fail-on-vuln is set."
            exit 1
          else
            echo "::warning::OSV-Scanner scanned 0 sources — this advisory lane verified nothing. Commit lockfiles (for .NET: packages.lock.json) or, if the repo truly has no dependencies, set allow-no-lockfiles: true."
          fi

      - name: Report findings
        # Google's reporter renders the scan as GitHub PR annotations
        # (--gh-annotations) and owns the exit code (--fail-on-vuln). Advisory runs
        # swallow a reporter hiccup so the lane never reddens ci-status; blocking
        # runs let a real finding fail the job.
        continue-on-error: ${{ !inputs.fail-on-vuln }}
        uses: google/osv-scanner-action/osv-reporter-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: |-
            --output=results.sarif
            --new=results.json
            --gh-annotations=true
            --fail-on-vuln=${{ inputs.fail-on-vuln }}

      - name: Upload SARIF artifact
        # Durable, downloadable record in the run's Actions tab (free; not the paid
        # code-scanning dashboard). Best-effort — never fail the lane on upload.
        if: ${{ !cancelled() }}
        continue-on-error: true
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: osv-scanner-sarif
          path: results.sarif
          retention-days: 5
