name: osv-scanner

# Reusable dependency-vulnerability lane. The caller supplies its governed
# runner selection; the workload itself needs only a Linux X64 worker and no
# Docker socket. Google's exact native release is checksum- and SLSA-verified
# before it runs. Findings are advisory by default, while download, provenance,
# scanner, and result-validation failures always fail closed.
on:
  workflow_call:
    inputs:
      runner:
        description: Runner label selected by the caller's governed selector.
        type: string
        required: true
      scan-args:
        description: >-
          OSV-Scanner source arguments, one argument per line. The workflow owns
          the subcommand, output format, and output path.
        type: string
        default: |-
          -r
          ./
      fail-on-vuln:
        description: Fail when vulnerabilities or an undeclared empty scan occur.
        type: boolean
        default: false
      allow-no-lockfiles:
        description: >-
          Declare the repository dependency-less. Otherwise an empty scan warns
          in advisory mode and fails when fail-on-vuln is true.
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  scan:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 15
    env:
      OSV_VERSION: 2.4.0
      OSV_ASSET: osv-scanner_linux_amd64
      OSV_SHA256: 15314940c10d26af9c6649f150b8a47c1262e8fc7e17b1d1029b0e479e8ed8a0
      OSV_PROVENANCE_SHA256: 9ef16324e97bec3b915e93acfa9ad38673333452bb28299ab7317a3c14847d0b
      SLSA_VERIFIER_VERSION: 2.7.1
      SLSA_VERIFIER_SHA256: 946dbec729094195e88ef78e1734324a27869f03e2c6bd2f61cbc06bd5350339
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Install and verify OSV-Scanner
        id: osv
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${RUNNER_OS:-}" != Linux || "${RUNNER_ARCH:-}" != X64 ]]; then
            echo '::error::The native OSV-Scanner release requires a Linux X64 runner.'
            exit 2
          fi
          for value in "$OSV_SHA256" "$OSV_PROVENANCE_SHA256" "$SLSA_VERIFIER_SHA256"; do
            if [[ ! "$value" =~ ^[0-9a-f]{64}$ ]]; then
              echo '::error::OSV supply-chain pins must be lowercase SHA-256 values.'
              exit 2
            fi
          done

          work_dir="$(mktemp -d "${RUNNER_TEMP:?}/osv-scanner.XXXXXX")"
          binary="$work_dir/$OSV_ASSET"
          provenance="$work_dir/multiple.intoto.jsonl"
          verifier="$work_dir/slsa-verifier"
          results="$work_dir/results.sarif"

          download() {
            curl --fail --show-error --location --proto '=https' \
              --proto-redir '=https' --tlsv1.2 \
              --connect-timeout 10 --max-time 180 \
              --retry 2 --retry-max-time 360 \
              --output "$2" "$1"
          }
          release="https://github.com/google/osv-scanner/releases/download/v${OSV_VERSION}"
          download "$release/$OSV_ASSET" "$binary"
          download "$release/multiple.intoto.jsonl" "$provenance"
          download \
            "https://github.com/slsa-framework/slsa-verifier/releases/download/v${SLSA_VERIFIER_VERSION}/slsa-verifier-linux-amd64" \
            "$verifier"

          printf '%s  %s\n' "$OSV_SHA256" "$binary" | sha256sum --check --strict -
          printf '%s  %s\n' "$OSV_PROVENANCE_SHA256" "$provenance" | sha256sum --check --strict -
          printf '%s  %s\n' "$SLSA_VERIFIER_SHA256" "$verifier" | sha256sum --check --strict -
          chmod 500 -- "$binary" "$verifier"
          "$verifier" verify-artifact "$binary" \
            --provenance-path "$provenance" \
            --source-uri github.com/google/osv-scanner \
            --source-tag "v$OSV_VERSION"
          version_output="$("$binary" --version)"
          if [[ ! "$version_output" =~ (^|[^0-9])${OSV_VERSION//./\\.}([^0-9]|$) ]]; then
            echo "::error::Expected OSV-Scanner $OSV_VERSION, got: $version_output"
            exit 2
          fi
          echo "binary=$binary" >>"$GITHUB_OUTPUT"
          echo "results=$results" >>"$GITHUB_OUTPUT"
          echo "OSV-Scanner $OSV_VERSION passed checksum, provenance, source, and tag verification."

      - name: Run OSV-Scanner
        id: scan
        shell: bash
        env:
          ALLOW_NO_LOCKFILES: ${{ inputs.allow-no-lockfiles }}
          OSV_BINARY: ${{ steps.osv.outputs.binary }}
          OSV_RESULTS: ${{ steps.osv.outputs.results }}
          SCAN_ARGS: ${{ inputs.scan-args }}
        run: |
          set -euo pipefail
          case "$ALLOW_NO_LOCKFILES" in true | false) ;; *) exit 2 ;; esac
          scan_args=()
          while IFS= read -r argument || [[ -n "$argument" ]]; do
            [[ -z "$argument" ]] && continue
            case "$argument" in
              --format | --format=* | --output | --output=* | --output-file | --output-file=*)
                echo "::error::scan-args cannot override the workflow-owned output contract."
                exit 2
                ;;
            esac
            scan_args+=("$argument")
          done <<<"$SCAN_ARGS"
          if ((${#scan_args[@]} == 0)); then
            echo '::error::scan-args must contain at least one argument.'
            exit 2
          fi
          allow_args=()
          if [[ "$ALLOW_NO_LOCKFILES" == true ]]; then
            allow_args+=(--allow-no-lockfiles)
          fi
          set +e
          "$OSV_BINARY" scan source \
            --format=sarif \
            --output-file="$OSV_RESULTS" \
            "${allow_args[@]}" \
            "${scan_args[@]}"
          status=$?
          set -e
          echo "exit-code=$status" >>"$GITHUB_OUTPUT"
          echo "OSV-Scanner exit code: $status"

      - name: Validate and classify OSV result
        env:
          ALLOW_NO_LOCKFILES: ${{ inputs.allow-no-lockfiles }}
          FAIL_ON_VULN: ${{ inputs.fail-on-vuln }}
          OSV_RESULTS: ${{ steps.osv.outputs.results }}
          SCAN_EXIT: ${{ steps.scan.outputs.exit-code }}
        shell: bash
        run: |
          # BEGIN GENERATED OSV SCAN GUARD - DO NOT EDIT
          # Source: .github/scripts/osv-scan-guard.sh
          # shellcheck shell=bash
          set -euo pipefail

          case "${FAIL_ON_VULN:-}" in true | false) ;; *)
            echo '::error::fail-on-vuln must resolve to true or false.'
            exit 2
            ;;
          esac
          case "${ALLOW_NO_LOCKFILES:-}" in true | false) ;; *)
            echo '::error::allow-no-lockfiles must resolve to true or false.'
            exit 2
            ;;
          esac
          if [[ ! "${SCAN_EXIT:-}" =~ ^[0-9]+$ ]]; then
            echo '::error::OSV-Scanner did not report a numeric exit code.'
            exit 2
          fi

          valid_sarif=false
          if [[ -f "${OSV_RESULTS:-}" && ! -L "${OSV_RESULTS:-}" ]] &&
            jq -e '.version == "2.1.0" and (.runs | type == "array") and ([.runs[].results[]?] | type == "array")' "$OSV_RESULTS" >/dev/null 2>&1; then
            valid_sarif=true
          fi

          annotate_findings() {
            local file line message normalized_file
            escape_property() {
              local v="$1"
              v=${v//'%'/'%25'}
              v=${v//$'\r'/'%0D'}
              v=${v//$'\n'/'%0A'}
              v=${v//':'/'%3A'}
              v=${v//','/'%2C'}
              printf '%s' "$v"
            }
            escape_data() {
              local v="$1"
              v=${v//'%'/'%25'}
              v=${v//$'\r'/'%0D'}
              v=${v//$'\n'/'%0A'}
              printf '%s' "$v"
            }
            normalize_sarif_uri() {
              local uri="$1" encoded decoded='' remainder prefix hex byte
              local workspace candidate resolved relative

              [[ -n "$uri" && -n "${GITHUB_WORKSPACE:-}" ]] || return 1
              workspace="$(realpath -e -- "$GITHUB_WORKSPACE" 2>/dev/null)" || return 1
              [[ -d "$workspace" ]] || return 1

              if [[ "$uri" == file:///* ]]; then
                encoded="${uri#file://}"
              elif [[ "$uri" == file://* || "$uri" =~ ^[A-Za-z][A-Za-z0-9+.-]*: ]]; then
                return 1
              elif [[ "$uri" == /* ]]; then
                return 1
              else
                encoded="$uri"
              fi
              [[ -n "$encoded" && "$encoded" != *'?'* && "$encoded" != *'#'* ]] || return 1

              remainder="$encoded"
              while [[ "$remainder" == *%* ]]; do
                prefix="${remainder%%\%*}"
                remainder="${remainder#*\%}"
                [[ "$remainder" =~ ^([0-9A-Fa-f]{2}) ]] || return 1
                hex="${BASH_REMATCH[1]}"
                if ((16#$hex < 32 || 16#$hex == 127)); then
                  return 1
                fi
                printf -v byte '%b' "\\x$hex"
                decoded+="$prefix$byte"
                remainder="${remainder:2}"
              done
              decoded+="$remainder"
              [[ -n "$decoded" ]] || return 1

              if [[ "$uri" == file:///* ]]; then
                candidate="$decoded"
              else
                candidate="$workspace/$decoded"
              fi
              resolved="$(realpath -e -- "$candidate" 2>/dev/null)" || return 1
              [[ "$resolved" == "$workspace" || "$resolved" == "$workspace/"* ]] || return 1
              if [[ "$resolved" == "$workspace" ]]; then
                relative='.'
              else
                relative="${resolved#"$workspace/"}"
              fi
              printf '%s' "$relative"
            }
            while IFS=$'\t' read -r file line message; do
              [[ -z "$message" ]] && continue
              message="$(escape_data "$message")"
              # shellcheck disable=SC2310 # normalization returns status; fallible body commands are checked.
              if normalized_file="$(normalize_sarif_uri "$file")"; then
                file="$(escape_property "$normalized_file")"
                [[ "$line" =~ ^[1-9][0-9]*$ ]] || line=1
                line="$(escape_property "$line")"
                echo "::warning file=$file,line=$line::$message"
              else
                echo "::warning::$message"
              fi
            done < <(jq -r '[.runs[].results[]?][:50][] | [(.locations[0].physicalLocation.artifactLocation.uri // ""), (.locations[0].physicalLocation.region.startLine // 1), (.message.text // "OSV vulnerability finding")] | @tsv' "$OSV_RESULTS")
          }

          case "$SCAN_EXIT" in
          0 | 1)
            if [[ "$valid_sarif" != true ]]; then
              echo "::error::OSV-Scanner exited $SCAN_EXIT without a valid regular SARIF result."
              exit 2
            fi
            finding_count="$(jq '[.runs[].results[]?] | length' "$OSV_RESULTS")"
            if [[ "$SCAN_EXIT" == 0 && "$finding_count" != 0 ]] || [[ "$SCAN_EXIT" == 1 && "$finding_count" == 0 ]]; then
              echo "::error::OSV-Scanner exit $SCAN_EXIT disagrees with SARIF finding count $finding_count."
              exit 2
            fi
            if [[ "$SCAN_EXIT" == 1 ]]; then
              annotate_findings
              if [[ "$FAIL_ON_VULN" == true ]]; then
                echo "::error::OSV-Scanner reported $finding_count vulnerability finding(s)."
                exit 1
              fi
              echo "::notice::OSV-Scanner reported $finding_count finding(s); advisory mode remains successful."
            else
              echo 'OSV-Scanner completed without vulnerability findings.'
            fi
            ;;
          128)
            if [[ "$ALLOW_NO_LOCKFILES" == true ]]; then
              echo 'Empty OSV scan accepted because the caller declared the repository dependency-less.'
            elif [[ "$FAIL_ON_VULN" == true ]]; then
              echo '::error::OSV-Scanner found no supported dependency sources (exit 128).'
              exit 1
            else
              echo '::warning::OSV-Scanner found no supported dependency sources (exit 128).'
            fi
            ;;
          *)
            echo "::error::OSV-Scanner failed operationally (exit $SCAN_EXIT); results are not trusted."
            exit "$SCAN_EXIT"
            ;;
          esac
          # END GENERATED OSV SCAN GUARD
