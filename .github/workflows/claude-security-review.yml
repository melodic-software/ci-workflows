name: claude-security-review

# Reusable workflow — dedicated LLM security-review pass with
# anthropics/claude-code-action. A sibling of claude-review.yml: same secrets
# interface and same safe-handling model, but a security-only prompt and an
# ADVISORY VERDICT. A whole-job concern (own job permissions + secrets
# interface), so a reusable workflow, not a composite action.
#
# POSTURE — advisory VERDICT, name-stable EXECUTION check:
#   This lane POSTS a security review as PR comments; the Claude step is
#   continue-on-error so an OIDC/usage-limit/SDK blip does not show as a red
#   check, and findings never fail ci-status. The VERDICT (what the review says)
#   stays advisory. What a consumer CAN gate is EXECUTION EVIDENCE: a ruleset
#   may make the `security-review` check REQUIRED, so every protected-branch PR
#   carries proof a security pass ran — or was judged not-applicable. The
#   intended promotion path for the verdict itself: flip to blocking on CRITICAL
#   findings once the lane's precision is proven over a sustained window — an
#   earned promotion (trust-before-scale), mirroring the guardrail-matrix
#   verification-promotion discipline. Until then the verdict stays advisory.
#
# ALWAYS-REPORT SHAPE — the caller does NOT path-filter at workflow level:
#   A security pass on every PR is noise in a doc-heavy repo where most PRs are
#   prose, so this lane scopes itself to security-sensitive surfaces. A consumer
#   whose ruleset REQUIRES the execution check must NOT express that scope with
#   the caller's `on.pull_request.paths`: a workflow-level path miss leaves the
#   required check Pending forever and wedges every prose PR. Instead the caller
#   triggers on ALL pull_request events and passes the `paths` input; the
#   `changes` job evaluates it with a job-level conditional, so a not-applicable
#   PR yields a name-stable SKIPPED `security-review` job — which a ruleset reads
#   as success, satisfying the required check. The check context is
#   `<caller-job-id> / security-review`. Empty `paths` (the default) means
#   "every call is relevant", so a consumer that passes nothing is unaffected.
#
# CONSUMER CONTRACT (the caller owns these — they are NOT set here):
#   The triggers and the GITHUB_TOKEN permission grant live in each consumer's
#   thin caller, because a reusable workflow's `on:` is `workflow_call` and the
#   caller's own `on:` decides which events invoke it; and because a called
#   workflow can only DOWNGRADE the caller's permission grant, never elevate it.
#   Canonical caller — trigger on all PR events (NO workflow-level `paths:`) and
#   pass the security-sensitive surfaces as the `paths` input:
#
#     on:
#       pull_request:
#         types: [opened, synchronize, ready_for_review, reopened]
#       merge_group:   # ONLY if the consumer runs a merge queue — without it
#                      # the required check never reports for queued PRs
#     jobs:
#       security-review:
#         permissions:
#           contents: read         # checkout + read the diff
#           pull-requests: write   # post the security review + tracking comment
#           id-token: write        # OIDC — mints the Claude GitHub App token
#                                  # (required even with an OAuth/API-key credential)
#         uses: melodic-software/ci-workflows/.github/workflows/claude-security-review.yml@<sha>
#         with:
#           # Security-sensitive surfaces in Actions `paths:` syntax, one per
#           # line (use a `|` literal block). Empty (default) reviews every PR;
#           # a PR matching none yields a name-stable skipped check. `#` comment
#           # and blank lines are ignored.
#           paths: |
#             .github/**
#             scripts/**
#             **/*.sh
#             **/*.ps1
#             # plus the caller's own auth/token-touching source and
#             # network-call sites, mapped to that repo's actual paths
#         secrets:
#           CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
#
# SECURITY MODEL (see CLAUDE.md for the full rationale — identical to
# claude-review's, because both run an AI agent with an org credential on a
# public repo):
#   - Intended for `pull_request` (NEVER pull_request_target / workflow_run with
#     secrets — privileged context + untrusted fork code = token exfiltration).
#     The `reject-privileged-triggers` step is a tripwire that hard-fails those
#     two events; every other event is allowed (the consumer keeps flexibility).
#   - Fork PRs receive no secrets and a read-only token by design, so they are
#     simply not reviewed — that is correct, not a gap to "fix".
#   - The action gates triggering on the actor's write access; bots are blocked
#     unless named in `allowed_bots`.
#   - `display_report` / `show_full_output` stay off (public-repo log-leak risk).

on:
  workflow_call:
    inputs:
      runner:
        description: Runner label selected by the caller's governed selector.
        type: string
        default: ubuntu-24.04
      paths:
        description: >-
          Newline-separated path patterns, in GitHub Actions `paths:` filter
          syntax, naming this consumer's security-sensitive surfaces (use a `|`
          literal block to preserve newlines). When a PR changes at least one
          matching file the review runs; when it matches none, the
          `security-review` job skips — a name-stable check verdict a
          required-check ruleset reads as success. Blank lines and `#` comments
          are ignored. Empty (the default) means no filtering — every call is
          relevant, so a consumer that passes nothing is unaffected. Consulted
          only on `pull_request` events; other events are always relevant.
        type: string
        default: ''
      prompt:
        description: >-
          The security-review-criteria body. A REPO / PR NUMBER / HEAD SHA
          header and commit-permalink guidance are prepended automatically, so
          this input is just the instructions for what to look for.
        type: string
        default: >-
          Perform a security review of THIS pull request. Review ONLY the files
          changed in this PR: use `gh pr diff` to see what changed, then read
          those files. Do not audit unrelated parts of the codebase.


          Hunt for vulnerabilities that static analysis misses: logic flaws,
          authorization and access-control gaps, injection surfaces (command,
          SQL, path, template), unsafe handling of tokens / secrets /
          credentials, and dangerous GitHub Actions patterns —
          `pull_request_target` or `workflow_run` used with secrets over
          untrusted code, script injection through the `github` context inside
          `run:` blocks, permission-widening changes to a workflow's
          `permissions:` or to settings / config, and supply-chain risk from
          loosened or unpinned action / dependency pins.


          Report findings as a pull request review. Tag each finding with a
          severity (CRITICAL / IMPORTANT / SUGGESTION) and, separately, a
          confidence level (how sure you are the finding is real and
          exploitable). Report security issues only — no style, formatting,
          naming, test-coverage, or general code-quality commentary. If you find
          no security issues, say so plainly.
      claude-args:
        description: >-
          Passed through to the Claude CLI. The universal extension point: model,
          turn budget, allowed tools, system prompt, MCP config all ride here
          (the standalone model / max_turns / allowed_tools action inputs are
          deprecated upstream).
        type: string
        default: --model claude-sonnet-4-6 --max-turns 75
      skip-actors:
        description: >-
          Comma-separated actors (no spaces) for whom the job skips entirely, to
          save runner minutes on PRs that never need review. Empty reviews all.
        type: string
        default: dependabot[bot]
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: >-
          Claude Code OAuth token (from `claude setup-token`). Supply as a
          same-org organization secret scoped to selected repositories and pass
          this named secret explicitly from the caller.
        required: true

permissions:
  contents: read

jobs:
  # Relevance gate for the ALWAYS-REPORT SHAPE (see header): decides whether
  # this PR touches a security-sensitive surface, so `security-review` can skip
  # and still report a name-stable check — instead of the caller path-filtering
  # at workflow level, which would wedge a required check Pending. Empty `paths`
  # or any non-pull_request event is always relevant.
  changes:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    # Only the PR file listing is needed; no checkout, so no contents grant.
    permissions:
      pull-requests: read
    outputs:
      relevant: ${{ steps.filter.outputs.relevant }}
    steps:
      # actions/github-script rather than a `gh api` run step: this job runs
      # on whatever runner the caller selected, and a self-hosted image is not
      # guaranteed to ship the gh CLI. Only the PR-file listing moves here —
      # the pattern-matching step below still shells out, but only to `git
      # check-ignore`, which every runner needs anyway for actions/checkout to
      # function, so it carries no comparable availability risk.
      - name: List changed files
        id: changed-files
        if: github.event_name == 'pull_request' && inputs.paths != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("node:fs");
            const outputPath = `${process.env.RUNNER_TEMP}/security-review-changed-files.txt`;
            try {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
                per_page: 100,
              });
              const names = files.flatMap((file) => [file.filename, file.previous_filename].filter(Boolean));
              fs.writeFileSync(outputPath, names.length > 0 ? `${names.join("\n")}\n` : "", "utf8");
              core.setOutput("path", outputPath);
              core.setOutput("failed", "false");
            } catch (error) {
              core.warning(`Could not list PR files: ${error.message}`);
              core.setOutput("failed", "true");
            }

      - name: Determine security relevance
        id: filter
        env:
          EVENT_NAME: ${{ github.event_name }}
          PATHS: ${{ inputs.paths }}
          FILES_LIST_PATH: ${{ steps.changed-files.outputs.path }}
          FILES_LIST_FAILED: ${{ steps.changed-files.outputs.failed }}
        run: |
          set -euo pipefail

          # No filter, or a non-PR event, means every call is relevant — the
          # backward-compatible default for a consumer that passes no `paths`.
          if [ "$EVENT_NAME" != pull_request ] || [ -z "$(printf '%s' "$PATHS" | tr -d '[:space:]')" ]; then
            echo "relevant=true" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          # Build a root-anchored gitignore matcher in a throwaway repo — no
          # checkout of the caller's code. Actions `paths:` patterns are
          # root-anchored; gitignore patterns without a leading slash match at
          # any depth, so anchor each pattern with a leading '/'.
          scratch="$(mktemp -d)"
          # Persistent self-hosted runners accumulate /tmp; clean up on any exit.
          # Single quotes defer expansion to trap time (avoids SC2064).
          trap 'rm -rf "$scratch"' EXIT
          ignore="$scratch/.gitignore"
          git init -q "$scratch"
          : >"$ignore"
          printf '%s\n' "$PATHS" | while IFS= read -r pattern; do
            pattern="${pattern%$'\r'}"
            pattern="${pattern#"${pattern%%[![:space:]]*}"}"
            pattern="${pattern%"${pattern##*[![:space:]]}"}"
            [ -n "$pattern" ] || continue
            case "$pattern" in
              \#*) continue ;;
              '!'*) printf '!/%s\n' "${pattern#!}" >>"$ignore" ;;
              /*) printf '%s\n' "$pattern" >>"$ignore" ;;
              *) printf '/%s\n' "$pattern" >>"$ignore" ;;
            esac
          done

          # Every line was blank or a `#` comment, so the filter is effectively
          # empty — fail OPEN rather than skip every PR on a vacuous filter.
          if [ ! -s "$ignore" ]; then
            echo "::warning::paths filter has no usable patterns; treating PR as security-relevant."
            echo "relevant=true" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          # The listing step above already failed OPEN to relevant on error;
          # this only covers the case where it ran but could not reach GitHub.
          if [ "$FILES_LIST_FAILED" = "true" ]; then
            echo "::warning::Could not list PR files; treating PR as security-relevant."
            echo "relevant=true" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          # check-ignore prints matching paths; exit 0 = at least one match,
          # 1 = none, >1 = fatal. A fatal error fails OPEN, never reads as "no
          # match", so a matcher fault cannot silently skip the review.
          matches="$(git -C "$scratch" check-ignore --stdin --no-index <"$FILES_LIST_PATH")" && rc=0 || rc=$?
          if [ "$rc" -gt 1 ]; then
            echo "::warning::check-ignore failed (rc=$rc); treating PR as security-relevant."
            echo "relevant=true" >>"$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$matches" ]; then
            echo "relevant=true" >>"$GITHUB_OUTPUT"
          else
            echo "relevant=false" >>"$GITHUB_OUTPUT"
          fi

  security-review:
    needs: changes
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 30
    # Skip configured bot/automation actors (saves runner minutes). The action's
    # own write-access gate is the security control; this is just an optimization.
    # Comma-wrap both sides so a substring of one actor can't match another.
    #
    # `!cancelled() && needs.changes.outputs.relevant != 'false'` is the
    # always-report gate: relevant=false (no security-sensitive path changed)
    # skips this job, and a skipped required check reads as success — the
    # name-stable not-applicable verdict. It FAILS OPEN: a failed/errored
    # `changes` job leaves relevant unset (''), which is not 'false', so the
    # review still runs. A silent skip would let unreviewed security-relevant
    # changes merge, so paying for a run beats a silent evidence gap. always()
    # is deliberately avoided — a cancelled workflow should still stop.
    if: >-
      ${{ !cancelled()
          && needs.changes.outputs.relevant != 'false'
          && !contains(format(',{0},', inputs.skip-actors), format(',{0},', github.actor)) }}
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    concurrency:
      # Job-level (not workflow-level): a workflow-level group would cancel
      # before the `if` above evaluates, so a skipped actor could cancel an
      # in-progress review.
      #
      # Keyed per (PR, head SHA), not per PR: GitHub orders a concurrency
      # group by when jobs start WAITING on it, not by event time, and callers
      # gate this job behind a runner-selector job whose queue delay varies
      # per run. Under a shared per-PR group, an older run whose selector was
      # delayed could enter the group AFTER the newer head's review had
      # started, cancel it, and review an obsolete head. Runs for different
      # heads therefore never share a group; the superseded-head guard step
      # below is what retires a stale run instead. Same-head duplicates
      # (reopen, ready_for_review, reruns) still supersede each other — there
      # the entry order is harmless because every member reviews identical
      # content. Non-PR events degrade to a per-commit group via the fallbacks.
      group: claude-security-review-${{ github.event.pull_request.number || github.sha }}-${{ github.event.pull_request.head.sha || github.sha }}
      cancel-in-progress: true
    steps:
      # Tripwire: this workflow handles secrets, so it must never run in a
      # privileged-context trigger that also exposes untrusted fork code. We do
      # not whitelist `pull_request` (a consumer may legitimately use
      # workflow_dispatch / schedule); we only hard-fail the two dangerous ones.
      - name: Reject privileged triggers
        if: github.event_name == 'pull_request_target' || github.event_name == 'workflow_run'
        run: |
          echo "::error::claude-security-review must not be called from '${{ github.event_name }}'." \
            "Call it from a 'pull_request' workflow. pull_request_target/workflow_run run" \
            "with base-repo secrets over untrusted code (token exfiltration risk)."
          exit 1

      # A stale run must retire itself, not rely on being cancelled: with the
      # per-head concurrency key above, nothing cancels a run whose head was
      # superseded while it sat in a queue. Ask the live API whether this
      # event's head is still the PR's head; when it is not, a newer run owns
      # the review, so every runner-consuming step below skips (posting
      # feedback for an obsolete head is worse than doing nothing, and the
      # newer run also owns the marker-comment lifecycle). Fails open — the
      # `!= 'true'` step gates treat a missing output as fresh, and only a
      # response shaped like a commit SHA may retire the run (a degenerate
      # success such as jq's literal `null` must not) — so an API anomaly
      # degrades to reviewing a possibly-stale head, never to silence.
      # actions/github-script rather than a `gh api` run step: this reusable
      # runs on whatever runner the caller selected, and a self-hosted image
      # is not guaranteed to ship the gh CLI. github-script executes on the
      # action's own bundled Node runtime, so the live freshness check has no
      # runner-image dependency (same pattern as do-not-merge-gate.yml).
      - name: Check whether this head is still current
        id: freshness
        if: github.event.pull_request.number != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            let liveHead = "";
            try {
              const { data: pr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.payload.pull_request.number,
              });
              liveHead = pr.head.sha;
            } catch (error) {
              core.warning(`Could not refetch the PR head; treating this run as fresh: ${error.message}`);
            }
            const eventHeadSha = process.env.EVENT_HEAD_SHA ?? "";
            if (/^[0-9a-f]{40}$/.test(liveHead) && liveHead !== eventHeadSha) {
              core.notice(`Skipping review: the PR head moved from ${eventHeadSha} to ${liveHead}, so a newer run owns the review.`);
              core.setOutput("superseded", "true");
            } else {
              core.setOutput("superseded", "false");
            }

      # persist-credentials stays at its default (true) until upstream
      # claude-code-action#1236 ships: the action's setupBranch runs
      # `git fetch origin <ref>` BEFORE configuring git auth, so
      # persist-credentials:false makes that fetch fail and leaves an orphan
      # tracking comment. The final strip step below scrubs the persisted token
      # to restore zizmor `artipacked` compliance. Reversible when #1236 lands.
      - name: Check out
        if: steps.freshness.outputs.superseded != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: blob:none

      - name: Claude security review
        id: claude-review
        if: steps.freshness.outputs.superseded != 'true'
        # claude-code-action exits non-zero only on infrastructure errors; review
        # findings go to PR comments, not the exit code. continue-on-error keeps
        # an OIDC/usage-limit/SDK blip from showing as a red check.
        continue-on-error: true
        uses: anthropics/claude-code-action@12531344451323133b0493233c759991ac61da12 # v1.0.174
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # A clean security pass otherwise produces no visible output (upstream
          # #1071); the tracking comment guarantees a "no findings" signal.
          track_progress: true
          # Off on this public lane (log-leak risk); hardcoded, not a flippable
          # input, so a consumer cannot turn it on.
          display_report: false
          allowed_bots: dependabot[bot]
          exclude_comments_by_actor: dependabot[bot]
          claude_args: ${{ inputs.claude-args }}
          # github-context expressions must appear directly in the step (a value
          # carried in via inputs.prompt is NOT re-evaluated), so the structural
          # header + permalink guidance live here and wrap the consumer's body.
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            HEAD SHA: ${{ github.event.pull_request.head.sha }}

            ${{ inputs.prompt }}

            When referencing specific code locations in findings, link to the
            commit blob (not the PR) using a permalink with line numbers:
            https://github.com/${{ github.repository }}/blob/${{ github.event.pull_request.head.sha }}/<path>#L<line>

      # Also gated on the guard: a superseded run has no outcome to report, and
      # skipping this step leaves review_failed empty so both marker-comment
      # steps below skip too — a retired run must not touch the newer run's PR
      # comment state.
      - name: Report review outcome
        id: review-outcome
        if: always() && steps.freshness.outputs.superseded != 'true'
        env:
          REVIEW_OUTCOME: ${{ steps.claude-review.outcome }}
          EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          if [ "$REVIEW_OUTCOME" = "success" ]; then
            echo "Claude security review completed. Findings (if any) are in the PR comments."
            echo "review_failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # This is a public repo, so the raw SDKResultMessage is NOT safe to
          # publish as-is: its `result` field is model-authored free text (per
          # the Claude Agent SDK message schema) and CLAUDE.md keeps
          # display_report/show_full_output off for exactly this leak risk.
          # Project only the safe, structured metadata fields — never the last
          # message wholesale.
          detail="(no execution file was produced)"
          if [ -n "${EXECUTION_FILE:-}" ] && [ -f "$EXECUTION_FILE" ]; then
            detail=$(jq -c '
              (.[-1] // empty) as $last
              | if $last == null then empty
                else $last | {subtype, is_error, num_turns, duration_ms, total_cost_usd}
                end
            ' "$EXECUTION_FILE" 2>/dev/null || true)
            [ -n "$detail" ] || detail="(execution file present but unparsable)"
          fi

          echo "::error::Claude security review exited with: $REVIEW_OUTCOME" \
            "(infrastructure error, not a security signal — e.g. usage limit," \
            "OIDC failure, SDK crash, is_error result, or max-turns exhaustion)." \
            "Last SDK result: $detail"

          echo "review_failed=true" >> "$GITHUB_OUTPUT"
          echo "review_detail=$detail" >> "$GITHUB_OUTPUT"

      # Runs only on a genuine infra failure (never on a clean review) and only
      # when the token can write: fork-triggered pull_request runs get a
      # read-only GITHUB_TOKEN and no secrets by design (CLAUDE.md), so
      # gh pr comment would just fail there — skip rather than error.
      # Targets the marker comment by ID (never --edit-last, which edits the
      # PR's last comment from ANY author) so a stuck placeholder comment from
      # track_progress is never mistaken for "no findings" and an unrelated
      # bot comment is never clobbered.
      # actions/github-script rather than `gh api`/`gh pr comment` run steps:
      # this reusable runs on whatever runner the caller selected, and a
      # self-hosted image is not guaranteed to ship the gh CLI.
      - name: Comment on genuine review failure
        if: >-
          always() && steps.review-outcome.outputs.review_failed == 'true' &&
          github.event.pull_request.number != '' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REVIEW_DETAIL: ${{ steps.review-outcome.outputs.review_detail }}
        with:
          script: |
            const marker = "<!-- claude-security-review-infra-status -->";
            const body = [
              marker,
              "> [!WARNING]",
              "> **Automated security review did not complete** — this is an infrastructure failure, not a review verdict.",
              ">",
              "> Treat any Claude comment on this PR (including a placeholder like \"I'll analyze this and get back to you\") as incomplete, not \"no findings.\"",
              ">",
              `> - Run: ${process.env.RUN_URL}`,
              `> - Last SDK result: \`${process.env.REVIEW_DETAIL}\``,
              ">",
              "> Re-running the job, or pushing a new commit, will retry the review.",
            ].join("\n");

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const marked = comments.filter(
              (comment) => comment.user?.login === "github-actions[bot]" && comment.body?.startsWith(marker),
            );
            const existing = marked.length > 0 ? marked[marked.length - 1] : undefined;

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body,
              });
            }

      # Symmetric counterpart to the failure step above: a transient infra
      # failure (e.g. an OIDC blip) can leave the marker comment behind on the
      # PR, and the failure-only condition previously meant no later code path
      # ever touched it again. Once a retry (rerun or new push) succeeds, clear
      # that stale warning so it is not mistaken for a still-open problem.
      # Same fork guard and marker lookup as the failure step — never
      # --edit-last, for the same clobbering risk.
      # actions/github-script rather than a `gh api` run step, for the same
      # runner-tool-availability reason as the failure-comment step above.
      - name: Clear stale failure comment after successful review
        if: >-
          always() && steps.review-outcome.outputs.review_failed == 'false' &&
          github.event.pull_request.number != '' &&
          github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const marker = "<!-- claude-security-review-infra-status -->";
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
            });
            const marked = comments.filter(
              (comment) => comment.user?.login === "github-actions[bot]" && comment.body?.startsWith(marker),
            );
            const existing = marked.length > 0 ? marked[marked.length - 1] : undefined;
            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }

      # zizmor `artipacked` mitigation — scrub the GITHUB_TOKEN that checkout
      # persisted into .git/config (forced on by #1236, above). Drop this once
      # the checkout step can use persist-credentials:false again.
      - name: Strip persisted git credentials
        if: always()
        run: git config --unset-all http.https://github.com/.extraheader || true
