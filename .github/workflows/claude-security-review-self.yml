name: Claude Security Review

# Dogfood caller: this repo is the first consumer of its own
# claude-security-review reusable workflow, exercising the exact ALWAYS-REPORT
# shape downstream consumers use. The caller owns `on:` + permissions and passes
# its security-sensitive surfaces as the `paths` INPUT; the reusable workflow
# owns the action pin, the safe handling, and the job-level relevance gate.
# Local `./` ref works because the checkout IS this repo.
#
# No workflow-level `paths:` filter by design: filtering there would leave the
# `security-review` check Pending on a prose-only PR and wedge a required-check
# ruleset. Triggering on every PR instead lets the reusable workflow's `changes`
# job skip `security-review` for a prose PR, yielding a name-stable check.
# (Like the pr-title dogfood, this caller stays pull_request-only; add
# merge_group only when the repo actually runs a merge queue.)
#
# Requires `ci-workflows` to be in the CLAUDE_CODE_OAUTH_TOKEN org secret's
# "selected repositories" scope (UI-managed); without it, fork PRs and an
# unscoped run get no token and the review degrades to a warning (no leak).
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]

permissions:
  contents: read

# Cancel a superseded in-flight review when the PR gets a new push; the PR
# number is always set here (pull_request-only triggers) and, unlike head_ref,
# is unique per PR even across forks; run_id is a non-grouping fallback.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  security-review:
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    uses: ./.github/workflows/claude-security-review.yml
    with:
      # This repo's security-sensitive surfaces (see the reusable workflow's
      # header). A prose-only PR matches none and the review job skips.
      paths: |
        .github/workflows/**
        .github/actions/**
        **/*.sh
        **/*.ps1
        CLAUDE.md
    # Pass only the one named secret (least privilege) rather than `secrets:
    # inherit`, which would forward every parent secret to the called workflow.
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
