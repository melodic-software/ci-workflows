name: link-check

# Online external-link checker — ADVISORY, not a ci-status gate. External link
# health is inherently flaky (transient outages, anti-bot 403/429), so this runs
# on a schedule with fail:false and files a rolling tracking issue instead of
# breaking a build. Deterministic on-disk link integrity is the separate
# lychee-offline action that feeds ci-status. Call this from a scheduled caller
# workflow that grants issues: write.
on:
  workflow_call:
    inputs:
      args:
        description: >-
          lychee arguments (flags + globs). Defaults tune for CI: persisted
          cache, tolerate timeouts, and read the caller's lychee.toml ruleset.
        type: string
        default: >-
          --cache
          --max-cache-age 7d
          --no-progress
          --accept-timeouts
          --config modules/lychee/lychee.toml
          './**/*.md'
      issue-title:
        description: Title of the single rolling tracking issue opened on failure.
        type: string
        default: 'Link checker report'

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No git-credential persistence needed: the gh/lychee steps use the
          # job's GITHUB_TOKEN env, not the checkout's stored credential.
          persist-credentials: false

      - name: Restore lychee cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411 # v2.8.0
        with:
          args: ${{ inputs.args }}
          # The action's default lychee (v0.23.0) predates --accept-timeouts
          # (added in lychee 0.24.0), which the default args rely on. Pin the
          # same lychee the offline lane installs; bump both together (this pin
          # is inside a workflow, so tool-version-drift-check watches only the
          # lychee-offline action default).
          lycheeVersion: v0.24.2
          fail: false
        env:
          # Authenticates lychee's github.com requests so they use the higher
          # authenticated rate limit instead of the stricter unauthenticated one.
          GITHUB_TOKEN: ${{ github.token }}

      # create-issue-from-file does not deduplicate by title: with no issue-number
      # it always opens a NEW issue. Resolve the existing open tracking issue
      # first so the next step UPDATES it, keeping a single rolling issue rather
      # than filing a fresh one on every scheduled failure.
      - name: Find existing tracking issue
        id: tracking
        if: steps.lychee.outputs.exit_code != '0'
        env:
          GH_TOKEN: ${{ github.token }}
          TITLE: ${{ inputs.issue-title }}
        run: |
          number=$(gh issue list --state open --label link-check \
            --search "in:title \"$TITLE\"" --json number,title \
            --jq ".[] | select(.title == \"$TITLE\") | .number" | head -n1)
          echo "number=$number" >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue
        if: steps.lychee.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: ${{ inputs.issue-title }}
          issue-number: ${{ steps.tracking.outputs.number }}
          content-filepath: lychee/out.md
          labels: automated, link-check
