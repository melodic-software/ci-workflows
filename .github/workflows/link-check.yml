name: link-check

# Online external-link checker — ADVISORY, not a ci-status gate. External link
# health is inherently flaky (transient outages, anti-bot 403/429), so this runs
# on a schedule with fail:false and maintains a rolling tracking issue instead
# of breaking a build. The issue is opened or updated while links are unhealthy
# and, unless auto-close is disabled, closed after recovery. Deterministic
# on-disk link integrity is the separate lychee-offline action that feeds
# ci-status. Call this from a scheduled caller workflow that grants
# issues: write.
on:
  workflow_call:
    inputs:
      runner:
        description: Runner label selected by the caller's governed selector.
        type: string
        default: ubuntu-24.04
      args:
        description: >-
          lychee arguments (flags + globs). Defaults tune for CI: persisted
          cache, tolerate timeouts, and read the caller's lychee.toml ruleset.
        type: string
        default: >-
          --cache
          --max-cache-age 7d
          --no-progress
          --accept-timeouts
          --config lychee.toml
          './**/*.md'
      issue-title:
        description: Title of the rolling issue opened on failure and closed on recovery.
        type: string
        default: 'Link checker report'
      issue-labels:
        description: >-
          Comma- or newline-separated labels applied to the rolling issue. The
          same set scopes the tracking-issue lookup, so it must name at least
          one label and should stay distinctive enough that unrelated issues
          do not carry all of them.
        type: string
        default: 'automated, link-check'
      issue-type:
        description: >-
          Native issue type (for example Task) asserted on the rolling issue
          whenever it is opened or updated. Empty skips type assignment.
        type: string
        default: ''
      auto-close:
        description: >-
          Close the rolling issue after the next healthy run. Disable to leave
          recovery triage to a human instead.
        type: boolean
        default: true

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # No git-credential persistence needed: the gh/lychee steps use the
          # job's GITHUB_TOKEN env, not the checkout's stored credential.
          persist-credentials: false

      - name: Restore lychee cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check links
        id: lychee
        # Pinned past v2.8.0 (latest release): its installer expects the lychee
        # binary at the archive root, but lychee >= 0.24 tarballs nest it in a
        # subdirectory, and its default lychee (v0.23.0) predates the
        # --accept-timeouts flag the default args rely on (added in lychee
        # 0.24.0). Master fixes both; drop back to a release tag once one ships.
        uses: lycheeverse/lychee-action@e7477775783ea5526144ba13e8db5eec57747ce8 # master (post-v2.8.0)
        with:
          args: ${{ inputs.args }}
          # Explicit pin so the checked lychee stays deterministic across action
          # bumps and in lockstep with the lychee-offline lane; bump both
          # together (this pin is inside a workflow, so tool-version-drift-check
          # watches only the lychee-offline action default).
          lycheeVersion: v0.24.2
          fail: false
        env:
          # Authenticates lychee's github.com requests so they use the higher
          # authenticated rate limit instead of the stricter unauthenticated one.
          GITHUB_TOKEN: ${{ github.token }}

      # create-issue-from-file does not deduplicate by title: with no issue-number
      # it always opens a NEW issue. Resolve the existing open tracking issue
      # first so the next step UPDATES it, keeping a single rolling issue rather
      # than filing a fresh one on every scheduled failure. A marker embedded in
      # the body (not a title search) is exact and survives a retitle, and
      # matches the mechanism pulumi-version-drift-check.yml already uses.
      #
      # This is a reusable workflow: a caller can invoke it more than once with
      # different inputs.issue-title/args to track separate reports (e.g. docs
      # links vs. site links). The marker is scoped with a hash of issue-title
      # -- the same key the pre-marker, title-search lookup used -- so a
      # healthy invocation can't close, or overwrite, a different report's
      # still-failing tracking issue.
      #
      # actions/github-script rather than a `gh api` run step: this reusable
      # runs on whatever runner the caller selected, and a self-hosted image is
      # not guaranteed to ship the gh CLI. This also folds in the resolver
      # logic find-tracking-issue.sh used to supply as a generated block —
      # queue-monitor-liveness.yml and tool-version-drift-check.yml still run
      # on a fixed hosted runner and keep that shared bash source; this is the
      # only consumer that needed the port.
      - name: Find existing tracking issue
        id: tracking
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          ISSUE_TITLE: ${{ inputs.issue-title }}
          ISSUE_LABELS: ${{ inputs.issue-labels }}
        with:
          script: |
            const crypto = require("node:crypto");
            const issueTitle = process.env.ISSUE_TITLE;
            const reportKey = crypto.createHash("sha256").update(issueTitle, "utf8").digest("hex").slice(0, 12);
            const marker = `<!-- ci-workflows:link-check:v1:active:${reportKey} -->`;
            core.setOutput("marker", marker);

            // Filtering on the configured labels restores the same-owned-report
            // constraint the pre-marker workflow enforced via the CLI's
            // `issue list --label link-check`: without it, in any repo where issue creation
            // isn't maintainer-only, an issue whose body or title happens to
            // match by coincidence (or is crafted to match) could be adopted,
            // then overwritten or closed by this automation. The labels are
            // applied by the "Open or update tracking issue" step below (create
            // AND update, additively), so the filter covers both the marker
            // match and the title-fallback match; an empty set would silently
            // drop the constraint, so it fails closed.
            const labels = (process.env.ISSUE_LABELS ?? "")
              .split(/[,\n]/)
              .map((label) => label.trim())
              .filter((label) => label.length > 0);
            if (labels.length === 0) {
              core.setFailed("issue-labels must name at least one label; the label filter is what keeps this automation from adopting, overwriting, or closing unrelated issues.");
              return;
            }

            const openIssues = await github.paginate(github.rest.issues.listForRepo, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: labels.join(","),
              per_page: 100,
            });
            const candidates = openIssues.filter((issue) => !issue.pull_request);

            let matches = candidates.filter((issue) => (issue.body ?? "").includes(marker));
            if (matches.length > 1) {
              core.setFailed(`found ${matches.length} issues carrying marker '${marker}'; reconcile them manually.`);
              return;
            }
            if (matches.length === 0) {
              // One-time migration fallback: a still-open issue created by the
              // pre-marker, title-search version of this workflow has no marker
              // yet, so the search above can't find it. Adopt it by exact title
              // match so the update step below reuses (and marker-backfills)
              // that issue instead of orphaning it behind a newly opened
              // duplicate.
              matches = candidates.filter((issue) => issue.title === issueTitle);
              if (matches.length > 1) {
                core.setFailed(`found ${matches.length} pre-marker issues titled '${issueTitle}'; reconcile them manually.`);
                return;
              }
            }
            core.setOutput("issue-number", matches.length === 1 ? String(matches[0].number) : "");

      - name: Embed the marker in the lychee report
        if: steps.lychee.outputs.exit_code != '0'
        shell: bash
        env:
          MARKER: ${{ steps.tracking.outputs.marker }}
        run: |
          set -euo pipefail
          { printf '%s\n\n' "$MARKER"; cat lychee/out.md; } \
            > "$RUNNER_TEMP/link-check-report.md"

      - name: Open or update tracking issue
        id: issue
        if: steps.lychee.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          title: ${{ inputs.issue-title }}
          issue-number: ${{ steps.tracking.outputs.issue-number }}
          content-filepath: ${{ runner.temp }}/link-check-report.md
          labels: ${{ inputs.issue-labels }}

      # Native issue types are org-level metadata, distinct from labels, and
      # create-issue-from-file cannot set one — assert it as a follow-up
      # whenever the report is opened or updated (re-asserting on update heals
      # a manual type change, matching how labels are re-applied above).
      # actions/github-script rather than a `gh issue edit` run step, for the
      # same runner-tool-availability reason as the lookup step above. Native
      # issue types are not on the typed `issues.update` REST method in every
      # octokit release, so this calls the documented PATCH route directly.
      - name: Assert native issue type
        if: steps.lychee.outputs.exit_code != '0' && inputs.issue-type != ''
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          ISSUE_NUMBER: ${{ steps.issue.outputs.issue-number }}
          ISSUE_TYPE: ${{ inputs.issue-type }}
        with:
          script: |
            await github.request("PATCH /repos/{owner}/{repo}/issues/{issue_number}", {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.ISSUE_NUMBER),
              type: process.env.ISSUE_TYPE,
            });

      # actions/github-script rather than a `gh issue close` run step, for the
      # same runner-tool-availability reason as the lookup step above.
      - name: Close recovered tracking issue
        if: steps.lychee.outputs.exit_code == '0' && steps.tracking.outputs.issue-number != '' && inputs.auto-close
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          ISSUE_NUMBER: ${{ steps.tracking.outputs.issue-number }}
        with:
          script: |
            const issueNumber = Number(process.env.ISSUE_NUMBER);
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: "The scheduled link check is healthy again; closing this rolling report.",
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              state: "closed",
              state_reason: "completed",
            });
