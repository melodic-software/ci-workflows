name: pr-issue-linkage

# Reusable workflow — requires the PR body to carry a native GitHub closing
# keyword (Closes/Fixes/Resolves #N, or the literal "No linked issue" / "No
# related issue:" when the PR closes nothing) AND a manual "## Related"
# section with content. GATING by design: a caller that requires this check
# blocks the merge until the body is fixed. Generalizes
# melodic-software/provisioning's pr-body.yml (decisions #58/#59) into a
# shared reusable workflow, mirroring pr-title.yml's own shape (a
# repo-specific implementation first, then a shared reusable workflow
# consumers call).
#
# The caller must use `pull_request_target` (not `pull_request`): this runs
# the workflow definition from the base branch, not the PR head, so a
# fork/head cannot tamper with this gate. Trigger types must include `edited`
# so a body edit re-validates, matching semantic-pr.yml's `edited` requirement
# for re-titled PRs. The body is read straight from the event payload via
# `env:` (never spliced into the script/run text), so untrusted PR-author
# content cannot inject code. This is a standalone required check, NOT a
# ci-status lane: body edits should not re-run the file-lint lanes.
on:
  workflow_call:
    inputs:
      runner:
        description: Runner label selected by the caller.
        type: string
        default: ubuntu-24.04
      prerequisite-result:
        description: >-
          Result of an optional prerequisite job. Callers with `needs` must pass
          its exact result and use `if: always()`; any value other than success
          fails this required check before body validation.
        type: string
        default: success

permissions: {}

jobs:
  # Job id, not the file-level `name:` above, is what forms the check context
  # together with the caller's job id (`<caller job id> / <this job id>`).
  # Kept equal to the caller's own job id (`pr-issue-linkage`, see README) so
  # the emitted context is `pr-issue-linkage / pr-issue-linkage`, matching the
  # convention semantic-pr / pr-title.yml and do-not-merge-gate already
  # established.
  pr-issue-linkage:
    runs-on: ${{ inputs.prerequisite-result == 'success' && inputs.runner || 'ubuntu-slim' }}
    timeout-minutes: 15
    steps:
      - name: Reject failed prerequisite
        if: ${{ inputs.prerequisite-result != 'success' }}
        env:
          PREREQUISITE_RESULT: ${{ inputs.prerequisite-result }}
        run: |
          echo "::error::Required prerequisite did not succeed (result: ${PREREQUISITE_RESULT})."
          exit 1

      - name: Validate PR body against the closing-keyword + Related convention
        # Skipped (job still green) on anything but the two PR-body-bearing
        # events -- the body was already validated when the PR was last
        # opened/edited, matching do-not-merge-gate.yml's merge_group guard.
        if: >-
          inputs.prerequisite-result == 'success' &&
          (github.event_name == 'pull_request_target' || github.event_name == 'pull_request')
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        with:
          script: |
            // Strip HTML comments before any check: GitHub's own closing-keyword parser and
            // rendered Markdown both ignore commented-out text, and a PR template ships its
            // instructional prose inside comments -- without stripping, an unedited template
            // (which contains the literal phrase in its instructions) would pass vacuously.
            const rawBody = process.env.PR_BODY || "";
            const body = rawBody.replace(/<!--[\s\S]*?-->/g, "");
            const errors = [];

            function extractSection(text, headingRe) {
              const lines = text.split(/\r?\n/);
              const start = lines.findIndex((l) => headingRe.test(l.trim()));
              if (start === -1) return null;
              const rest = lines.slice(start + 1);
              const end = rest.findIndex((l) => /^#{1,6}\s+\S/.test(l.trim()));
              return (end === -1 ? rest : rest.slice(0, end)).join("\n").trim();
            }

            const related = extractSection(body, /^##\s+related$/i);
            if (related === null) {
              errors.push(
                'Missing a "## Related" section. List related PRs, ADRs, or decision-log ' +
                  "entries this PR does not close."
              );
            } else if (related.length === 0) {
              errors.push('The "## Related" section is empty.');
            }

            const CLOSING_KEYWORD =
              /\b(close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*:?\s*(?:[\w.-]+\/[\w.-]+)?#\d+\b/i;
            // Accepts both phrasings: provisioning/pr-body.yml's original "No linked issue"
            // and claude-code-plugins/source-control:pull-request's independently-evolved
            // "No related issue:" opt-out marker (reference/create.md). Widened, not narrowed,
            // so this reusable workflow works as a caller for either repo's existing convention.
            const NO_ISSUE_MARKER = /\bno (?:linked|related) issue\b/i;
            if (!CLOSING_KEYWORD.test(body) && !NO_ISSUE_MARKER.test(body)) {
              errors.push(
                "Missing a native closing keyword (Closes/Fixes/Resolves #N). If this PR " +
                  'closes no GitHub issue, state "No linked issue" (or "No related issue:") in the body instead.'
              );
            }

            if (errors.length > 0) {
              core.setFailed(errors.join("\n\n"));
            }
