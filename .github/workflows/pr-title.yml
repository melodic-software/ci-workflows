name: pr-title

# Dogfood + reference caller for the semantic-pr reusable workflow: this repo is
# the first consumer of its own Conventional-Commits PR-title gate. Consumers
# copy this thin caller verbatim (bumping the @sha) and require the resulting
# `pr-title / pr-title` check in their ruleset. `edited` is required so re-titling
# a PR re-runs the gate; `synchronize`/`reopened` keep the check fresh across
# pushes and reopens. A repo with a merge queue must also trigger on
# `merge_group` (see the README's canonical consumer block); no melodic-software
# repo has a queue today, so this dogfood caller omits it. A local (./) ref
# works here because the checkout IS this repo; consumers reference
# melodic-software/ci-workflows/.github/workflows@<sha>.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  pull-requests: read

# head_ref is always set here (pull_request-only triggers); run_id is a safety
# fallback that never groups, so nothing outside a PR can be cancelled.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  pr-title:
    permissions:
      pull-requests: read
    uses: ./.github/workflows/semantic-pr.yml
