name: selector-conformance

on:
  pull_request:
    paths:
      - .github/workflows/link-check.yml
      - .github/workflows/queue-monitor-liveness.yml
      - .github/workflows/select-runner.yml
      - .github/workflows/selector-conformance.yml
      - .github/workflows/zizmor.yml
      - .github/workflows/osv-scanner.yml
      - .github/workflows/tool-version-drift-check.yml
      - .github/osv-scanner-pin.json
      - .github/scripts/find-tracking-issue-render.test.cjs
      - .github/scripts/find-tracking-issue.sh
      - .github/scripts/find-tracking-issue.test.sh
      - .github/scripts/osv-scanner-pin.test.cjs
      - .github/scripts/osv-release-digest.sh
      - .github/scripts/osv-release-digest.test.sh
      - .github/scripts/osv-scan-guard.sh
      - .github/scripts/osv-scan-guard.test.sh
      - .github/scripts/render-find-tracking-issue.cjs
      - .github/scripts/render-osv-scan-guard.cjs
      - .github/scripts/zizmor-native.test.cjs
      - .github/scripts/select-runner.cjs
      - .github/scripts/select-runner.test.cjs
      - .github/scripts/render-select-runner-workflow.cjs
  push:
    branches: [main]
    paths:
      - .github/workflows/link-check.yml
      - .github/workflows/queue-monitor-liveness.yml
      - .github/workflows/select-runner.yml
      - .github/workflows/selector-conformance.yml
      - .github/workflows/zizmor.yml
      - .github/workflows/osv-scanner.yml
      - .github/workflows/tool-version-drift-check.yml
      - .github/osv-scanner-pin.json
      - .github/scripts/find-tracking-issue-render.test.cjs
      - .github/scripts/find-tracking-issue.sh
      - .github/scripts/find-tracking-issue.test.sh
      - .github/scripts/osv-scanner-pin.test.cjs
      - .github/scripts/osv-release-digest.sh
      - .github/scripts/osv-release-digest.test.sh
      - .github/scripts/osv-scan-guard.sh
      - .github/scripts/osv-scan-guard.test.sh
      - .github/scripts/render-find-tracking-issue.cjs
      - .github/scripts/render-osv-scan-guard.cjs
      - .github/scripts/zizmor-native.test.cjs
      - .github/scripts/select-runner.cjs
      - .github/scripts/select-runner.test.cjs
      - .github/scripts/render-select-runner-workflow.cjs
  workflow_dispatch:

permissions: {}

# The PR number is only set on pull_request, so PR pushes cancel superseded
# runs while main pushes and manual dispatches get a unique run_id group and
# always run to completion. Keying on the PR number (not head_ref) keeps fork
# PRs that share a branch name from cancelling each other's required runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  selector-unit:
    name: Selector and immutable-pin tests
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false
      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
      - name: Test selector implementation and generation
        run: node --test .github/scripts/*.test.cjs
      - name: Test tracking-issue resolver
        run: bash .github/scripts/find-tracking-issue.test.sh
      - name: Test OSV scanner exit-code policy
        run: bash .github/scripts/osv-scan-guard.test.sh
      - name: Test OSV release digest parsing
        run: bash .github/scripts/osv-release-digest.test.sh

  hosted-only:
    name: Hosted-only policy
    uses: ./.github/workflows/select-runner.yml
    with:
      policy: hosted-only
      hosted-runner: ubuntu-24.04

  public-guard:
    name: Public guard
    uses: ./.github/workflows/select-runner.yml
    with:
      policy: prefer-self-hosted
      self-hosted-label: test-managed-label
      hosted-runner: ubuntu-24.04
      scope: organization
      managed-runner-prefix: test-managed-
      observer-client-id: Iv1.test-client-id

  assert:
    name: Assert fail-open contract
    needs: [selector-unit, hosted-only, public-guard]
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    steps:
      - name: Assert fail-open contracts
        shell: bash
        env:
          HOSTED_RUNNER: ${{ needs.hosted-only.outputs.runner }}
          HOSTED_ROUTE: ${{ needs.hosted-only.outputs.route }}
          HOSTED_REASON: ${{ needs.hosted-only.outputs.reason }}
          GUARDED_RUNNER: ${{ needs.public-guard.outputs.runner }}
          GUARDED_ROUTE: ${{ needs.public-guard.outputs.route }}
          GUARDED_REASON: ${{ needs.public-guard.outputs.reason }}
          # The public-repository guard fires on every attempt; re-runs make a
          # fresh liveness decision instead of forcing a hosted route.
          EXPECTED_GUARDED_REASON: hosted-only
        run: |
          test "$HOSTED_RUNNER" = ubuntu-24.04
          test "$HOSTED_ROUTE" = hosted
          test "$HOSTED_REASON" = hosted-only
          test "$GUARDED_RUNNER" = ubuntu-24.04
          test "$GUARDED_ROUTE" = hosted
          test "$GUARDED_REASON" = "$EXPECTED_GUARDED_REASON"
