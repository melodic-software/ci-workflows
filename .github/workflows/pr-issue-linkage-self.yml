name: pr-issue-linkage-self

# Requires the PR body to carry a native closing keyword (or the literal
# "No linked issue") and a non-empty "## Related" section. Dogfood caller of
# this repo's own pr-issue-linkage reusable (pinned to its merged SHA, not the
# PR head — the gate must not be redefinable by the change it gates); the
# emitted required-check context is `pr-issue-linkage / pr-issue-linkage`.
# pull_request_target runs the base-branch definition; `edited` re-validates
# on a body edit. Public repo: runs on the reusable's hosted default runner.
on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize]
  merge_group:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pr-issue-linkage:
    permissions: {}
    uses: melodic-software/ci-workflows/.github/workflows/pr-issue-linkage.yml@d7734df8c557084edc2df7cf578cf62ad2f261e4 # d7734df 2026-07-20
    with:
      exempt-authors: 'dependabot[bot]'
