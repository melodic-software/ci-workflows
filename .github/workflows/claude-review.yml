name: claude-review

# Reusable workflow — automated PR code review with anthropics/claude-code-action.
# A whole-job concern (own job permissions + secrets interface), so a reusable
# workflow, not a composite action.
#
# CONSUMER CONTRACT (the caller owns these — they are NOT set here):
#   The triggers and the GITHUB_TOKEN permission grant live in each consumer's
#   thin caller, because a reusable workflow's `on:` is `workflow_call` and the
#   caller's own `on:` decides which events invoke it; and because a called
#   workflow can only DOWNGRADE the caller's permission grant, never elevate it.
#   So a consumer is never blocked by a choice frozen here — they shape their own
#   caller. Canonical caller:
#
#     on:
#       pull_request:
#         types: [opened, synchronize, ready_for_review, reopened]
#     jobs:
#       review:
#         permissions:
#           contents: read         # checkout + read the diff
#           pull-requests: write   # post review + track_progress tracking comment
#           id-token: write        # OIDC — mints the Claude GitHub App token (required
#                                  # even with an OAuth/API-key credential)
#         uses: melodic-software/ci-workflows/.github/workflows/claude-review.yml@<sha>
#         secrets:
#           CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
#
#   A PRIVATE consumer that wants REVIEW.md's native-reference depth tier
#   additionally passes standards-ref plus the two STANDARDS_REVIEW_APP_*
#   secrets (see standards-ref's own description below). A PUBLIC consumer
#   must never pass any of the three.
#
# SECURITY MODEL (see CLAUDE.md for the full rationale):
#   - Intended for `pull_request` (NEVER pull_request_target / workflow_run with
#     secrets — privileged context + untrusted fork code = token exfiltration).
#     The `reject-privileged-triggers` step is a tripwire that hard-fails those
#     two events; every other event is allowed (the consumer keeps flexibility).
#   - Fork PRs receive no secrets and a read-only token by design, so they are
#     simply not reviewed — that is correct, not a gap to "fix".
#   - The action gates triggering on the actor's write access; bots are blocked
#     unless named in `allowed-bots`.
#   - `display-report` / `show_full_output` stay off (public-repo log-leak risk).
#   - The standards-ref mount is opt-in and unenforced HERE by design (see the
#     CONSUMER CONTRACT note above): this workflow has no reliable way to know
#     a calling repo's own visibility from within a reusable-workflow context,
#     so the restriction is a documented caller obligation, not a runtime
#     check. standards/distribution/REVIEW-CREDENTIAL.md is the SSOT for why.

on:
  workflow_call:
    inputs:
      runner:
        description: Runner label selected by the caller's governed selector.
        type: string
        default: ubuntu-24.04
      prompt:
        description: >-
          The review-criteria body. A REPO / PR NUMBER / HEAD SHA header and
          commit-permalink guidance are prepended automatically, so this input
          is just the instructions for what to look for.
        type: string
        default: >-
          Review this pull request for correctness, security, and alignment with
          the project's CLAUDE.md guidelines (and REVIEW.md criteria if the repo
          has one). Focus on architecture decisions, error handling, test
          coverage, and maintainability.


          Scope your review to the files changed in this PR. Use `gh pr diff` to
          identify what changed, then review those files. Do not explore
          unrelated parts of the codebase.
      claude-args:
        description: >-
          Passed through to the Claude CLI. The universal extension point: model,
          turn budget, allowed tools, system prompt, MCP config all ride here
          (the standalone model / max_turns / allowed_tools action inputs are
          deprecated upstream).
        type: string
        default: --model claude-sonnet-4-6 --max-turns 75
      track-progress:
        description: >-
          Create one tracking comment with progress checkboxes, sticky-updated
          across pushes. Mitigates upstream #1071 (clean reviews otherwise
          produce no visible output).
        type: boolean
        default: true
      display-report:
        description: >-
          Write the Claude-authored report to the job step summary. Default off:
          on public repos this would expose model-authored content (and is a
          secret-leak vector). Private consumers may opt in.
        type: boolean
        default: false
      allowed-bots:
        description: >-
          Comma-separated bot actors permitted to trigger the review (bots are
          blocked by default). Never set '*' on a public repo.
        type: string
        default: dependabot[bot]
      exclude-comments-by-actor:
        description: >-
          Comma-separated actors whose comments are withheld from Claude's
          context (prompt-injection hygiene), not a trigger gate.
        type: string
        default: dependabot[bot]
      skip-actors:
        description: >-
          Comma-separated actors (no spaces) for whom the job skips entirely, to
          save runner minutes on PRs that never need review. Empty reviews all.
        type: string
        default: dependabot[bot]
      timeout-minutes:
        description: Job timeout.
        type: number
        default: 30
      standards-ref:
        description: >-
          Pinned commit SHA of melodic-software/standards to mount for
          REVIEW.md's native-reference cites (see standards/REVIEW.md's
          "Depth" section and standards/distribution/REVIEW-CREDENTIAL.md).
          Empty (default) skips the mount entirely, which is the required
          value for any PUBLIC calling repo — this reusable workflow does
          not enforce that restriction itself, so a public caller must
          simply never set this input and never pass the two credential
          secrets below. See distribution/REVIEW-CREDENTIAL.md in standards
          for the full trust-boundary rationale (mounting private standards
          content into a review agent whose output lands in public Actions
          logs is a prompt-injection exfiltration path).
        type: string
        default: ""
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        description: >-
          Claude Code OAuth token (from `claude setup-token`). Supply as a
          same-org organization secret scoped to selected repositories and pass
          this named secret explicitly from the caller.
        required: true
      STANDARDS_REVIEW_APP_ID:
        description: >-
          GitHub App client ID for the dedicated, read-only credential
          scoped to standards, documented in
          standards/distribution/REVIEW-CREDENTIAL.md. Required only when
          standards-ref is set; unused (and must not be supplied) otherwise.
        required: false
      STANDARDS_REVIEW_APP_PRIVATE_KEY:
        description: >-
          Private key for the same App as STANDARDS_REVIEW_APP_ID. Required
          only when standards-ref is set.
        required: false

permissions:
  contents: read

jobs:
  review:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: ${{ inputs.timeout-minutes }}
    # Skip configured bot/automation actors (saves runner minutes). The action's
    # own write-access gate is the security control; this is just an optimization.
    # Comma-wrap both sides so a substring of one actor can't match another.
    if: >-
      ${{ !contains(format(',{0},', inputs.skip-actors), format(',{0},', github.actor)) }}
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    concurrency:
      # Job-level (not workflow-level): a workflow-level group would cancel
      # before the `if` above evaluates, so a skipped actor could cancel an
      # in-progress review.
      #
      # Keyed per (PR, head SHA), not per PR: GitHub orders a concurrency
      # group by when jobs start WAITING on it, not by event time, and callers
      # gate this job behind a runner-selector job whose queue delay varies
      # per run. Under a shared per-PR group, an older run whose selector was
      # delayed could enter the group AFTER the newer head's review had
      # started, cancel it, and review an obsolete head. Runs for different
      # heads therefore never share a group; the superseded-head guard step
      # below is what retires a stale run instead. Same-head duplicates
      # (reopen, ready_for_review, reruns) still supersede each other — there
      # the entry order is harmless because every member reviews identical
      # content. Non-PR events degrade to a per-commit group via the fallbacks.
      group: claude-review-${{ github.event.pull_request.number || github.sha }}-${{ github.event.pull_request.head.sha || github.sha }}
      cancel-in-progress: true
    steps:
      # Tripwire: this workflow handles secrets, so it must never run in a
      # privileged-context trigger that also exposes untrusted fork code. We do
      # not whitelist `pull_request` (a consumer may legitimately use
      # workflow_dispatch / schedule); we only hard-fail the two dangerous ones.
      - name: Reject privileged triggers
        if: github.event_name == 'pull_request_target' || github.event_name == 'workflow_run'
        run: |
          echo "::error::claude-review must not be called from '${{ github.event_name }}'." \
            "Call it from a 'pull_request' workflow. pull_request_target/workflow_run run" \
            "with base-repo secrets over untrusted code (token exfiltration risk)."
          exit 1

      # A stale run must retire itself, not rely on being cancelled: with the
      # per-head concurrency key above, nothing cancels a run whose head was
      # superseded while it sat in a queue. Ask the live API whether this
      # event's head is still the PR's head; when it is not, a newer run owns
      # the review, so every runner-consuming step below skips (posting
      # feedback for an obsolete head is worse than doing nothing, and the
      # newer run also owns the marker-comment lifecycle). Fails open — the
      # `!= 'true'` step gates treat a missing output as fresh, and only a
      # response shaped like a commit SHA may retire the run (a degenerate
      # success such as jq's literal `null` must not) — so an API anomaly
      # degrades to reviewing a possibly-stale head, never to silence.
      - name: Check whether this head is still current
        id: freshness
        if: github.event.pull_request.number != ''
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          live_head=$(gh api "repos/$REPO/pulls/$PR_NUMBER" --jq .head.sha) || live_head=""
          if [[ "$live_head" =~ ^[0-9a-f]{40}$ ]] && [ "$live_head" != "$EVENT_HEAD_SHA" ]; then
            echo "::notice::Skipping review: the PR head moved from $EVENT_HEAD_SHA to $live_head, so a newer run owns the review."
            echo "superseded=true" >> "$GITHUB_OUTPUT"
          else
            echo "superseded=false" >> "$GITHUB_OUTPUT"
          fi

      # persist-credentials stays at its default (true) until upstream
      # claude-code-action#1236 ships: the action's setupBranch runs
      # `git fetch origin <ref>` BEFORE configuring git auth, so
      # persist-credentials:false makes that fetch fail and leaves an orphan
      # tracking comment. The final strip step below scrubs the persisted token
      # to restore zizmor `artipacked` compliance. Reversible when #1236 lands.
      - name: Check out
        if: steps.freshness.outputs.superseded != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          filter: blob:none

      # Native-reference mount (standards/REVIEW.md's "Depth" tier). Only runs
      # when the caller supplied standards-ref, which a public calling repo
      # must never do (see the input's own description above).
      - name: Generate standards-read token
        id: standards-token
        if: inputs.standards-ref != '' && steps.freshness.outputs.superseded != 'true'
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ secrets.STANDARDS_REVIEW_APP_ID }}
          private-key: ${{ secrets.STANDARDS_REVIEW_APP_PRIVATE_KEY }}
          owner: melodic-software
          repositories: standards

      # The reviewed PR's own tree is checked out at the workspace root, so it
      # could ship a `.standards-ref` entry (e.g. a symlink to `.`). Clear it
      # first: without a trailing slash `rm` unlinks the symlink itself instead
      # of following it, so the checkout below cannot be redirected to delete the
      # main workspace. Keeps the reference mount off a PR-controlled path.
      - name: Clear PR-supplied reference-mount path
        if: inputs.standards-ref != '' && steps.freshness.outputs.superseded != 'true'
        env:
          MOUNT_PATH: ${{ github.workspace }}/.standards-ref
        run: rm -rf -- "$MOUNT_PATH"

      # persist-credentials:false keeps the standards App token out of
      # .standards-ref/.git/config, where the Claude step below (which mounts
      # this directory via --add-dir over PR-controlled context) could be
      # induced to read and exfiltrate it. Safe here — unlike the main checkout
      # above, this read-only reference mount runs no later authenticated git
      # commands, so it is not subject to the #1236 constraint.
      - name: Check out standards (native-reference mount)
        if: inputs.standards-ref != '' && steps.freshness.outputs.superseded != 'true'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: melodic-software/standards
          ref: ${{ inputs.standards-ref }}
          token: ${{ steps.standards-token.outputs.token }}
          path: .standards-ref
          persist-credentials: false
          filter: blob:none

      # Composed in a plain shell step, not a GitHub Actions expression
      # ternary, so the conditional is testable and reads like ordinary code.
      - name: Compose Claude CLI arguments
        id: compose-args
        if: steps.freshness.outputs.superseded != 'true'
        env:
          BASE_ARGS: ${{ inputs.claude-args }}
          STANDARDS_REF: ${{ inputs.standards-ref }}
          MOUNT_PATH: ${{ github.workspace }}/.standards-ref
        run: |
          args="$BASE_ARGS"
          if [ -n "$STANDARDS_REF" ]; then
            args="$args --add-dir $MOUNT_PATH"
          fi
          # claude-args may be multiline (callers can pass YAML `|`), so emit it
          # with the heredoc output form and a random delimiter — a single-line
          # `args=$args` write corrupts $GITHUB_OUTPUT on any newline.
          delimiter="gha_${RANDOM}${RANDOM}_EOF"
          {
            echo "args<<$delimiter"
            printf '%s\n' "$args"
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"

      - name: Claude review
        id: claude-review
        if: steps.freshness.outputs.superseded != 'true'
        # claude-code-action exits non-zero only on infrastructure errors; review
        # findings go to PR comments, not the exit code. continue-on-error keeps
        # an OIDC/usage-limit/SDK blip from showing as a red check.
        continue-on-error: true
        uses: anthropics/claude-code-action@12531344451323133b0493233c759991ac61da12 # v1.0.174
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: ${{ inputs.track-progress }}
          display_report: ${{ inputs.display-report }}
          allowed_bots: ${{ inputs.allowed-bots }}
          exclude_comments_by_actor: ${{ inputs.exclude-comments-by-actor }}
          claude_args: ${{ steps.compose-args.outputs.args }}
          # github-context expressions must appear directly in the step (a value
          # carried in via inputs.prompt is NOT re-evaluated), so the structural
          # header + permalink guidance live here and wrap the consumer's body.
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            HEAD SHA: ${{ github.event.pull_request.head.sha }}

            ${{ inputs.prompt }}

            When referencing specific code locations in findings, link to the
            commit blob (not the PR) using a permalink with line numbers:
            https://github.com/${{ github.repository }}/blob/${{ github.event.pull_request.head.sha }}/<path>#L<line>

      # Also gated on the guard: a superseded run has no outcome to report, and
      # skipping this step leaves review_failed empty so both marker-comment
      # steps below skip too — a retired run must not touch the newer run's PR
      # comment state.
      - name: Report review outcome
        id: review-outcome
        if: always() && steps.freshness.outputs.superseded != 'true'
        env:
          REVIEW_OUTCOME: ${{ steps.claude-review.outcome }}
          EXECUTION_FILE: ${{ steps.claude-review.outputs.execution_file }}
        run: |
          if [ "$REVIEW_OUTCOME" = "success" ]; then
            echo "Claude review completed. Findings (if any) are in the PR comments."
            echo "review_failed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Prior to claude-code-action v1.0.172, the action reported `success`
          # even when the underlying SDK result had is_error:true (upstream
          # #1495, fixed in #1496) — this branch was effectively dead. Bumping
          # past the fix makes REVIEW_OUTCOME finally reflect real failures, so
          # this now needs to actually surface them instead of just logging.
          #
          # This is a public repo, so the raw SDKResultMessage is NOT safe to
          # publish as-is: its `result` field is model-authored free text (per
          # the Claude Agent SDK message schema) and CLAUDE.md keeps
          # display_report/show_full_output off for exactly this leak risk.
          # Project only the safe, structured metadata fields — never the last
          # message wholesale.
          detail="(no execution file was produced)"
          if [ -n "${EXECUTION_FILE:-}" ] && [ -f "$EXECUTION_FILE" ]; then
            detail=$(jq -c '
              (.[-1] // empty) as $last
              | if $last == null then empty
                else $last | {subtype, is_error, num_turns, duration_ms, total_cost_usd}
                end
            ' "$EXECUTION_FILE" 2>/dev/null || true)
            [ -n "$detail" ] || detail="(execution file present but unparsable)"
          fi

          echo "::error::Claude review exited with: $REVIEW_OUTCOME" \
            "(infrastructure error, not a code-quality signal — e.g. usage limit," \
            "OIDC failure, SDK crash, is_error result, or max-turns exhaustion)." \
            "Last SDK result: $detail"

          echo "review_failed=true" >> "$GITHUB_OUTPUT"
          echo "review_detail=$detail" >> "$GITHUB_OUTPUT"

      # Runs only on a genuine infra failure (never on a clean review) and only
      # when the token can write: fork-triggered pull_request runs get a
      # read-only GITHUB_TOKEN and no secrets by design (CLAUDE.md), so
      # gh pr comment would just fail there — skip rather than error.
      # Targets the marker comment by ID (never --edit-last, which edits the
      # PR's last comment from ANY author) so a stuck placeholder comment from
      # track_progress is never mistaken for "no findings" and an unrelated
      # bot comment is never clobbered — this is the failure mode this whole
      # change exists to fix.
      - name: Comment on genuine review failure
        if: >-
          always() && steps.review-outcome.outputs.review_failed == 'true' &&
          github.event.pull_request.number != '' &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          REVIEW_DETAIL: ${{ steps.review-outcome.outputs.review_detail }}
        run: |
          marker="<!-- claude-review-infra-status -->"
          body=$(printf '%s\n' \
            "$marker" \
            "> [!WARNING]" \
            "> **Automated review did not complete** — this is an infrastructure failure, not a review verdict." \
            ">" \
            "> Treat any Claude comment on this PR (including a placeholder like \"I'll analyze this and get back to you\") as incomplete, not \"no findings.\"" \
            ">" \
            "> - Run: $RUN_URL" \
            "> - Last SDK result: \`$REVIEW_DETAIL\`" \
            ">" \
            "> Re-running the job, or pushing a new commit, will retry the review.")

          comment_id=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate |
            jq -r --arg marker "$marker" '
              [.[] | select(.user.login == "github-actions[bot]" and (.body | startswith($marker)))]
              | last | .id // empty
            ')

          if [ -n "$comment_id" ]; then
            gh api "repos/$REPO/issues/comments/$comment_id" -X PATCH -f "body=$body" --silent
          else
            gh pr comment "$PR_NUMBER" --body "$body"
          fi

      # Symmetric counterpart to the failure step above: a transient infra
      # failure (e.g. an OIDC blip) can leave the marker comment behind on the
      # PR, and the failure-only condition previously meant no later code path
      # ever touched it again. Once a retry (rerun or new push) succeeds, clear
      # that stale warning so it is not mistaken for a still-open problem.
      # Same fork guard and marker lookup as the failure step — never
      # --edit-last, for the same clobbering risk.
      - name: Clear stale failure comment after successful review
        if: >-
          always() && steps.review-outcome.outputs.review_failed == 'false' &&
          github.event.pull_request.number != '' &&
          github.event.pull_request.head.repo.full_name == github.repository
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          marker="<!-- claude-review-infra-status -->"

          comment_id=$(gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate |
            jq -r --arg marker "$marker" '
              [.[] | select(.user.login == "github-actions[bot]" and (.body | startswith($marker)))]
              | last | .id // empty
            ')

          if [ -n "$comment_id" ]; then
            gh api "repos/$REPO/issues/comments/$comment_id" -X DELETE --silent
          fi

      # zizmor `artipacked` mitigation — scrub the GITHUB_TOKEN that checkout
      # persisted into .git/config (forced on by #1236, above). Drop this once
      # the checkout step can use persist-credentials:false again.
      - name: Strip persisted git credentials
        if: always()
        run: git config --unset-all http.https://github.com/.extraheader || true
