name: Pulumi CLI version drift check

# Reusable-only: each GitHub IaC repository owns its daily/main/manual trigger
# and explicitly grants this called job issues:write.
on:
  workflow_call:
    inputs:
      runner:
        description: Runner label selected by the caller's governed selector.
        type: string
        default: ubuntu-24.04

permissions: {}

concurrency:
  group: pulumi-cli-version-drift-${{ github.repository }}
  cancel-in-progress: false

jobs:
  drift-check:
    name: Detect Pulumi CLI drift
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 5
    permissions:
      contents: read
      issues: write # Maintain one auditable, non-auto-merged update record.
    steps:
      - name: Require a trusted default-branch maintenance event
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          SOURCE_REF: ${{ github.ref }}
        run: |
          case "$EVENT_NAME" in
            push|schedule|workflow_dispatch) ;;
            *) echo "::error::Unsupported drift event: $EVENT_NAME"; exit 1 ;;
          esac
          if [ "$SOURCE_REF" != 'refs/heads/main' ]; then
            echo "::error::Pulumi drift checks must use refs/heads/main; got $SOURCE_REF."
            exit 1
          fi

      - name: Check out reviewed caller state
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      # actions/github-script rather than a `gh`/`jq`-driven run step: this
      # reusable runs on whatever runner the caller selected, and a
      # self-hosted image is not guaranteed to ship the gh CLI. github-script
      # executes on the action's own bundled Node runtime, so drift detection
      # and the tracking-issue lifecycle have no runner-image dependency —
      # this also drops the `jq`/`date`/`timeout`/`mktemp` dependencies the
      # bash implementation carried. This step used to embed a generated copy
      # of .github/scripts/pulumi-version-drift.sh (an equality test kept the
      # two in sync because a reusable workflow's checkout resolves to the
      # CALLER's repository, so this workflow cannot `run: bash <script>`
      # against its own tree); that source and its generator are retired with
      # this port — the script below is now the only implementation.
      - name: Detect and record stable-version drift
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require("node:fs");

            const READ_TIMEOUT_MILLISECONDS = 60_000;

            // Mirrors the bash gh_read helper: one retry on failure, never on
            // a mutation (a timed-out mutation may already have applied
            // server-side, and a rerun reconciles observed state instead).
            async function boundedRead(operation) {
              try {
                return await operation();
              } catch (error) {
                core.warning("GitHub read failed; retrying once.");
                await new Promise((resolve) => setTimeout(resolve, 1_000));
                return await operation();
              }
            }

            const issueTitle = process.env.ISSUE_TITLE || "[Maintenance] Pulumi CLI version drift";
            const versionFile = process.env.PULUMI_VERSION_FILE || ".pulumi.version";
            const activeMarker = "<!-- ci-workflows:pulumi-cli-version-drift:v1:active -->";
            const resolvedMarker = "<!-- ci-workflows:pulumi-cli-version-drift:v1:resolved -->";

            const stat = fs.lstatSync(versionFile, { throwIfNoEntry: false });
            if (!stat || !stat.isFile()) {
              core.setFailed(`${versionFile} must be a regular reviewed file`);
              return;
            }
            const current = fs.readFileSync(versionFile, "utf8").trim();
            if (!/^\d+\.\d+\.\d+$/.test(current)) {
              core.setFailed(`${versionFile} must contain one exact stable SemVer; got '${current}'`);
              return;
            }

            const { data: latestRelease } = await boundedRead(() =>
              github.rest.repos.getLatestRelease({
                owner: "pulumi",
                repo: "pulumi",
                request: { timeout: READ_TIMEOUT_MILLISECONDS },
              }),
            );
            if (latestRelease.draft || latestRelease.prerelease) {
              core.setFailed("latest release is not stable");
              return;
            }
            const latestTag = latestRelease.tag_name;
            const latest = latestTag.replace(/^v/, "");
            if (!/^\d+\.\d+\.\d+$/.test(latest)) {
              core.setFailed(`Pulumi latest stable tag is malformed: '${latestTag}'`);
              return;
            }

            async function findActiveIncidents() {
              const issues = await boundedRead(() =>
                github.paginate(github.rest.issues.listForRepo, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  state: "all",
                  per_page: 100,
                  request: { timeout: READ_TIMEOUT_MILLISECONDS },
                }),
              );
              return issues
                .filter((issue) => !issue.pull_request && (issue.body ?? "").includes(activeMarker))
                .map((issue) => ({
                  number: issue.number,
                  title: issue.title,
                  state: issue.state,
                  created_at: issue.created_at,
                }));
            }

            let activeIncidents = await findActiveIncidents();
            if (activeIncidents.length > 1) {
              core.setFailed(`found ${activeIncidents.length} active Pulumi drift incidents; reconcile them manually`);
              return;
            }

            if (current === latest) {
              core.info(`Pulumi CLI pin is current: ${current}.`);
              if (activeIncidents.length === 1) {
                const [incident] = activeIncidents;
                if (incident.state === "open") {
                  await github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: incident.number,
                    body: `Resolved: reviewed pin is now current at \`${current}\`.`,
                    request: { timeout: READ_TIMEOUT_MILLISECONDS },
                  });
                  await github.rest.issues.update({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: incident.number,
                    state: "closed",
                    state_reason: "completed",
                    request: { timeout: READ_TIMEOUT_MILLISECONDS },
                  });
                }
                const resolvedBody = [
                  resolvedMarker,
                  "",
                  `Resolved: the reviewed Pulumi CLI pin is current at \`${current}\`.`,
                  "",
                  "This closes the prior drift incident. A future release starts a new",
                  "independently aged incident; this resolved record is never reused.",
                ].join("\n");
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: incident.number,
                  title: issueTitle,
                  body: resolvedBody,
                  request: { timeout: READ_TIMEOUT_MILLISECONDS },
                });
              }
              return;
            }

            const driftBody = [
              activeMarker,
              "",
              "The reviewed Pulumi CLI pin differs from Pulumi's latest stable release.",
              "",
              `- Pinned: \`${current}\``,
              `- Latest stable: \`${latest}\``,
              `- Release: https://github.com/pulumi/pulumi/releases/tag/${latestTag}`,
              "",
              `Review the official release and checksums, update \`${versionFile}\` in a pull`,
              "request, run locked restore plus static/mock gates, and collect a live preview",
              "where provider behavior changed. Never auto-merge this pin.",
              "",
              "This issue is refreshed daily and the scheduled workflow hard-fails after",
              "14 days of unresolved drift. Critical tool advisories require immediate review.",
            ].join("\n");

            if (activeIncidents.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: driftBody,
                request: { timeout: READ_TIMEOUT_MILLISECONDS },
              });
              activeIncidents = await findActiveIncidents();
              if (activeIncidents.length !== 1) {
                core.setFailed(`drift issue creation produced ${activeIncidents.length} active incidents; expected one`);
                return;
              }
            }

            const [incident] = activeIncidents;
            if (incident.state === "closed") {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: incident.number,
                body: "Reopened automatically because the pinned version still drifts.",
                request: { timeout: READ_TIMEOUT_MILLISECONDS },
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: incident.number,
                state: "open",
                request: { timeout: READ_TIMEOUT_MILLISECONDS },
              });
            }
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: incident.number,
              title: issueTitle,
              body: driftBody,
              request: { timeout: READ_TIMEOUT_MILLISECONDS },
            });

            const createdEpochSeconds = Date.parse(incident.created_at) / 1000;
            if (!Number.isFinite(createdEpochSeconds)) {
              core.setFailed("active drift incident has an invalid created_at value");
              return;
            }
            const nowEpochSeconds = Date.now() / 1000;
            if (createdEpochSeconds > nowEpochSeconds) {
              core.setFailed("active drift incident has a future created_at value");
              return;
            }
            const ageSeconds = nowEpochSeconds - createdEpochSeconds;
            if (ageSeconds >= 14 * 24 * 60 * 60) {
              core.setFailed(`Pulumi CLI pin has drifted for at least 14 days (${current} -> ${latest})`);
              return;
            }
            const ageDays = Math.floor(ageSeconds / 86400);
            core.warning(`Pulumi CLI drift is ${ageDays} day(s) old: ${current} -> ${latest}.`);
