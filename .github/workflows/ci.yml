name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Dogfood: this repo is the first consumer of its own composite actions. Each
# lane checks out this repo and runs a lane action against the vendored config
# copy; the local ci-status gateway aggregates them into the single required
# check. Local (./) action refs work here because the checkout IS this repo.
jobs:
  markdown:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint markdown
        uses: ./.github/actions/markdown

  powershell:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Analyze PowerShell
        uses: ./.github/actions/powershell

  links:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check links and anchors (offline)
        uses: ./.github/actions/lychee-offline

  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint and format-check Python
        uses: ./.github/actions/ruff

  pyright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Type-check Python
        # The vendored ruleset ships no project-scope `include`, so scope Pyright
        # at the dogfood source explicitly.
        uses: ./.github/actions/pyright
        with:
          paths: fixtures/python/good

  biome:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint and format-check JS/TS
        # Biome has no CLI exclude, so scope at the conforming fixture (the repo
        # carries no other JS/TS source).
        uses: ./.github/actions/biome
        with:
          paths: fixtures/typescript/good

  tsc:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Type-check TypeScript
        # The vendored ruleset ships no project-scope `include`, so point tsc at
        # the fixture project that extends it and supplies `include`.
        uses: ./.github/actions/tsc
        with:
          project: fixtures/typescript/good/tsconfig.json

  dotnet-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build .NET (analyzers + code-style as errors)
        # The vendored fixture imports the overlay's props (which wire
        # dotnet.globalconfig); scope the build at it (the repo carries no other
        # .NET source).
        uses: ./.github/actions/dotnet-build
        with:
          project: fixtures/dotnet/good/good.csproj

  dotnet-format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify .NET whitespace
        uses: ./.github/actions/dotnet-format
        with:
          project: fixtures/dotnet/good/good.csproj

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Spell-check
        uses: ./.github/actions/typos

  editorconfig:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check editorconfig conformance
        uses: ./.github/actions/editorconfig

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan for secrets
        uses: ./.github/actions/gitleaks

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint workflows
        uses: ./.github/actions/actionlint

  jsonschema:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate dependabot.yml
        uses: ./.github/actions/check-jsonschema
        with:
          builtin-schema: vendor.dependabot
          files: .github/dependabot.yml
      - name: Validate workflows
        uses: ./.github/actions/check-jsonschema
        with:
          builtin-schema: vendor.github-workflows
          files: >-
            .github/workflows/ci.yml
            .github/workflows/link-check.yml
            .github/workflows/zizmor.yml
            .github/workflows/osv-scanner.yml
            .github/workflows/claude-review.yml
            .github/workflows/claude-review-self.yml

  exec-bit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify shebang files are executable
        uses: ./.github/actions/exec-bit

  machine-specific-paths:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for machine-specific paths
        # The bundled pattern script contains the literal regex bodies, so skip
        # the action's own dir to avoid self-matching.
        uses: ./.github/actions/machine-specific-paths
        with:
          exclude: ':(exclude).github/actions/machine-specific-paths/**'

  eol-renormalize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check index-level EOL drift
        uses: ./.github/actions/eol-renormalize

  comment-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan comment hygiene
        # The bundled scan script and the vendored policy library reference the
        # literal marker tokens in their own comments, so skip the action's own
        # source and the module to avoid self-matching.
        uses: ./.github/actions/comment-hygiene
        with:
          exclude: ':(exclude).github/actions/comment-hygiene/** :(exclude)modules/comment-hygiene/**'

  zizmor:
    permissions:
      contents: read
    # Audit this repo's own workflows AND composite actions (paths: .) — strong
    # dogfood. Advisory: findings annotate without blocking ci-status.
    uses: ./.github/workflows/zizmor.yml
    with:
      paths: .

  osv-scanner:
    permissions:
      actions: read
      contents: read
      security-events: write
    uses: ./.github/workflows/osv-scanner.yml
    with:
      # This repo carries no dependency manifests, so allow an empty scan: the
      # dogfood proves the wrapper's wiring (inputs forward, permissions parse,
      # advisory posture holds) without inventing a fixture manifest.
      scan-args: |-
        -r
        ./
        --allow-no-lockfiles

  ci-status:
    if: always()
    needs: [markdown, powershell, links, ruff, pyright, biome, tsc, dotnet-build, dotnet-format, typos, editorconfig, gitleaks, actionlint, jsonschema, exec-bit, machine-specific-paths, eol-renormalize, comment-hygiene, zizmor, osv-scanner]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Aggregate lane results
        env:
          RESULTS: ${{ needs.markdown.result }} ${{ needs.powershell.result }} ${{ needs.links.result }} ${{ needs.ruff.result }} ${{ needs.pyright.result }} ${{ needs.biome.result }} ${{ needs.tsc.result }} ${{ needs.dotnet-build.result }} ${{ needs.dotnet-format.result }} ${{ needs.typos.result }} ${{ needs.editorconfig.result }} ${{ needs.gitleaks.result }} ${{ needs.actionlint.result }} ${{ needs.jsonschema.result }} ${{ needs.exec-bit.result }} ${{ needs.machine-specific-paths.result }} ${{ needs.eol-renormalize.result }} ${{ needs.comment-hygiene.result }} ${{ needs.zizmor.result }} ${{ needs.osv-scanner.result }}
        run: |
          read -ra results <<< "$RESULTS"
          for r in "${results[@]}"; do
            case "$r" in
              success|skipped) ;;
              *) echo "A lane did not pass (result: $r)."; exit 1 ;;
            esac
          done
          echo "All lanes passed or were skipped."
