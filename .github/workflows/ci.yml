name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Dogfood: this repo is the first consumer of its own composite actions. Each
# lane checks out this repo and runs a lane action against the vendored config
# copy; the local ci-status gateway aggregates them into the single required
# check. Local (./) action refs work here because the checkout IS this repo.
jobs:
  markdown:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint markdown
        uses: ./.github/actions/markdown

  powershell:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Analyze PowerShell
        uses: ./.github/actions/powershell

  links:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check links and anchors (offline)
        uses: ./.github/actions/lychee-offline

  ci-status:
    if: always()
    needs: [markdown, powershell, links]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Aggregate lane results
        env:
          RESULTS: ${{ needs.markdown.result }} ${{ needs.powershell.result }} ${{ needs.links.result }}
        run: |
          for r in $RESULTS; do
            case "$r" in
              success|skipped) ;;
              *) echo "A lane did not pass (result: $r)."; exit 1 ;;
            esac
          done
          echo "All lanes passed or were skipped."
