name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Dogfood: this repo is the first consumer of its own composite actions. Each
# lane checks out this repo and runs a lane action against the vendored config
# copy; the local ci-status gateway aggregates them into the single required
# check. Local (./) action refs work here because the checkout IS this repo.
jobs:
  markdown:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint markdown
        uses: ./.github/actions/markdown

  powershell:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Analyze PowerShell
        uses: ./.github/actions/powershell

  links:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check links and anchors (offline)
        uses: ./.github/actions/lychee-offline

  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint and format-check Python
        uses: ./.github/actions/ruff

  pyright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Type-check Python
        # The vendored ruleset ships no project-scope `include`, so scope Pyright
        # at the dogfood source explicitly.
        uses: ./.github/actions/pyright
        with:
          paths: fixtures/python/good

  biome:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint and format-check JS/TS
        # Biome has no CLI exclude, so scope at the conforming fixture (the repo
        # carries no other JS/TS source).
        uses: ./.github/actions/biome
        with:
          paths: fixtures/typescript/good

  tsc:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Type-check TypeScript
        # The vendored ruleset ships no project-scope `include`, so point tsc at
        # the fixture project that extends it and supplies `include`.
        uses: ./.github/actions/tsc
        with:
          project: fixtures/typescript/good/tsconfig.json

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Spell-check
        uses: ./.github/actions/typos

  editorconfig:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check editorconfig conformance
        uses: ./.github/actions/editorconfig

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan for secrets
        uses: ./.github/actions/gitleaks

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint workflows
        uses: ./.github/actions/actionlint

  jsonschema:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate dependabot.yml
        uses: ./.github/actions/check-jsonschema
        with:
          builtin-schema: vendor.dependabot
          files: .github/dependabot.yml
      - name: Validate workflows
        uses: ./.github/actions/check-jsonschema
        with:
          builtin-schema: vendor.github-workflows
          files: .github/workflows/ci.yml .github/workflows/link-check.yml

  ci-status:
    if: always()
    needs: [markdown, powershell, links, ruff, pyright, biome, tsc, typos, editorconfig, gitleaks, actionlint, jsonschema]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Aggregate lane results
        env:
          RESULTS: ${{ needs.markdown.result }} ${{ needs.powershell.result }} ${{ needs.links.result }} ${{ needs.ruff.result }} ${{ needs.pyright.result }} ${{ needs.biome.result }} ${{ needs.tsc.result }} ${{ needs.typos.result }} ${{ needs.editorconfig.result }} ${{ needs.gitleaks.result }} ${{ needs.actionlint.result }} ${{ needs.jsonschema.result }}
        run: |
          read -ra results <<< "$RESULTS"
          for r in "${results[@]}"; do
            case "$r" in
              success|skipped) ;;
              *) echo "A lane did not pass (result: $r)."; exit 1 ;;
            esac
          done
          echo "All lanes passed or were skipped."
