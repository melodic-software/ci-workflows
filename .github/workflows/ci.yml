name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Dogfood: this repo is the first consumer of its own composite actions. Each
# lane checks out this repo and runs a lane action against either a root-native
# standards config or a small fixture-local contract input; the local ci-status
# gateway aggregates them into the single required check. Local (./) action refs
# work here because the checkout IS this repo.
jobs:
  markdown:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint markdown
        uses: ./.github/actions/markdown

  powershell:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Analyze PowerShell
        uses: ./.github/actions/powershell

  links:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check links and anchors (offline)
        uses: ./.github/actions/lychee-offline

  reference-integrity:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Resolve heading citations
        # Scope to the fixture corpus: the repo's own docs use no `file.md`
        # "Anchor" prose-cite convention, so the fixture is what exercises it.
        uses: ./.github/actions/reference-integrity
        with:
          globs: fixtures/reference-integrity/*.md

  ruff:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint and format-check Python
        uses: ./.github/actions/ruff
        with:
          paths: fixtures/python/good
          config: fixtures/python/good/ruff.toml

  pyright:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Type-check Python
        uses: ./.github/actions/pyright
        with:
          config: fixtures/python/good/pyrightconfig.json

  biome:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint and format-check JS/TS
        # Biome has no CLI exclude, so scope at the conforming contract fixture.
        uses: ./.github/actions/biome
        with:
          paths: fixtures/typescript/good
          config: fixtures/typescript/good/biome.json

  tsc:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Type-check TypeScript
        # Point tsc at a self-contained fixture project; this lane verifies the
        # action contract without mirroring the standards catalog.
        uses: ./.github/actions/tsc
        with:
          project: fixtures/typescript/good/tsconfig.json

  dotnet-build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build .NET contract fixture
        # Scope at a self-contained fixture project; this lane verifies the
        # action contract without mirroring the standards catalog.
        uses: ./.github/actions/dotnet-build
        with:
          project: fixtures/dotnet/good/good.csproj

  dotnet-format:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify .NET whitespace
        uses: ./.github/actions/dotnet-format
        with:
          project: fixtures/dotnet/good/good.csproj

  typos:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Spell-check
        uses: ./.github/actions/typos

  editorconfig:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check editorconfig conformance
        uses: ./.github/actions/editorconfig

  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan for secrets
        uses: ./.github/actions/gitleaks

  actionlint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint workflows
        uses: ./.github/actions/actionlint

  jsonschema:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate dependabot.yml
        uses: ./.github/actions/check-jsonschema
        with:
          builtin-schema: vendor.dependabot
          files: .github/dependabot.yml
      - name: Validate workflows
        uses: ./.github/actions/check-jsonschema
        with:
          builtin-schema: vendor.github-workflows
          files: .github/workflows/*.yml
      - name: Validate composite actions
        uses: ./.github/actions/check-jsonschema
        with:
          builtin-schema: vendor.github-actions
          files: .github/actions/*/action.yml

  exec-bit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify shebang files are executable
        uses: ./.github/actions/exec-bit

  machine-specific-paths:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for machine-specific paths
        # The bundled pattern script contains the literal regex bodies, so skip
        # the action's own dir to avoid self-matching.
        uses: ./.github/actions/machine-specific-paths
        with:
          exclude: ':(exclude).github/actions/machine-specific-paths/**'

  eol-renormalize:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check index-level EOL drift
        uses: ./.github/actions/eol-renormalize

  comment-hygiene:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify prefilter is a superset of the policy library
        # Self-enforces the scan's load-bearing invariant: the coarse git-grep
        # prefilter must admit every line the bundled default policy flags, or
        # the gate fails open.
        shell: bash
        run: bash .github/actions/comment-hygiene/superset-test.sh
      - name: Scan comment hygiene
        # The bundled scan and policy reference the literal marker tokens in
        # their own comments, so skip the action's source to avoid self-matching.
        uses: ./.github/actions/comment-hygiene
        with:
          exclude: ':(exclude).github/actions/comment-hygiene/**'

  shellcheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint shell scripts
        uses: ./.github/actions/shellcheck

  shfmt:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check shell formatting
        # shfmt is a formatter; like the biome/dotnet-format lanes it dogfoods a
        # conforming fixture (the repo's own scripts predate this lane and use a
        # switch-case indent .editorconfig does not declare).
        uses: ./.github/actions/shfmt
        with:
          paths: fixtures/shell/good

  zizmor:
    permissions:
      contents: read
    # Audit this repo's own workflows AND composite actions (paths: .) — strong
    # dogfood. Advisory: findings annotate without blocking ci-status.
    uses: ./.github/workflows/zizmor.yml
    with:
      paths: .

  osv-scanner:
    permissions:
      contents: read
    uses: ./.github/workflows/osv-scanner.yml
    with:
      # This repo carries no dependency lockfiles, so declare it dependency-less
      # and let the empty scan pass: the dogfood proves the wrapper's wiring
      # (inputs forward, advisory posture holds) without inventing a fixture
      # manifest.
      allow-no-lockfiles: true

  pester:
    permissions:
      contents: read
    # Dogfood the reusable Pester workflow on a minimal fixture suite — proves
    # the runner + pinned-Pester wiring (Windows by default). Blocking: a failing
    # assertion fails the lane.
    uses: ./.github/workflows/pester.yml
    with:
      run: Invoke-Pester -Path fixtures/pester -CI

  ci-status:
    if: always()
    needs: [markdown, powershell, links, reference-integrity, ruff, pyright, biome, tsc, dotnet-build, dotnet-format, typos, editorconfig, gitleaks, shellcheck, shfmt, actionlint, jsonschema, exec-bit, machine-specific-paths, eol-renormalize, comment-hygiene, pester, zizmor, osv-scanner]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Aggregate lane results
        env:
          RESULTS: ${{ needs.markdown.result }} ${{ needs.powershell.result }} ${{ needs.links.result }} ${{ needs.reference-integrity.result }} ${{ needs.ruff.result }} ${{ needs.pyright.result }} ${{ needs.biome.result }} ${{ needs.tsc.result }} ${{ needs.dotnet-build.result }} ${{ needs.dotnet-format.result }} ${{ needs.typos.result }} ${{ needs.editorconfig.result }} ${{ needs.gitleaks.result }} ${{ needs.shellcheck.result }} ${{ needs.shfmt.result }} ${{ needs.actionlint.result }} ${{ needs.jsonschema.result }} ${{ needs.exec-bit.result }} ${{ needs.machine-specific-paths.result }} ${{ needs.eol-renormalize.result }} ${{ needs.comment-hygiene.result }} ${{ needs.pester.result }} ${{ needs.zizmor.result }} ${{ needs.osv-scanner.result }}
        run: |
          read -ra results <<< "$RESULTS"
          for r in "${results[@]}"; do
            case "$r" in
              success|skipped) ;;
              *) echo "A lane did not pass (result: $r)."; exit 1 ;;
            esac
          done
          echo "All lanes passed or were skipped."
