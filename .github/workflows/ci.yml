name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# The PR number is only set on pull_request, so PR pushes cancel superseded
# runs while main pushes get a unique run_id group and always run to
# completion. Keying on the PR number (not head_ref) keeps fork PRs that share
# a branch name from cancelling each other's required runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

# Dogfood: this repo is the first consumer of its own composite actions. Each
# lane checks out this repo and runs a lane action against either a root-native
# standards config or a small fixture-local contract input; the local ci-status
# gateway aggregates them into the single required check. Local (./) action refs
# work here because the checkout IS this repo.
jobs:
  markdown:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint markdown
        uses: ./.github/actions/markdown

  powershell:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Analyze PowerShell
        uses: ./.github/actions/powershell

  links:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check links and anchors (offline)
        uses: ./.github/actions/lychee-offline

  reference-integrity:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Resolve heading citations
        # Scope to the fixture corpus: the repo's own docs use no `file.md`
        # "Anchor" prose-cite convention, so the fixture is what exercises it.
        uses: ./.github/actions/reference-integrity
        with:
          globs: fixtures/reference-integrity/*.md

  ruff:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint and format-check Python
        uses: ./.github/actions/ruff
        with:
          paths: fixtures/python/good
          config: fixtures/python/good/ruff.toml

  pyright:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Type-check Python
        uses: ./.github/actions/pyright
        with:
          config: fixtures/python/good/pyrightconfig.json

  biome:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint and format-check JS/TS
        # Biome has no CLI exclude, so scope at the conforming fixture and the
        # selector's tested CommonJS source/generator/tests.
        uses: ./.github/actions/biome
        with:
          paths: fixtures/typescript/good .github/scripts
          config: fixtures/typescript/good/biome.json

  tsc:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Type-check TypeScript
        # Point tsc at a self-contained fixture project; this lane verifies the
        # action contract without mirroring the standards catalog.
        uses: ./.github/actions/tsc
        with:
          project: fixtures/typescript/good/tsconfig.json

  dotnet-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build .NET contract fixture
        # Scope at a self-contained fixture project; this lane verifies the
        # action contract without mirroring the standards catalog.
        uses: ./.github/actions/dotnet-build
        with:
          project: fixtures/dotnet/good/good.csproj

  dotnet-format:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify .NET whitespace
        uses: ./.github/actions/dotnet-format
        with:
          project: fixtures/dotnet/good/good.csproj

  typos:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Spell-check
        uses: ./.github/actions/typos

  editorconfig:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check editorconfig conformance
        uses: ./.github/actions/editorconfig

  gitleaks:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Scan for secrets
        uses: ./.github/actions/gitleaks

  actionlint:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint workflows
        uses: ./.github/actions/actionlint
      - name: Prove embedded scripts are checked by ShellCheck
        run: |
          set -euo pipefail
          expected_version="$(awk '
            $0 == "  shellcheck-version:" { in_input=1; next }
            in_input && /^  [^ ]/ { exit }
            in_input && /^    default: / { sub(/^    default: /, ""); print; exit }
          ' .github/actions/actionlint/action.yml)"
          actual_version="$(shellcheck --version | awk '$1 == "version:" { print $2 }')"
          if [[ -z "$expected_version" || "$actual_version" != "$expected_version" ]]; then
            echo "::error::Expected ShellCheck $expected_version, got $actual_version."
            exit 1
          fi
          output="$RUNNER_TEMP/actionlint-shellcheck.txt"
          if actionlint .github/actions/actionlint/fixtures/shellcheck.yml >"$output" 2>&1; then
            echo '::error::The intentional ShellCheck fixture unexpectedly passed actionlint.'
            exit 1
          fi
          cat "$output"
          grep -F '[shellcheck]' "$output"
          grep -F 'SC2086' "$output"

  lefthook-validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate composed Lefthook config
        uses: ./.github/actions/lefthook-validate
        with:
          config-file: .github/actions/lefthook-validate/fixtures/good/lefthook.yml
      - name: Prove invalid extended fragments fail
        run: bash .github/scripts/lefthook-validate.test.sh

  jsonschema:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Validate dependabot.yml
        uses: ./.github/actions/check-jsonschema
        with:
          builtin-schema: vendor.dependabot
          files: .github/dependabot.yml
      - name: Validate workflows
        uses: ./.github/actions/check-jsonschema
        with:
          builtin-schema: vendor.github-workflows
          files: .github/workflows/*.yml
      - name: Validate composite actions
        uses: ./.github/actions/check-jsonschema
        with:
          builtin-schema: vendor.github-actions
          files: .github/actions/*/action.yml

  exec-bit:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify shebang files are executable
        uses: ./.github/actions/exec-bit

  machine-specific-paths:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check for machine-specific paths
        # The bundled pattern script contains the literal regex bodies, so skip
        # the action's own dir to avoid self-matching.
        uses: ./.github/actions/machine-specific-paths
        with:
          exclude: ':(exclude).github/actions/machine-specific-paths/**'

  eol-renormalize:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check index-level EOL drift
        uses: ./.github/actions/eol-renormalize

  comment-hygiene:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Verify prefilter is a superset of the policy library
        # Self-enforces the scan's load-bearing invariant: the coarse git-grep
        # prefilter must admit every line the bundled default policy flags, or
        # the gate fails open.
        shell: bash
        run: bash .github/actions/comment-hygiene/superset-test.sh
      - name: Scan comment hygiene
        # The bundled scan and policy reference the literal marker tokens in
        # their own comments, so skip the action's source to avoid self-matching.
        uses: ./.github/actions/comment-hygiene
        with:
          exclude: ':(exclude).github/actions/comment-hygiene/**'

  shellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Lint shell scripts
        uses: ./.github/actions/shellcheck
      - name: Test ShellCheck discovery and scoped exclusions
        run: bash .github/actions/shellcheck/run.test.sh

  shfmt:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Check shell formatting
        # The root EditorConfig owns the same two-space, case-indented contract
        # as `shfmt -i 2 -ci`; include the selector/OSV shell sources so their
        # generated security boundary cannot bypass the required formatter.
        uses: ./.github/actions/shfmt
        with:
          paths: fixtures/shell/good .github/scripts .github/actions/pulumi-deploy-guard

  selector-contract:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.18.0
          package-manager-cache: false
      - name: Test selector and generated workflow contracts
        run: node --test .github/scripts/*.test.cjs
      - name: Test OSV scan policy guard
        run: bash .github/scripts/osv-scan-guard.test.sh
      - name: Test OSV release digest parsing
        run: bash .github/scripts/osv-release-digest.test.sh
      - name: Test tracking-issue resolver
        run: bash .github/scripts/find-tracking-issue.test.sh
      - name: Test Gitleaks scan policy guard
        run: bash .github/actions/gitleaks/scan.test.sh
      - name: Test Pulumi deployment guard
        run: bash .github/actions/pulumi-deploy-guard/guard.test.sh
      - name: Test Pulumi version-drift lifecycle
        run: bash .github/scripts/pulumi-version-drift.test.sh
      - name: Test govulncheck SARIF classification
        run: bash .github/scripts/govulncheck-sarif-guard.test.sh

  zizmor:
    permissions:
      contents: read
    # Audit this repo's own workflows AND composite actions (paths: .) — strong
    # dogfood. Advisory: findings annotate without blocking ci-status.
    uses: ./.github/workflows/zizmor.yml
    with:
      paths: .

  osv-scanner:
    permissions:
      contents: read
    uses: ./.github/workflows/osv-scanner.yml
    with:
      # This public repository's hosted lane is free; private consumers must pass
      # their strict selector output instead.
      runner: ubuntu-24.04
      # This repo carries no dependency lockfiles, so declare it dependency-less
      # and let the empty scan pass: the dogfood proves the wrapper's wiring
      # (inputs forward, advisory posture holds) without inventing a fixture
      # manifest.
      allow-no-lockfiles: true

  pester:
    permissions:
      contents: read
    # Dogfood the reusable Pester workflow on a minimal fixture suite — proves
    # the runner + pinned-Pester wiring (Windows by default). Blocking: a failing
    # assertion fails the lane.
    uses: ./.github/workflows/pester.yml
    with:
      run: Invoke-Pester -Path fixtures/pester -CI

  go-quality-dogfood:
    permissions:
      contents: read
    # A local reusable-workflow reference executes the workflow from this exact
    # commit. The fixture includes a Windows-only assertion that the test binary
    # was built with the race detector, so this is behavioral hosted-runner
    # evidence rather than a source-text contract alone.
    uses: ./.github/workflows/go-quality.yml
    with:
      config: .golangci.yml
      working-directory: fixtures/go/windows-race
      go-version-file: fixtures/go/windows-race/go.mod

  ci-status:
    if: always()
    needs: [markdown, powershell, links, reference-integrity, ruff, pyright, biome, tsc, dotnet-build, dotnet-format, typos, editorconfig, gitleaks, shellcheck, shfmt, selector-contract, actionlint, lefthook-validate, jsonschema, exec-bit, machine-specific-paths, eol-renormalize, comment-hygiene, pester, go-quality-dogfood, zizmor, osv-scanner]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Aggregate lane results
        uses: ./.github/actions/ci-status
        with:
          results: ${{ needs.markdown.result }} ${{ needs.powershell.result }} ${{ needs.links.result }} ${{ needs.reference-integrity.result }} ${{ needs.ruff.result }} ${{ needs.pyright.result }} ${{ needs.biome.result }} ${{ needs.tsc.result }} ${{ needs.dotnet-build.result }} ${{ needs.dotnet-format.result }} ${{ needs.typos.result }} ${{ needs.editorconfig.result }} ${{ needs.gitleaks.result }} ${{ needs.shellcheck.result }} ${{ needs.shfmt.result }} ${{ needs.selector-contract.result }} ${{ needs.actionlint.result }} ${{ needs.lefthook-validate.result }} ${{ needs.jsonschema.result }} ${{ needs.exec-bit.result }} ${{ needs.machine-specific-paths.result }} ${{ needs.eol-renormalize.result }} ${{ needs.comment-hygiene.result }} ${{ needs.pester.result }} ${{ needs.go-quality-dogfood.result }} ${{ needs.zizmor.result }} ${{ needs.osv-scanner.result }}
