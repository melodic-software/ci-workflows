name: Tool Version Drift Check

# Advisory — NOT in any ci-status gate; never blocks a merge. Surfaces a rolling
# tracking issue when an upstream tool releases a stable version past a reviewed
# composite-action default, runtime input default, or shell-invoked image pin.
#
# Dependabot cannot see these: its github-actions ecosystem updates only `uses:`
# SHAs, and a tool version embedded in an action.yml input default, curl URL, or
# shell-invoked release checksum has no package manifest to track (see
# .github/dependabot.yml). The operator absorbs every flagged bump deliberately;
# this workflow never rewrites or auto-merges a software/supply-chain pin.

on:
  schedule:
    # Daily 07:00 UTC — detects reviewed-pin drift within 24 hours.
    - cron: '0 7 * * *'
  push:
    branches: [main]
    paths:
      - '.github/workflows/tool-version-drift-check.yml'
      - '.github/workflows/osv-scanner.yml'
      - '.github/workflows/claude-e2e-verify.yml'
      - 'global.json'
      - '.github/osv-scanner-pin.json'
      - '.github/actions/actionlint/action.yml'
      - '.github/actions/lefthook-validate/action.yml'
      - '.github/actions/shellcheck/action.yml'
      - '.github/scripts/actionlint-shellcheck-pin.test.cjs'
      - '.github/scripts/osv-release-digest.sh'
      - '.github/scripts/osv-release-digest.test.sh'
  workflow_dispatch:

concurrency:
  group: tool-version-drift-check-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  drift-check:
    name: Detect tool-version drift
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write # Rolling tracking issue create/update via create-issue-from-file.
    steps:
      - name: Check out
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Detect drift
        id: drift
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Registry/API discovery is read-only. Bound every attempt, and retry
          # at most once; a rerun is always safer than an indefinitely hung
          # maintenance job.
          bounded_read() {
            local limit_seconds="$1" attempt output status
            shift
            output="$(mktemp "$RUNNER_TEMP/bounded-read.XXXXXXXX")"
            for attempt in 1 2; do
              if timeout --signal=TERM --kill-after=5s "${limit_seconds}s" "$@" >"$output"; then
                cat -- "$output"
                rm -f -- "$output"
                return 0
              else
                status=$?
              fi
              if ((attempt == 1)); then
                echo '::warning::Read failed; retrying once.' >&2
                sleep 1
              fi
            done
            rm -f -- "$output"
            return "$status"
          }

          curl_small_json() {
            curl --fail --silent --show-error --location --proto '=https' \
              --connect-timeout 10 --max-time 30 \
              --retry 2 --retry-max-time 90 "$@"
          }

          # Manifest: "<action-dir>:<version-input-key>:<source>:<upstream-id>".
          # The action.yml version default is the single source of truth for the
          # current pin; <source> selects the registry to query for latest stable.
          # actionlint's ShellCheck inputs are intentionally not a second drift
          # entry: actionlint-shellcheck-pin.test.cjs requires them to equal the
          # canonical shellcheck action, whose entry appears below.
          # An optional 5th field is the github tag prefix to strip (default "v";
          # lychee tags as lychee-vX.Y.Z).
          tools=(
            "shellcheck:version:github:koalaman/shellcheck"
            "shfmt:version:github:mvdan/sh"
            "typos:version:github:crate-ci/typos"
            "editorconfig:version:github:editorconfig-checker/editorconfig-checker"
            "gitleaks:version:github:gitleaks/gitleaks"
            "actionlint:version:github:rhysd/actionlint"
            "lefthook-validate:version:github:evilmartians/lefthook"
            "lychee-offline:version:github:lycheeverse/lychee:lychee-v"
            "ruff:version:github:astral-sh/ruff"
            "powershell:analyzer-version:github:PowerShell/PSScriptAnalyzer"
            "check-jsonschema:version:pypi:check-jsonschema"
            "pyright:version:pypi:pyright"
            "markdown:version:npm:markdownlint-cli2"
            "biome:version:npm:@biomejs/biome"
            "tsc:version:npm:typescript"
          )

          # Read inputs.<key>.default from an action.yml with yq (mikefarah,
          # preinstalled on ubuntu-24.04). The quoted key handles the hyphen in
          # analyzer-version; a missing key yields the literal "null".
          # $2: tag prefix to strip (default "v"; e.g. "lychee-v").
          latest_github() { bounded_read 60 gh api "repos/$1/releases/latest" --jq '.tag_name' | sed "s/^${2:-v}//"; }
          latest_pypi() { curl_small_json "https://pypi.org/pypi/$1/json" | jq -r '.info.version'; }
          latest_npm() {
            # URL-encode a scoped package's leading @ and / (e.g. @biomejs/biome).
            local enc="${1//@/%40}"; enc="${enc//\//%2F}"
            curl_small_json "https://registry.npmjs.org/$enc/latest" | jq -r '.version'
          }
          drift_lines=""
          for entry in "${tools[@]}"; do
            IFS=: read -r dir key source id strip <<<"$entry"
            file=".github/actions/${dir}/action.yml"
            current="$(yq ".inputs.\"${key}\".default" "$file")"
            if [[ -z "$current" || "$current" == "null" ]]; then
              echo "::error::could not read ${key} default from ${file}"
              exit 1
            fi
            # `|| latest=''` so a transient registry failure (rate limit, 5xx,
            # network blip) under set -e + pipefail does not abort the whole
            # daily run; the empty/null guard below then skips just that tool.
            case "$source" in
              github) latest="$(latest_github "$id" "$strip")" || latest='' ;;
              pypi) latest="$(latest_pypi "$id")" || latest='' ;;
              npm) latest="$(latest_npm "$id")" || latest='' ;;
              *) echo "::error::unknown source '${source}' for ${dir}"; exit 1 ;;
            esac
            if [[ -z "$latest" || "$latest" == "null" ]]; then
              echo "::warning::could not resolve latest for ${id} (${source}); skipping"
              continue
            fi
            lowest="$(printf '%s\n%s\n' "$current" "$latest" | sort -V | head -1)"
            if [[ "$lowest" == "$current" && "$current" != "$latest" ]]; then
              drift_lines+="- **${dir}** (\`${id}\`): pinned \`${current}\`, upstream latest \`${latest}\`"$'\n'
              echo "DRIFT ${dir}: ${current} -> ${latest}"
            else
              echo "ok    ${dir}: ${current} (latest ${latest})"
            fi
          done

          # The composite actions still ship exact language runtimes as input
          # defaults (and the repo's root global.json pins its own .NET SDK,
          # which the dotnet actions' fallback steps track in lockstep).
          # Dependabot cannot update input defaults, so watch the current
          # stable patch within each reviewed major/minor line through the
          # upstream first-party release indexes, and require every family's
          # pins to agree before comparing.
          latest_dotnet_sdk() {
            local channel="${1%%.*}.0"
            curl_small_json https://builds.dotnet.microsoft.com/dotnet/release-metadata/releases-index.json |
              jq -er --arg channel "$channel" '
                .["releases-index"][] |
                select(.["channel-version"] == $channel) |
                .["latest-sdk"]
              '
          }
          latest_node_runtime() {
            local prefix="v${1%%.*}."
            curl_small_json https://nodejs.org/dist/index.json |
              jq -er --arg prefix "$prefix" '
                [.[] | select(.lts != false and (.version | startswith($prefix)))] |
                sort_by(.version[1:] | split(".") | map(tonumber)) |
                last.version[1:]
              '
          }
          latest_python_runtime() {
            local prefix="${1%.*}."
            curl_small_json https://raw.githubusercontent.com/actions/python-versions/main/versions-manifest.json |
              jq -er --arg prefix "$prefix" '
                [.[] | select(.stable == true and (.version | startswith($prefix)))] |
                sort_by(.version | split(".") | map(tonumber)) |
                last.version
              '
          }

          dotnet_current="$(jq -er '.sdk.version' global.json)"
          node_current="$(yq '.inputs."node-version".default' .github/actions/markdown/action.yml)"
          python_current="$(yq '.inputs."python-version".default' .github/actions/ruff/action.yml)"
          for value in "$dotnet_current" "$node_current" "$python_current"; do
            if [[ -z "$value" || "$value" == "null" ]]; then
              echo "::error::could not read a runtime pin (dotnet=$dotnet_current node=$node_current python=$python_current)"
              exit 1
            fi
          done
          for file in .github/actions/biome/action.yml .github/actions/tsc/action.yml; do
            sibling="$(yq '.inputs."node-version".default' "$file")"
            if [[ "$sibling" != "$node_current" ]]; then
              echo "::error::node-version defaults diverge: ${file} pins ${sibling}, markdown pins ${node_current}"
              exit 1
            fi
          done
          for file in .github/actions/pyright/action.yml .github/actions/check-jsonschema/action.yml; do
            sibling="$(yq '.inputs."python-version".default' "$file")"
            if [[ "$sibling" != "$python_current" ]]; then
              echo "::error::python-version defaults diverge: ${file} pins ${sibling}, ruff pins ${python_current}"
              exit 1
            fi
          done
          # dotnet-build and dotnet-format resolve their fallback SDK version
          # by pointing setup-dotnet's global-json-file input at this repo's
          # own root global.json (via github.action_path), so they can never
          # drift from it — this only guards against a regression back to a
          # hardcoded literal. dependabot-lock-regen.yml has no equivalent
          # action_path to reach a bundled global.json (its first step checks
          # out the *caller's* PR head, not this repo), so it still carries a
          # literal fallback pin that must be checked against global.json.
          # Matched as a split regex, deliberately never spelling out a
          # complete double-curly expression anywhere below (not even in this
          # comment): this whole run: script is substituted by the GitHub
          # Actions engine as plain text before Bash ever sees it, so a
          # literal double-curly github.action_path reference here would be
          # evaluated in *this* workflow's context (where it's undefined
          # outside a composite action) instead of reaching grep intact.
          for file in .github/actions/dotnet-build/action.yml .github/actions/dotnet-format/action.yml; do
            if ! grep -q 'global-json-file:.*github\.action_path.*\.\./\.\./\.\./global\.json' "$file"; then
              echo "::error::${file} no longer resolves its .NET fallback from global.json"
              exit 1
            fi
          done
          if ! grep -q "dotnet-version: ${dotnet_current}$" .github/workflows/dependabot-lock-regen.yml; then
            echo "::error::.github/workflows/dependabot-lock-regen.yml fallback SDK pin diverges from global.json (${dotnet_current})"
            exit 1
          fi

          runtimes=(
            "dotnet:.NET SDK:$dotnet_current"
            "node:Node.js:$node_current"
            "python:Python:$python_current"
          )
          for entry in "${runtimes[@]}"; do
            IFS=: read -r source label current <<<"$entry"
            case "$source" in
              dotnet) latest="$(latest_dotnet_sdk "$current")" || latest='' ;;
              node) latest="$(latest_node_runtime "$current")" || latest='' ;;
              python) latest="$(latest_python_runtime "$current")" || latest='' ;;
              *) echo "::error::unknown runtime source '${source}'"; exit 1 ;;
            esac
            if [[ -z "$latest" || "$latest" == "null" ]]; then
              echo "::warning::could not resolve latest ${label}; skipping"
              continue
            fi
            lowest="$(printf '%s\n%s\n' "$current" "$latest" | sort -V | head -1)"
            if [[ "$lowest" == "$current" && "$current" != "$latest" ]]; then
              drift_lines+="- **Runtime ${label}**: pinned \`${current}\`, reviewed line latest \`${latest}\`"$'\n'
              echo "DRIFT runtime ${label}: ${current} -> ${latest}"
            else
              echo "ok    runtime ${label}: ${current} (line latest ${latest})"
            fi
          done

          # The OSV workflow installs an official native release asset from
          # shell, so Dependabot cannot track it. Compare the latest stable
          # release and GitHub-reported digests for the reviewed release assets.
          osv_pin=.github/osv-scanner-pin.json
          osv_current="$(jq -er '.version' "$osv_pin")"
          osv_asset="$(jq -er '.binary.asset' "$osv_pin")"
          osv_digest="$(jq -er '.binary.sha256' "$osv_pin")"
          osv_provenance_asset="$(jq -er '.provenance.asset' "$osv_pin")"
          osv_provenance_digest="$(jq -er '.provenance.sha256' "$osv_pin")"
          osv_release="$(bounded_read 60 gh api repos/google/osv-scanner/releases/latest)" || osv_release=''
          osv_tag="$(jq -r '.tag_name // empty' <<<"$osv_release" 2>/dev/null)" || osv_tag=''
          osv_latest="${osv_tag#v}"
          osv_latest_digest="$(printf '%s' "$osv_release" | bash .github/scripts/osv-release-digest.sh "$osv_asset")"
          osv_latest_provenance_digest="$(printf '%s' "$osv_release" | bash .github/scripts/osv-release-digest.sh "$osv_provenance_asset")"

          if [[ -z "$osv_latest" ]]; then
            echo "::warning::could not resolve latest google/osv-scanner release; skipping OSV drift"
          elif [[ "$osv_current" != "$osv_latest" ]]; then
            drift_lines+="- **OSV-Scanner native release**: pinned \`${osv_current}\` (binary \`${osv_digest}\`, provenance \`${osv_provenance_digest}\`), upstream latest \`${osv_latest}\` (binary \`${osv_latest_digest:-unresolved}\`, provenance \`${osv_latest_provenance_digest:-unresolved}\`)"$'\n'
            echo "DRIFT OSV-Scanner native release: ${osv_current} -> ${osv_latest}"
          else
            for artifact in \
              "binary:${osv_asset}:${osv_digest}:${osv_latest_digest}" \
              "provenance:${osv_provenance_asset}:${osv_provenance_digest}:${osv_latest_provenance_digest}"; do
              IFS=: read -r kind asset pinned latest <<<"$artifact"
              if [[ -z "$latest" ]]; then
                echo "::warning::could not resolve ${asset} digest for ${osv_tag}; skipping OSV ${kind} digest drift"
              elif [[ "$pinned" != "$latest" ]]; then
                drift_lines+="- **OSV-Scanner ${kind}**: release \`${osv_current}\` still current, but reviewed digest \`${pinned}\` differs from release digest \`${latest}\`"$'\n'
                echo "DRIFT OSV-Scanner ${kind} digest: ${pinned} -> ${latest}"
              else
                echo "ok    OSV-Scanner ${kind}: ${osv_current} (${pinned})"
              fi
            done
          fi

          # Go quality binaries are embedded in a reusable workflow rather than
          # an action, so track their authoritative upstream release channels
          # explicitly. Consumers receive reviewed bumps only through a new
          # immutable ci-workflows commit.
          go_quality_file=.github/workflows/go-quality.yml
          golangci_current="$(yq '.jobs.linux.env.GOLANGCI_LINT_VERSION' "$go_quality_file")"
          golangci_tag="$(
            bounded_read 60 gh api repos/golangci/golangci-lint/releases/latest --jq '.tag_name'
          )" || golangci_tag=''
          golangci_latest="${golangci_tag#v}"
          if [[ -z "$golangci_latest" ]]; then
            echo "::warning::could not resolve latest golangci-lint release; skipping"
          elif [[ "$golangci_current" != "$golangci_latest" ]]; then
            drift_lines+="- **golangci-lint**: pinned \`${golangci_current}\`, upstream latest \`${golangci_latest}\`"$'\n'
            echo "DRIFT golangci-lint: ${golangci_current} -> ${golangci_latest}"
          else
            echo "ok    golangci-lint: ${golangci_current}"
          fi

          govuln_current="$(yq '.jobs.govulncheck.env.GOVULNCHECK_VERSION' "$go_quality_file")"
          govuln_latest="$(
            curl_small_json https://proxy.golang.org/golang.org/x/vuln/@latest |
              jq -er '.Version | ltrimstr("v")'
          )" || govuln_latest=''
          if [[ -z "$govuln_latest" ]]; then
            echo "::warning::could not resolve latest golang.org/x/vuln module; skipping"
          elif [[ "$govuln_current" != "$govuln_latest" ]]; then
            drift_lines+="- **govulncheck** (\`golang.org/x/vuln\`): pinned \`${govuln_current}\`, upstream latest \`${govuln_latest}\`"$'\n'
            echo "DRIFT govulncheck: ${govuln_current} -> ${govuln_latest}"
          else
            echo "ok    govulncheck: ${govuln_current}"
          fi

          # The e2e verification lane pins its Playwright CLI as a workflow-level
          # env value (no action.yml, so it is not in the tools[] manifest above
          # and Dependabot cannot see it). Track npm's current stable playwright,
          # the same registry the browser toolchain installs from.
          playwright_file=.github/workflows/claude-e2e-verify.yml
          playwright_current="$(yq '.env.PLAYWRIGHT_VERSION' "$playwright_file")"
          if [[ -z "$playwright_current" || "$playwright_current" == "null" ]]; then
            echo "::error::could not read PLAYWRIGHT_VERSION from ${playwright_file}"
            exit 1
          fi
          playwright_latest="$(latest_npm playwright)" || playwright_latest=''
          if [[ -z "$playwright_latest" || "$playwright_latest" == "null" ]]; then
            echo "::warning::could not resolve latest playwright (npm); skipping"
          else
            playwright_lowest="$(printf '%s\n%s\n' "$playwright_current" "$playwright_latest" | sort -V | head -1)"
            if [[ "$playwright_lowest" == "$playwright_current" && "$playwright_current" != "$playwright_latest" ]]; then
              drift_lines+="- **Playwright CLI** (\`playwright\`, e2e lane): pinned \`${playwright_current}\`, upstream latest \`${playwright_latest}\`"$'\n'
              echo "DRIFT playwright: ${playwright_current} -> ${playwright_latest}"
            else
              echo "ok    playwright: ${playwright_current} (latest ${playwright_latest})"
            fi
          fi

          if [[ -z "$drift_lines" ]]; then
            echo "drift_detected=false" >> "$GITHUB_OUTPUT"
            echo "No drift — all tracked tool and image pins are current."
            exit 0
          fi

          {
            echo "<!-- ci-workflows:tool-version-drift:v1:active -->"
            echo
            echo "## Tool-version drift detected"
            echo
            echo "One or more reviewed tool or image pins differ from upstream stable."
            echo
            printf '%s' "$drift_lines"
            echo
            echo "### Absorb procedure"
            echo
            echo "Bump the \`version:\` (or \`analyzer-version:\`) default in the listed"
            echo "\`.github/actions/<name>/action.yml\`. For binary-install lanes (shellcheck,"
            echo "shfmt, typos, editorconfig, gitleaks, actionlint, lefthook-validate,"
            echo "lychee-offline) ALSO recompute"
            echo "the paired \`sha256:\` default from the new release asset. The uvx/npx lanes (ruff,"
            echo "pyright, check-jsonschema, markdown, biome, tsc) and PSScriptAnalyzer carry no"
            echo "checksum. For OSV, update \`.github/osv-scanner-pin.json\` only after reviewing"
            echo "the release, verifying the official Linux asset checksum and SLSA provenance,"
            echo "and updating the pinned verifier when required. Consumers pick the new"
            echo "default up when they re-pin this repository. For golangci-lint, verify both"
            echo "official linux-amd64 and windows-amd64 archive checksums before changing the"
            echo "embedded version and hashes. For govulncheck, verify the official Go proxy"
            echo "version, sum.golang.org module sum, origin tag, and commit before changing the"
            echo "exact module pin. For Playwright, bump the \`PLAYWRIGHT_VERSION\` env value in"
            echo "\`.github/workflows/claude-e2e-verify.yml\` (an npm lane, no checksum)."
            echo "For runtime drift, update every action's matching"
            echo "input default (and the root global.json plus the dotnet actions' fallback"
            echo "pins together) only after reviewing the stable patch. Never auto-merge these"
            echo "updates."
            echo
            echo "### Why advisory"
            echo
            echo "Dependabot cannot bump these — its github-actions ecosystem updates only"
            echo "\`uses:\` SHAs (see \`.github/dependabot.yml\`). A new tool release can ship"
            echo "checks that break unrelated PRs; binary and image lanes also need reviewed"
            echo "checksums/digests, so bumps are absorbed deliberately rather than auto-merged."
            echo
            echo "---"
            echo "*Updated automatically by \`.github/workflows/tool-version-drift-check.yml\`."
            echo "Closing this issue without absorbing the bump reopens it on the next run.*"
          } > drift.md

          echo "drift_detected=true" >> "$GITHUB_OUTPUT"

      # A marker embedded in the body (not a title search) is exact and
      # survives a retitle, and matches the mechanism
      # pulumi-version-drift-check.yml already uses.
      - name: Find existing tracking issue
        id: find-issue
        if: steps.drift.outputs.drift_detected == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MARKER: '<!-- ci-workflows:tool-version-drift:v1:active -->'
          ISSUE_TITLE: '[Maintenance] Tool-version drift'
        run: |
          set -euo pipefail
          gh_read() {
            local attempt output status
            for attempt in 1 2; do
              if output="$(timeout --signal=TERM --kill-after=5s 60s gh "$@")"; then
                printf '%s\n' "$output"
                return 0
              else
                status=$?
              fi
              if ((attempt == 1)); then
                echo '::warning::GitHub read failed; retrying once.' >&2
                sleep 1
              fi
            done
            return "$status"
          }
          open_issues="$(gh_read api --paginate --slurp "repos/${GITHUB_REPOSITORY}/issues?state=open&per_page=100")"
          # BEGIN GENERATED FIND TRACKING ISSUE - DO NOT EDIT
          # Source: .github/scripts/find-tracking-issue.sh
          # Resolve the one open tracking issue this workflow owns into issue-number
          # (empty if none), given open_issues (gh api --slurp JSON), MARKER, ISSUE_TITLE.
          # More than one match is never auto-resolvable, so it fails closed.
          #
          # All three inputs are required: an unset MARKER would match every issue body
          # (an empty needle), so assert them up front to keep the fail-closed posture
          # set -u gave the pre-extraction inline blocks.
          : "${MARKER:?MARKER is required}"
          : "${ISSUE_TITLE:?ISSUE_TITLE is required}"
          : "${open_issues:?open_issues is required}"
          matches="$(jq -ce --arg marker "$MARKER" '
            [.[][] | select(.pull_request? == null) | select((.body // "") | contains($marker)) | .number]
          ' <<<"$open_issues")"
          count="$(jq -r 'length' <<<"$matches")"
          if ((count > 1)); then
            echo "::error::found ${count} issues carrying marker '${MARKER}'; reconcile them manually."
            exit 1
          fi
          if ((count == 0)); then
            # One-time migration fallback: a still-open issue created by the pre-marker,
            # title-search version of this workflow has no marker yet, so the search above
            # can't find it. Adopt it by exact title match so the update step below reuses
            # (and marker-backfills) that issue instead of orphaning it behind a newly
            # opened duplicate.
            matches="$(jq -ce --arg title "$ISSUE_TITLE" '
              [.[][] | select(.pull_request? == null) | select(.title == $title) | .number]
            ' <<<"$open_issues")"
            count="$(jq -r 'length' <<<"$matches")"
            if ((count > 1)); then
              echo "::error::found ${count} pre-marker issues titled '${ISSUE_TITLE}'; reconcile them manually."
              exit 1
            fi
          fi
          jq -r 'if length == 1 then "issue-number=" + (.[0] | tostring) else "issue-number=" end' <<<"$matches" >>"${GITHUB_OUTPUT:?}"
          # END GENERATED FIND TRACKING ISSUE

      - name: Open or update tracking issue
        if: steps.drift.outputs.drift_detected == 'true'
        uses: peter-evans/create-issue-from-file@fca9117c27cdc29c6c4db3b86c48e4115a786710 # v6.0.0
        with:
          issue-number: ${{ steps.find-issue.outputs.issue-number }}
          title: '[Maintenance] Tool-version drift'
          content-filepath: ./drift.md
