name: production-ha-proof

# Production two-host acceptance is deliberately separate from the compatibility
# canary. Every inventory/control step is GitHub-hosted; a self-hosted job receives
# only the exact label returned directly by the governed selector.
on:
  workflow_call:
    inputs:
      mode:
        description: inventory, desktop-only, laptop-only, failover, or laptop-power.
        type: string
        default: inventory
      observer-client-id:
        description: Client ID of the read-only observer GitHub App.
        type: string
        required: true
      drain-wait-minutes:
        description: Hosted failover hold budget; accepted range is 5-25 minutes.
        type: number
        default: 20
      laptop-proof-minutes:
        description: Laptop heartbeat duration; accepted range is 10-30 minutes.
        type: number
        default: 20
      artifact-retention-days:
        description: Sanitized acceptance evidence retention; accepted range is 1-7 days.
        type: number
        default: 3
    secrets:
      observer-private-key:
        description: Private key for the read-only observer GitHub App.
        required: true

permissions: {}

concurrency:
  group: production-ha-proof-${{ github.repository }}
  cancel-in-progress: false

jobs:
  preflight:
    name: Authorize production proof caller
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Require the exact trusted first-attempt private dispatch
        shell: bash
        env:
          ARTIFACT_RETENTION_DAYS: ${{ inputs.artifact-retention-days }}
          CALLER_WORKFLOW_REF: ${{ github.workflow_ref }}
          DRAIN_WAIT_MINUTES: ${{ inputs.drain-wait-minutes }}
          EVENT_NAME: ${{ github.event_name }}
          EXPECTED_CALLER_WORKFLOW_REF: melodic-software/ci-runner-canary/.github/workflows/production-ha-proof.yml@refs/heads/main
          EXPECTED_REPOSITORY: melodic-software/ci-runner-canary
          LAPTOP_PROOF_MINUTES: ${{ inputs.laptop-proof-minutes }}
          MODE: ${{ inputs.mode }}
          OBSERVER_CLIENT_ID: ${{ inputs.observer-client-id }}
          REPOSITORY: ${{ github.repository }}
          REPOSITORY_PRIVATE: ${{ github.event.repository.private }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          SOURCE_REF: ${{ github.ref }}
        run: |
          fail() { echo "::error::$1"; exit 1; }

          [[ "$EVENT_NAME" = workflow_dispatch ]] || fail "caller must use workflow_dispatch"
          [[ "$REPOSITORY_PRIVATE" = true ]] || fail "production proof caller must be private"
          [[ "$REPOSITORY" = "$EXPECTED_REPOSITORY" ]] || fail "unexpected proof repository"
          [[ "$SOURCE_REF" = refs/heads/main ]] || fail "production proof must run from protected main"
          [[ "$CALLER_WORKFLOW_REF" = "$EXPECTED_CALLER_WORKFLOW_REF" ]] || fail "unexpected proof caller workflow"
          [[ "$RUN_ATTEMPT" = 1 ]] || fail "reruns cannot produce acceptance evidence; start a new dispatch"
          [[ "$MODE" =~ ^(inventory|desktop-only|laptop-only|failover|laptop-power)$ ]] || fail "invalid production proof mode"
          [[ "$OBSERVER_CLIENT_ID" =~ ^[A-Za-z0-9_.-]{1,128}$ ]] || fail "invalid observer client ID"
          [[ "$DRAIN_WAIT_MINUTES" =~ ^([5-9]|1[0-9]|2[0-5])$ ]] || fail "invalid drain wait"
          [[ "$LAPTOP_PROOF_MINUTES" =~ ^(1[0-9]|2[0-9]|30)$ ]] || fail "invalid laptop proof duration"
          [[ "$ARTIFACT_RETENTION_DAYS" =~ ^[1-7]$ ]] || fail "invalid artifact retention"

  inventory:
    name: Observe exact production topology
    needs: preflight
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions: {}
    outputs:
      desktop-idle: ${{ steps.inventory.outputs.desktop-idle }}
      laptop-idle: ${{ steps.inventory.outputs.laptop-idle }}
    steps:
      - name: Mint read-only observer token
        id: observer-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ inputs.observer-client-id }}
          private-key: ${{ secrets.observer-private-key }}
          owner: melodic-software
          permission-organization-self-hosted-runners: read
      - name: Collect and validate runner groups
        id: inventory
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EVIDENCE_PATH: ${{ runner.temp }}/production-ha-inventory.json
          MODE: ${{ inputs.mode }}
          PHASE: inventory
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          github-token: ${{ steps.observer-token.outputs.token }}
          script: |
            // BEGIN GENERATED PRODUCTION HA INVENTORY - DO NOT EDIT
            // Source: .github/scripts/production-ha-proof.cjs
            const productionHaModule = (() => {
              "use strict";
              const module = {exports: {}};

              const fs = require("node:fs");

              const API_VERSION = "2026-03-10";
              const ORGANIZATION = "melodic-software";
              const PROOF_REPOSITORY = "melodic-software/ci-runner-canary";
              const PROOF_CALLER_WORKFLOW =
                "melodic-software/ci-runner-canary/.github/workflows/production-ha-proof.yml@refs/heads/main";
              const PRODUCTION_LABEL = "melodic-ubuntu-24.04-x64";
              const PAGE_SIZE = 100;
              const POLL_INTERVAL_MILLISECONDS = 15_000;
              const REQUIRED_STABLE_DRAIN_OBSERVATIONS = 2;
              const SAFE_NAME = /^[A-Za-z0-9._-]{1,128}$/u;
              const ACCEPTED_RUNNER_OSES = new Set(["linux", "unknown"]);
              const ACCEPTED_MODES = new Set([
                "inventory",
                "desktop-only",
                "laptop-only",
                "failover",
                "laptop-power",
              ]);
              const HOSTS = Object.freeze([
                Object.freeze({
                  id: "melo-desk-001",
                  group: "ci-local-melo-desk-001",
                  runnerPrefix: "ci-runner-melo-desk-001-",
                }),
                Object.freeze({
                  id: "melo-lap-001",
                  group: "ci-local-melo-lap-001",
                  runnerPrefix: "ci-runner-melo-lap-001-",
                }),
              ]);

              class ProofError extends Error {
                constructor(code, message, evidence = undefined) {
                  super(message);
                  this.name = "ProofError";
                  this.code = code;
                  this.evidence = evidence;
                }
              }

              function invalid(message) {
                throw new ProofError("invalid-response", message);
              }

              function assertPositiveInteger(value, field) {
                if (!Number.isSafeInteger(value) || value <= 0) {
                  invalid(`${field} must be a positive integer`);
                }
                return value;
              }

              function assertSafeString(value, field, pattern = SAFE_NAME) {
                if (typeof value !== "string" || !pattern.test(value)) {
                  invalid(`${field} is malformed`);
                }
                return value;
              }

              function apiFailure(error) {
                if (error instanceof ProofError) {
                  return error;
                }
                const status = Number.isInteger(error?.status)
                  ? String(error.status)
                  : "unknown";
                return new ProofError(
                  "api-error",
                  `GitHub read-only inventory request failed (HTTP ${status})`,
                );
              }

              async function listAll(request, route, parameters, collectionKey) {
                const collected = [];
                let expectedTotal;
                let page = 1;

                while (true) {
                  let response;
                  try {
                    response = await request(route, {
                      ...parameters,
                      page,
                      per_page: PAGE_SIZE,
                      headers: {
                        accept: "application/vnd.github+json",
                        "X-GitHub-Api-Version": API_VERSION,
                      },
                    });
                  } catch (error) {
                    throw apiFailure(error);
                  }

                  const data = response?.data;
                  if (
                    !data ||
                    !Number.isSafeInteger(data.total_count) ||
                    data.total_count < 0 ||
                    !Array.isArray(data[collectionKey])
                  ) {
                    invalid(`${collectionKey} response is malformed`);
                  }
                  if (expectedTotal === undefined) {
                    expectedTotal = data.total_count;
                  } else if (data.total_count !== expectedTotal) {
                    invalid(`${collectionKey} total_count changed during pagination`);
                  }

                  const pageItems = data[collectionKey];
                  collected.push(...pageItems);
                  if (collected.length > expectedTotal) {
                    invalid(`${collectionKey} pagination exceeded total_count`);
                  }
                  if (collected.length === expectedTotal) {
                    break;
                  }
                  if (pageItems.length === 0 || pageItems.length > PAGE_SIZE) {
                    invalid(`${collectionKey} pagination ended before total_count`);
                  }
                  page += 1;
                  if (page > Math.ceil(expectedTotal / PAGE_SIZE) + 1) {
                    invalid(`${collectionKey} pagination did not converge`);
                  }
                }

                return collected;
              }

              function validateGroup(group, host) {
                if (!group || typeof group !== "object" || Array.isArray(group)) {
                  invalid(`${host.group} group is malformed`);
                }
                assertPositiveInteger(group.id, `${host.group}.id`);
                if (group.name !== host.group) {
                  invalid(`${host.group} name changed during validation`);
                }
                if (group.visibility !== "selected") {
                  invalid(`${host.group} must use selected repository visibility`);
                }
                if (group.default !== false || group.inherited !== false) {
                  invalid(`${host.group} must be independent, nondefault organization state`);
                }
                if (group.allows_public_repositories !== false) {
                  invalid(`${host.group} must forbid public repositories`);
                }
                if (group.restricted_to_workflows !== false) {
                  invalid(
                    `${host.group} must leave group-wide workflow restriction disabled`,
                  );
                }
                if (
                  !Array.isArray(group.selected_workflows) ||
                  group.selected_workflows.length !== 0
                ) {
                  invalid(`${host.group} selected_workflows must be empty`);
                }
              }

              function validateRepository(repository, groupName) {
                if (
                  !repository ||
                  typeof repository !== "object" ||
                  Array.isArray(repository)
                ) {
                  invalid(`${groupName} repository entry is malformed`);
                }
                const id = assertPositiveInteger(repository.id, `${groupName}.repository.id`);
                const name = assertSafeString(
                  repository.name,
                  `${groupName}.repository.name`,
                );
                const fullName = assertSafeString(
                  repository.full_name,
                  `${groupName}.repository.full_name`,
                  /^melodic-software\/[A-Za-z0-9._-]{1,100}$/u,
                );
                if (fullName !== `${ORGANIZATION}/${name}`) {
                  invalid(`${groupName} repository name and full_name disagree`);
                }
                if (repository.private !== true) {
                  invalid(`${groupName} exposes a nonprivate repository`);
                }
                return Object.freeze({ id, fullName, private: true });
              }

              function validateRunner(runner, host) {
                if (!runner || typeof runner !== "object" || Array.isArray(runner)) {
                  invalid(`${host.group} runner entry is malformed`);
                }
                const id = assertPositiveInteger(runner.id, `${host.group}.runner.id`);
                const name = assertSafeString(runner.name, `${host.group}.runner.name`);
                if (!name.startsWith(host.runnerPrefix)) {
                  invalid(`${host.group} contains a runner outside ${host.runnerPrefix}`);
                }
                const os = assertSafeString(
                  runner.os,
                  `${host.group}.runner.os`,
                  /^[A-Za-z]+$/u,
                ).toLowerCase();
                if (!ACCEPTED_RUNNER_OSES.has(os)) {
                  invalid(
                    `${host.group} contains a runner outside the Linux/JIT-unknown contract`,
                  );
                }
                if (runner.status !== "online" && runner.status !== "offline") {
                  invalid(`${host.group}.runner.status is malformed`);
                }
                if (typeof runner.busy !== "boolean") {
                  invalid(`${host.group}.runner.busy is malformed`);
                }
                if (
                  Object.hasOwn(runner, "ephemeral") &&
                  typeof runner.ephemeral !== "boolean"
                ) {
                  invalid(`${host.group}.runner.ephemeral is malformed`);
                }
                if (runner.ephemeral === false) {
                  invalid(`${host.group} contains an explicitly persistent runner`);
                }
                if (!Array.isArray(runner.labels) || runner.labels.length === 0) {
                  invalid(`${host.group}.runner.labels is malformed`);
                }

                const labels = [];
                const labelKeys = new Set();
                for (const label of runner.labels) {
                  if (!label || typeof label !== "object" || Array.isArray(label)) {
                    invalid(`${host.group}.runner.labels contains a malformed label`);
                  }
                  const labelName = assertSafeString(
                    label.name,
                    `${host.group}.runner.label.name`,
                  );
                  const key = labelName.toLowerCase();
                  if (!labelKeys.has(key)) {
                    labelKeys.add(key);
                    labels.push(labelName);
                  }
                }
                if (!labelKeys.has(PRODUCTION_LABEL.toLowerCase())) {
                  invalid(
                    `${host.group} contains a runner without the production routing label`,
                  );
                }

                labels.sort((left, right) => left.localeCompare(right, "en"));
                return Object.freeze({
                  id,
                  name,
                  os,
                  status: runner.status,
                  busy: runner.busy,
                  ephemeral: Object.hasOwn(runner, "ephemeral") ? runner.ephemeral : null,
                  labels: Object.freeze(labels),
                });
              }

              function assertUniqueIds(items, field) {
                const seen = new Set();
                for (const item of items) {
                  if (seen.has(item.id)) {
                    invalid(`${field} contains duplicate id ${item.id}`);
                  }
                  seen.add(item.id);
                }
              }

              function repositorySetKey(repositories) {
                return repositories.map(({ id, fullName }) => `${id}:${fullName}`).join("\n");
              }

              async function fetchTopology(request) {
                const groups = await listAll(
                  request,
                  "GET /orgs/{org}/actions/runner-groups",
                  { org: ORGANIZATION },
                  "runner_groups",
                );
                const groupIds = groups.map((group) => ({ id: group?.id }));
                for (const item of groupIds) {
                  assertPositiveInteger(item.id, "runner_group.id");
                }
                assertUniqueIds(groupIds, "runner groups");

                const evidenceGroups = [];
                const seenRunnerIds = new Set();
                for (const host of HOSTS) {
                  const matches = groups.filter((group) => group?.name === host.group);
                  if (matches.length !== 1) {
                    invalid(`expected exactly one ${host.group} group`);
                  }
                  const group = matches[0];
                  validateGroup(group, host);

                  const repositories = (
                    await listAll(
                      request,
                      "GET /orgs/{org}/actions/runner-groups/{runner_group_id}/repositories",
                      { org: ORGANIZATION, runner_group_id: group.id },
                      "repositories",
                    )
                  )
                    .map((repository) => validateRepository(repository, host.group))
                    .sort((left, right) => left.id - right.id);
                  assertUniqueIds(repositories, `${host.group} repositories`);

                  const runners = (
                    await listAll(
                      request,
                      "GET /orgs/{org}/actions/runner-groups/{runner_group_id}/runners",
                      { org: ORGANIZATION, runner_group_id: group.id },
                      "runners",
                    )
                  )
                    .map((runner) => validateRunner(runner, host))
                    .sort((left, right) => left.id - right.id);
                  assertUniqueIds(runners, `${host.group} runners`);
                  for (const runner of runners) {
                    if (seenRunnerIds.has(runner.id)) {
                      invalid(`runner ${runner.id} appears in both production groups`);
                    }
                    seenRunnerIds.add(runner.id);
                  }

                  evidenceGroups.push(
                    Object.freeze({
                      host: host.id,
                      group: Object.freeze({
                        id: group.id,
                        name: group.name,
                        visibility: group.visibility,
                        default: group.default,
                        inherited: group.inherited,
                        allowsPublicRepositories: group.allows_public_repositories,
                        restrictedToWorkflows: group.restricted_to_workflows,
                        selectedWorkflows: Object.freeze([]),
                      }),
                      selectedRepositories: Object.freeze(repositories),
                      runners: Object.freeze(runners),
                      onlineCount: runners.filter(({ status }) => status === "online").length,
                      idleCount: runners.filter(
                        ({ status, busy }) => status === "online" && !busy,
                      ).length,
                    }),
                  );
                }

                if (evidenceGroups[0].group.id === evidenceGroups[1].group.id) {
                  invalid("desktop and laptop must have distinct runner-group IDs");
                }
                const expectedRepositorySet = repositorySetKey(
                  evidenceGroups[0].selectedRepositories,
                );
                if (
                  repositorySetKey(evidenceGroups[1].selectedRepositories) !==
                  expectedRepositorySet
                ) {
                  invalid(
                    "production groups do not expose identical selected-repository sets",
                  );
                }
                if (
                  !evidenceGroups[0].selectedRepositories.some(
                    ({ fullName }) => fullName === PROOF_REPOSITORY,
                  )
                ) {
                  invalid("production groups do not expose the private proof repository");
                }

                return Object.freeze({ groups: Object.freeze(evidenceGroups) });
              }

              function stateForMode(mode) {
                switch (mode) {
                  case "inventory":
                  case "failover":
                    return Object.freeze({ "melo-desk-001": "idle", "melo-lap-001": "idle" });
                  case "desktop-only":
                    return Object.freeze({
                      "melo-desk-001": "idle",
                      "melo-lap-001": "drained",
                    });
                  case "laptop-only":
                  case "laptop-power":
                    return Object.freeze({
                      "melo-desk-001": "drained",
                      "melo-lap-001": "idle",
                    });
                  default:
                    throw new ProofError(
                      "invalid-input",
                      "unsupported production proof mode",
                    );
                }
              }

              function assertMode(topology, mode) {
                if (!ACCEPTED_MODES.has(mode)) {
                  throw new ProofError("invalid-input", "unsupported production proof mode");
                }
                const expected = stateForMode(mode);
                for (const group of topology.groups) {
                  const state = expected[group.host];
                  if (state === "idle" && group.idleCount < 1) {
                    throw new ProofError(
                      "topology-not-ready",
                      `${group.host} has no online idle production runner`,
                    );
                  }
                  if (state === "drained" && group.onlineCount !== 0) {
                    throw new ProofError(
                      "topology-not-ready",
                      `${group.host} still has online production runners`,
                    );
                  }
                }
                return expected;
              }

              function observation(topology, now) {
                return Object.freeze({
                  observedAt: new Date(now()).toISOString(),
                  desktopOnline: topology.groups[0].onlineCount,
                  desktopIdle: topology.groups[0].idleCount,
                  laptopOnline: topology.groups[1].onlineCount,
                  laptopIdle: topology.groups[1].idleCount,
                });
              }

              async function waitForDesktopDrain({
                request,
                maxWaitMinutes,
                now = Date.now,
                sleep = (milliseconds) =>
                  new Promise((resolve) => setTimeout(resolve, milliseconds)),
                onObservation = () => {},
              }) {
                if (
                  !Number.isSafeInteger(maxWaitMinutes) ||
                  maxWaitMinutes < 5 ||
                  maxWaitMinutes > 25
                ) {
                  throw new ProofError("invalid-input", "drain wait must be 5-25 minutes");
                }
                const startedAt = now();
                const deadline = startedAt + maxWaitMinutes * 60_000;
                const observations = [];
                let stable = 0;

                while (true) {
                  const topology = await fetchTopology(request);
                  const current = observation(topology, now);
                  observations.push(current);
                  onObservation(current);
                  if (current.desktopOnline === 0 && current.laptopIdle >= 1) {
                    stable += 1;
                  } else {
                    stable = 0;
                  }
                  if (stable >= REQUIRED_STABLE_DRAIN_OBSERVATIONS) {
                    return Object.freeze({
                      startedAt: new Date(startedAt).toISOString(),
                      completedAt: current.observedAt,
                      observations: Object.freeze(observations),
                      topology,
                    });
                  }
                  if (now() >= deadline) {
                    throw new ProofError(
                      "drain-timeout",
                      "desktop did not remain drained while laptop idle capacity stayed available",
                      Object.freeze({
                        startedAt: new Date(startedAt).toISOString(),
                        observations: Object.freeze(observations),
                      }),
                    );
                  }
                  await sleep(POLL_INTERVAL_MILLISECONDS);
                }
              }

              function requiredEnvironment(env, name, pattern = undefined) {
                const value = env[name];
                if (typeof value !== "string" || value === "") {
                  throw new ProofError("invalid-input", `${name} is required`);
                }
                if (pattern && !pattern.test(value)) {
                  throw new ProofError("invalid-input", `${name} is malformed`);
                }
                return value;
              }

              function commonEvidence(env, now) {
                return {
                  schemaVersion: 1,
                  generatedAt: new Date(now()).toISOString(),
                  organization: ORGANIZATION,
                  repository: PROOF_REPOSITORY,
                  callerWorkflow: PROOF_CALLER_WORKFLOW,
                  run: {
                    id: requiredEnvironment(env, "RUN_ID", /^\d+$/u),
                    attempt: Number(requiredEnvironment(env, "RUN_ATTEMPT", /^1$/u)),
                    url: requiredEnvironment(env, "RUN_URL", /^https:\/\/github\.com\//u),
                  },
                  source: {
                    apiVersion: API_VERSION,
                    endpoints: [
                      "GET /orgs/{org}/actions/runner-groups",
                      "GET /orgs/{org}/actions/runner-groups/{runner_group_id}/repositories",
                      "GET /orgs/{org}/actions/runner-groups/{runner_group_id}/runners",
                    ],
                  },
                  limitations: {
                    restGroupIdIsScaleSetId: false,
                    scaleSetIdObserved: false,
                    controllerCapacityObserved: false,
                    batteryOrLogonStateObserved: false,
                  },
                };
              }

              function writeEvidence(path, evidence) {
                fs.writeFileSync(path, `${JSON.stringify(evidence, null, 2)}\n`, {
                  encoding: "utf8",
                  mode: 0o600,
                });
              }

              function appendSummary(path, lines) {
                fs.appendFileSync(path, `${lines.join("\n")}\n`, "utf8");
              }

              function safeFailure(error) {
                const proofError = apiFailure(error);
                return Object.freeze({ code: proofError.code, message: proofError.message });
              }

              async function runGitHubScript({ github, core, env, now = Date.now, sleep }) {
                const phase = requiredEnvironment(
                  env,
                  "PHASE",
                  /^(inventory|wait-desktop-drain)$/u,
                );
                const evidencePath = requiredEnvironment(env, "EVIDENCE_PATH");
                const summaryPath = requiredEnvironment(
                  { SUMMARY_PATH: env.SUMMARY_PATH || env.GITHUB_STEP_SUMMARY },
                  "SUMMARY_PATH",
                );
                const base = commonEvidence(env, now);

                try {
                  if (phase === "inventory") {
                    const mode = requiredEnvironment(
                      env,
                      "MODE",
                      /^(inventory|desktop-only|laptop-only|failover|laptop-power)$/u,
                    );
                    const topology = await fetchTopology(github.request);
                    const expectedState = assertMode(topology, mode);
                    const evidence = {
                      ...base,
                      phase,
                      mode,
                      status: "passed",
                      expectedState,
                      routingLabel: PRODUCTION_LABEL,
                      topology,
                    };
                    writeEvidence(evidencePath, evidence);
                    appendSummary(summaryPath, [
                      "### Production runner topology passed",
                      "",
                      `- Mode: \`${mode}\``,
                      `- Desktop group: \`${topology.groups[0].group.name}\` (REST group ID ${topology.groups[0].group.id}; ${topology.groups[0].onlineCount} online, ${topology.groups[0].idleCount} idle)`,
                      `- Laptop group: \`${topology.groups[1].group.name}\` (REST group ID ${topology.groups[1].group.id}; ${topology.groups[1].onlineCount} online, ${topology.groups[1].idleCount} idle)`,
                      `- Identical private repository access: ${topology.groups[0].selectedRepositories.map(({ fullName }) => `\`${fullName}\``).join(", ")}`,
                      "- REST group IDs prove independent groups; they are not scale-set IDs.",
                    ]);
                    core.setOutput("desktop-idle", String(topology.groups[0].idleCount));
                    core.setOutput("laptop-idle", String(topology.groups[1].idleCount));
                    return evidence;
                  }

                  const selector = Object.freeze({
                    runner: requiredEnvironment(env, "SELECTED_RUNNER"),
                    route: requiredEnvironment(env, "SELECTED_ROUTE"),
                    reason: requiredEnvironment(env, "SELECTED_REASON"),
                    idleRunnerCount: Number(
                      requiredEnvironment(env, "SELECTED_IDLE_COUNT", /^[1-9]\d*$/u),
                    ),
                  });
                  if (
                    selector.runner !== PRODUCTION_LABEL ||
                    selector.route !== "self-hosted" ||
                    selector.reason !== "idle"
                  ) {
                    throw new ProofError(
                      "invalid-input",
                      "hosted hold did not receive the exact successful selector outputs",
                    );
                  }
                  const maxWaitMinutes = Number(
                    requiredEnvironment(env, "MAX_WAIT_MINUTES", /^(?:[5-9]|1\d|2[0-5])$/u),
                  );
                  const result = await waitForDesktopDrain({
                    request: github.request,
                    maxWaitMinutes,
                    now,
                    sleep,
                    onObservation: (current) =>
                      core.info(
                        `read-only drain observation: desktop online=${current.desktopOnline}; laptop idle=${current.laptopIdle}; observed=${current.observedAt}`,
                      ),
                  });
                  const evidence = {
                    ...base,
                    phase,
                    mode: "failover",
                    status: "passed",
                    selector,
                    stableObservationsRequired: REQUIRED_STABLE_DRAIN_OBSERVATIONS,
                    pollIntervalSeconds: POLL_INTERVAL_MILLISECONDS / 1000,
                    result,
                  };
                  writeEvidence(evidencePath, evidence);
                  appendSummary(summaryPath, [
                    "### Hosted failover hold passed",
                    "",
                    `- Selector completed first with \`${selector.runner}\` and ${selector.idleRunnerCount} idle runners.`,
                    "- Desktop then remained at zero online runners for two observations.",
                    "- Laptop retained at least one online idle runner.",
                    "- The next governed job must still assert the acquired laptop identity.",
                  ]);
                  return evidence;
                } catch (error) {
                  const failure = safeFailure(error);
                  writeEvidence(evidencePath, {
                    ...base,
                    phase,
                    status: "failed",
                    failure,
                    observations: error instanceof ProofError ? error.evidence : undefined,
                  });
                  throw new ProofError(failure.code, failure.message);
                }
              }

              module.exports = Object.freeze({
                ACCEPTED_MODES,
                API_VERSION,
                HOSTS,
                ORGANIZATION,
                POLL_INTERVAL_MILLISECONDS,
                PRODUCTION_LABEL,
                PROOF_CALLER_WORKFLOW,
                PROOF_REPOSITORY,
                ProofError,
                assertMode,
                fetchTopology,
                listAll,
                runGitHubScript,
                waitForDesktopDrain,
              });
              return module.exports;
            })();
            await productionHaModule.runGitHubScript({github, core, env: process.env});
            // END GENERATED PRODUCTION HA INVENTORY
      - name: Upload sanitized topology evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-ha-inventory-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/production-ha-inventory.json
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}

  select-production-runner:
    name: Select governed production runner
    if: inputs.mode != 'inventory'
    needs: [preflight, inventory]
    permissions: {}
    uses: melodic-software/ci-workflows/.github/workflows/select-runner.yml@66e3e974e9c0132150cc982cdd76aca284df19de # governed selector review
    with:
      policy: prefer-self-hosted
      self-hosted-label: melodic-ubuntu-24.04-x64
      hosted-runner: ubuntu-24.04
      scope: organization
      managed-runner-prefix: ci-runner-melo-
      observer-client-id: ${{ inputs.observer-client-id }}
    secrets:
      observer-private-key: ${{ secrets.observer-private-key }}

  validate-selection:
    name: Validate production selector outputs
    if: inputs.mode != 'inventory'
    needs: select-production-runner
    runs-on: ubuntu-24.04
    timeout-minutes: 2
    permissions: {}
    steps:
      - name: Require exact idle production capacity
        shell: bash
        env:
          IDLE_RUNNER_COUNT: ${{ needs.select-production-runner.outputs.idle-runner-count }}
          SELECTED_REASON: ${{ needs.select-production-runner.outputs.reason }}
          SELECTED_ROUTE: ${{ needs.select-production-runner.outputs.route }}
          SELECTED_RUNNER: ${{ needs.select-production-runner.outputs.runner }}
        run: |
          fail() { echo "::error::$1"; exit 1; }
          [[ "$SELECTED_ROUTE" = self-hosted ]] || fail "selector safely fell back hosted; production proof did not run"
          [[ "$SELECTED_REASON" = idle ]] || fail "selector reason is not idle"
          [[ "$SELECTED_RUNNER" = melodic-ubuntu-24.04-x64 ]] || fail "selector returned another runner"
          [[ "$SELECTED_RUNNER" != self-hosted ]] || fail "generic self-hosted label is forbidden"
          [[ "$SELECTED_RUNNER" != ubuntu-24.04 ]] || fail "hosted fallback cannot satisfy production proof"
          [[ "$IDLE_RUNNER_COUNT" =~ ^[1-9][0-9]*$ ]] || fail "selector reported no idle production runner"

  failover-hold:
    name: Hold hosted while desktop drains
    if: inputs.mode == 'failover'
    needs: [inventory, select-production-runner, validate-selection]
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions: {}
    steps:
      - name: Open the operator drain checkpoint
        shell: bash
        run: |
          echo "::notice::Selection is complete. On melo-desk-001, run: ci-runner host disable --wait"
          echo "This hosted job only observes public REST inventory. It never drains, cancels, or replays work."
      - name: Mint a fresh read-only observer token
        id: observer-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ inputs.observer-client-id }}
          private-key: ${{ secrets.observer-private-key }}
          owner: melodic-software
          permission-organization-self-hosted-runners: read
      - name: Wait for stable desktop drain and laptop idle capacity
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          EVIDENCE_PATH: ${{ runner.temp }}/production-ha-drain-hold.json
          MAX_WAIT_MINUTES: ${{ inputs.drain-wait-minutes }}
          PHASE: wait-desktop-drain
          RUN_ATTEMPT: ${{ github.run_attempt }}
          RUN_ID: ${{ github.run_id }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SELECTED_IDLE_COUNT: ${{ needs.select-production-runner.outputs.idle-runner-count }}
          SELECTED_REASON: ${{ needs.select-production-runner.outputs.reason }}
          SELECTED_ROUTE: ${{ needs.select-production-runner.outputs.route }}
          SELECTED_RUNNER: ${{ needs.select-production-runner.outputs.runner }}
        with:
          github-token: ${{ steps.observer-token.outputs.token }}
          script: |
            // BEGIN GENERATED PRODUCTION HA DRAIN HOLD - DO NOT EDIT
            // Source: .github/scripts/production-ha-proof.cjs
            const productionHaModule = (() => {
              "use strict";
              const module = {exports: {}};

              const fs = require("node:fs");

              const API_VERSION = "2026-03-10";
              const ORGANIZATION = "melodic-software";
              const PROOF_REPOSITORY = "melodic-software/ci-runner-canary";
              const PROOF_CALLER_WORKFLOW =
                "melodic-software/ci-runner-canary/.github/workflows/production-ha-proof.yml@refs/heads/main";
              const PRODUCTION_LABEL = "melodic-ubuntu-24.04-x64";
              const PAGE_SIZE = 100;
              const POLL_INTERVAL_MILLISECONDS = 15_000;
              const REQUIRED_STABLE_DRAIN_OBSERVATIONS = 2;
              const SAFE_NAME = /^[A-Za-z0-9._-]{1,128}$/u;
              const ACCEPTED_RUNNER_OSES = new Set(["linux", "unknown"]);
              const ACCEPTED_MODES = new Set([
                "inventory",
                "desktop-only",
                "laptop-only",
                "failover",
                "laptop-power",
              ]);
              const HOSTS = Object.freeze([
                Object.freeze({
                  id: "melo-desk-001",
                  group: "ci-local-melo-desk-001",
                  runnerPrefix: "ci-runner-melo-desk-001-",
                }),
                Object.freeze({
                  id: "melo-lap-001",
                  group: "ci-local-melo-lap-001",
                  runnerPrefix: "ci-runner-melo-lap-001-",
                }),
              ]);

              class ProofError extends Error {
                constructor(code, message, evidence = undefined) {
                  super(message);
                  this.name = "ProofError";
                  this.code = code;
                  this.evidence = evidence;
                }
              }

              function invalid(message) {
                throw new ProofError("invalid-response", message);
              }

              function assertPositiveInteger(value, field) {
                if (!Number.isSafeInteger(value) || value <= 0) {
                  invalid(`${field} must be a positive integer`);
                }
                return value;
              }

              function assertSafeString(value, field, pattern = SAFE_NAME) {
                if (typeof value !== "string" || !pattern.test(value)) {
                  invalid(`${field} is malformed`);
                }
                return value;
              }

              function apiFailure(error) {
                if (error instanceof ProofError) {
                  return error;
                }
                const status = Number.isInteger(error?.status)
                  ? String(error.status)
                  : "unknown";
                return new ProofError(
                  "api-error",
                  `GitHub read-only inventory request failed (HTTP ${status})`,
                );
              }

              async function listAll(request, route, parameters, collectionKey) {
                const collected = [];
                let expectedTotal;
                let page = 1;

                while (true) {
                  let response;
                  try {
                    response = await request(route, {
                      ...parameters,
                      page,
                      per_page: PAGE_SIZE,
                      headers: {
                        accept: "application/vnd.github+json",
                        "X-GitHub-Api-Version": API_VERSION,
                      },
                    });
                  } catch (error) {
                    throw apiFailure(error);
                  }

                  const data = response?.data;
                  if (
                    !data ||
                    !Number.isSafeInteger(data.total_count) ||
                    data.total_count < 0 ||
                    !Array.isArray(data[collectionKey])
                  ) {
                    invalid(`${collectionKey} response is malformed`);
                  }
                  if (expectedTotal === undefined) {
                    expectedTotal = data.total_count;
                  } else if (data.total_count !== expectedTotal) {
                    invalid(`${collectionKey} total_count changed during pagination`);
                  }

                  const pageItems = data[collectionKey];
                  collected.push(...pageItems);
                  if (collected.length > expectedTotal) {
                    invalid(`${collectionKey} pagination exceeded total_count`);
                  }
                  if (collected.length === expectedTotal) {
                    break;
                  }
                  if (pageItems.length === 0 || pageItems.length > PAGE_SIZE) {
                    invalid(`${collectionKey} pagination ended before total_count`);
                  }
                  page += 1;
                  if (page > Math.ceil(expectedTotal / PAGE_SIZE) + 1) {
                    invalid(`${collectionKey} pagination did not converge`);
                  }
                }

                return collected;
              }

              function validateGroup(group, host) {
                if (!group || typeof group !== "object" || Array.isArray(group)) {
                  invalid(`${host.group} group is malformed`);
                }
                assertPositiveInteger(group.id, `${host.group}.id`);
                if (group.name !== host.group) {
                  invalid(`${host.group} name changed during validation`);
                }
                if (group.visibility !== "selected") {
                  invalid(`${host.group} must use selected repository visibility`);
                }
                if (group.default !== false || group.inherited !== false) {
                  invalid(`${host.group} must be independent, nondefault organization state`);
                }
                if (group.allows_public_repositories !== false) {
                  invalid(`${host.group} must forbid public repositories`);
                }
                if (group.restricted_to_workflows !== false) {
                  invalid(
                    `${host.group} must leave group-wide workflow restriction disabled`,
                  );
                }
                if (
                  !Array.isArray(group.selected_workflows) ||
                  group.selected_workflows.length !== 0
                ) {
                  invalid(`${host.group} selected_workflows must be empty`);
                }
              }

              function validateRepository(repository, groupName) {
                if (
                  !repository ||
                  typeof repository !== "object" ||
                  Array.isArray(repository)
                ) {
                  invalid(`${groupName} repository entry is malformed`);
                }
                const id = assertPositiveInteger(repository.id, `${groupName}.repository.id`);
                const name = assertSafeString(
                  repository.name,
                  `${groupName}.repository.name`,
                );
                const fullName = assertSafeString(
                  repository.full_name,
                  `${groupName}.repository.full_name`,
                  /^melodic-software\/[A-Za-z0-9._-]{1,100}$/u,
                );
                if (fullName !== `${ORGANIZATION}/${name}`) {
                  invalid(`${groupName} repository name and full_name disagree`);
                }
                if (repository.private !== true) {
                  invalid(`${groupName} exposes a nonprivate repository`);
                }
                return Object.freeze({ id, fullName, private: true });
              }

              function validateRunner(runner, host) {
                if (!runner || typeof runner !== "object" || Array.isArray(runner)) {
                  invalid(`${host.group} runner entry is malformed`);
                }
                const id = assertPositiveInteger(runner.id, `${host.group}.runner.id`);
                const name = assertSafeString(runner.name, `${host.group}.runner.name`);
                if (!name.startsWith(host.runnerPrefix)) {
                  invalid(`${host.group} contains a runner outside ${host.runnerPrefix}`);
                }
                const os = assertSafeString(
                  runner.os,
                  `${host.group}.runner.os`,
                  /^[A-Za-z]+$/u,
                ).toLowerCase();
                if (!ACCEPTED_RUNNER_OSES.has(os)) {
                  invalid(
                    `${host.group} contains a runner outside the Linux/JIT-unknown contract`,
                  );
                }
                if (runner.status !== "online" && runner.status !== "offline") {
                  invalid(`${host.group}.runner.status is malformed`);
                }
                if (typeof runner.busy !== "boolean") {
                  invalid(`${host.group}.runner.busy is malformed`);
                }
                if (
                  Object.hasOwn(runner, "ephemeral") &&
                  typeof runner.ephemeral !== "boolean"
                ) {
                  invalid(`${host.group}.runner.ephemeral is malformed`);
                }
                if (runner.ephemeral === false) {
                  invalid(`${host.group} contains an explicitly persistent runner`);
                }
                if (!Array.isArray(runner.labels) || runner.labels.length === 0) {
                  invalid(`${host.group}.runner.labels is malformed`);
                }

                const labels = [];
                const labelKeys = new Set();
                for (const label of runner.labels) {
                  if (!label || typeof label !== "object" || Array.isArray(label)) {
                    invalid(`${host.group}.runner.labels contains a malformed label`);
                  }
                  const labelName = assertSafeString(
                    label.name,
                    `${host.group}.runner.label.name`,
                  );
                  const key = labelName.toLowerCase();
                  if (!labelKeys.has(key)) {
                    labelKeys.add(key);
                    labels.push(labelName);
                  }
                }
                if (!labelKeys.has(PRODUCTION_LABEL.toLowerCase())) {
                  invalid(
                    `${host.group} contains a runner without the production routing label`,
                  );
                }

                labels.sort((left, right) => left.localeCompare(right, "en"));
                return Object.freeze({
                  id,
                  name,
                  os,
                  status: runner.status,
                  busy: runner.busy,
                  ephemeral: Object.hasOwn(runner, "ephemeral") ? runner.ephemeral : null,
                  labels: Object.freeze(labels),
                });
              }

              function assertUniqueIds(items, field) {
                const seen = new Set();
                for (const item of items) {
                  if (seen.has(item.id)) {
                    invalid(`${field} contains duplicate id ${item.id}`);
                  }
                  seen.add(item.id);
                }
              }

              function repositorySetKey(repositories) {
                return repositories.map(({ id, fullName }) => `${id}:${fullName}`).join("\n");
              }

              async function fetchTopology(request) {
                const groups = await listAll(
                  request,
                  "GET /orgs/{org}/actions/runner-groups",
                  { org: ORGANIZATION },
                  "runner_groups",
                );
                const groupIds = groups.map((group) => ({ id: group?.id }));
                for (const item of groupIds) {
                  assertPositiveInteger(item.id, "runner_group.id");
                }
                assertUniqueIds(groupIds, "runner groups");

                const evidenceGroups = [];
                const seenRunnerIds = new Set();
                for (const host of HOSTS) {
                  const matches = groups.filter((group) => group?.name === host.group);
                  if (matches.length !== 1) {
                    invalid(`expected exactly one ${host.group} group`);
                  }
                  const group = matches[0];
                  validateGroup(group, host);

                  const repositories = (
                    await listAll(
                      request,
                      "GET /orgs/{org}/actions/runner-groups/{runner_group_id}/repositories",
                      { org: ORGANIZATION, runner_group_id: group.id },
                      "repositories",
                    )
                  )
                    .map((repository) => validateRepository(repository, host.group))
                    .sort((left, right) => left.id - right.id);
                  assertUniqueIds(repositories, `${host.group} repositories`);

                  const runners = (
                    await listAll(
                      request,
                      "GET /orgs/{org}/actions/runner-groups/{runner_group_id}/runners",
                      { org: ORGANIZATION, runner_group_id: group.id },
                      "runners",
                    )
                  )
                    .map((runner) => validateRunner(runner, host))
                    .sort((left, right) => left.id - right.id);
                  assertUniqueIds(runners, `${host.group} runners`);
                  for (const runner of runners) {
                    if (seenRunnerIds.has(runner.id)) {
                      invalid(`runner ${runner.id} appears in both production groups`);
                    }
                    seenRunnerIds.add(runner.id);
                  }

                  evidenceGroups.push(
                    Object.freeze({
                      host: host.id,
                      group: Object.freeze({
                        id: group.id,
                        name: group.name,
                        visibility: group.visibility,
                        default: group.default,
                        inherited: group.inherited,
                        allowsPublicRepositories: group.allows_public_repositories,
                        restrictedToWorkflows: group.restricted_to_workflows,
                        selectedWorkflows: Object.freeze([]),
                      }),
                      selectedRepositories: Object.freeze(repositories),
                      runners: Object.freeze(runners),
                      onlineCount: runners.filter(({ status }) => status === "online").length,
                      idleCount: runners.filter(
                        ({ status, busy }) => status === "online" && !busy,
                      ).length,
                    }),
                  );
                }

                if (evidenceGroups[0].group.id === evidenceGroups[1].group.id) {
                  invalid("desktop and laptop must have distinct runner-group IDs");
                }
                const expectedRepositorySet = repositorySetKey(
                  evidenceGroups[0].selectedRepositories,
                );
                if (
                  repositorySetKey(evidenceGroups[1].selectedRepositories) !==
                  expectedRepositorySet
                ) {
                  invalid(
                    "production groups do not expose identical selected-repository sets",
                  );
                }
                if (
                  !evidenceGroups[0].selectedRepositories.some(
                    ({ fullName }) => fullName === PROOF_REPOSITORY,
                  )
                ) {
                  invalid("production groups do not expose the private proof repository");
                }

                return Object.freeze({ groups: Object.freeze(evidenceGroups) });
              }

              function stateForMode(mode) {
                switch (mode) {
                  case "inventory":
                  case "failover":
                    return Object.freeze({ "melo-desk-001": "idle", "melo-lap-001": "idle" });
                  case "desktop-only":
                    return Object.freeze({
                      "melo-desk-001": "idle",
                      "melo-lap-001": "drained",
                    });
                  case "laptop-only":
                  case "laptop-power":
                    return Object.freeze({
                      "melo-desk-001": "drained",
                      "melo-lap-001": "idle",
                    });
                  default:
                    throw new ProofError(
                      "invalid-input",
                      "unsupported production proof mode",
                    );
                }
              }

              function assertMode(topology, mode) {
                if (!ACCEPTED_MODES.has(mode)) {
                  throw new ProofError("invalid-input", "unsupported production proof mode");
                }
                const expected = stateForMode(mode);
                for (const group of topology.groups) {
                  const state = expected[group.host];
                  if (state === "idle" && group.idleCount < 1) {
                    throw new ProofError(
                      "topology-not-ready",
                      `${group.host} has no online idle production runner`,
                    );
                  }
                  if (state === "drained" && group.onlineCount !== 0) {
                    throw new ProofError(
                      "topology-not-ready",
                      `${group.host} still has online production runners`,
                    );
                  }
                }
                return expected;
              }

              function observation(topology, now) {
                return Object.freeze({
                  observedAt: new Date(now()).toISOString(),
                  desktopOnline: topology.groups[0].onlineCount,
                  desktopIdle: topology.groups[0].idleCount,
                  laptopOnline: topology.groups[1].onlineCount,
                  laptopIdle: topology.groups[1].idleCount,
                });
              }

              async function waitForDesktopDrain({
                request,
                maxWaitMinutes,
                now = Date.now,
                sleep = (milliseconds) =>
                  new Promise((resolve) => setTimeout(resolve, milliseconds)),
                onObservation = () => {},
              }) {
                if (
                  !Number.isSafeInteger(maxWaitMinutes) ||
                  maxWaitMinutes < 5 ||
                  maxWaitMinutes > 25
                ) {
                  throw new ProofError("invalid-input", "drain wait must be 5-25 minutes");
                }
                const startedAt = now();
                const deadline = startedAt + maxWaitMinutes * 60_000;
                const observations = [];
                let stable = 0;

                while (true) {
                  const topology = await fetchTopology(request);
                  const current = observation(topology, now);
                  observations.push(current);
                  onObservation(current);
                  if (current.desktopOnline === 0 && current.laptopIdle >= 1) {
                    stable += 1;
                  } else {
                    stable = 0;
                  }
                  if (stable >= REQUIRED_STABLE_DRAIN_OBSERVATIONS) {
                    return Object.freeze({
                      startedAt: new Date(startedAt).toISOString(),
                      completedAt: current.observedAt,
                      observations: Object.freeze(observations),
                      topology,
                    });
                  }
                  if (now() >= deadline) {
                    throw new ProofError(
                      "drain-timeout",
                      "desktop did not remain drained while laptop idle capacity stayed available",
                      Object.freeze({
                        startedAt: new Date(startedAt).toISOString(),
                        observations: Object.freeze(observations),
                      }),
                    );
                  }
                  await sleep(POLL_INTERVAL_MILLISECONDS);
                }
              }

              function requiredEnvironment(env, name, pattern = undefined) {
                const value = env[name];
                if (typeof value !== "string" || value === "") {
                  throw new ProofError("invalid-input", `${name} is required`);
                }
                if (pattern && !pattern.test(value)) {
                  throw new ProofError("invalid-input", `${name} is malformed`);
                }
                return value;
              }

              function commonEvidence(env, now) {
                return {
                  schemaVersion: 1,
                  generatedAt: new Date(now()).toISOString(),
                  organization: ORGANIZATION,
                  repository: PROOF_REPOSITORY,
                  callerWorkflow: PROOF_CALLER_WORKFLOW,
                  run: {
                    id: requiredEnvironment(env, "RUN_ID", /^\d+$/u),
                    attempt: Number(requiredEnvironment(env, "RUN_ATTEMPT", /^1$/u)),
                    url: requiredEnvironment(env, "RUN_URL", /^https:\/\/github\.com\//u),
                  },
                  source: {
                    apiVersion: API_VERSION,
                    endpoints: [
                      "GET /orgs/{org}/actions/runner-groups",
                      "GET /orgs/{org}/actions/runner-groups/{runner_group_id}/repositories",
                      "GET /orgs/{org}/actions/runner-groups/{runner_group_id}/runners",
                    ],
                  },
                  limitations: {
                    restGroupIdIsScaleSetId: false,
                    scaleSetIdObserved: false,
                    controllerCapacityObserved: false,
                    batteryOrLogonStateObserved: false,
                  },
                };
              }

              function writeEvidence(path, evidence) {
                fs.writeFileSync(path, `${JSON.stringify(evidence, null, 2)}\n`, {
                  encoding: "utf8",
                  mode: 0o600,
                });
              }

              function appendSummary(path, lines) {
                fs.appendFileSync(path, `${lines.join("\n")}\n`, "utf8");
              }

              function safeFailure(error) {
                const proofError = apiFailure(error);
                return Object.freeze({ code: proofError.code, message: proofError.message });
              }

              async function runGitHubScript({ github, core, env, now = Date.now, sleep }) {
                const phase = requiredEnvironment(
                  env,
                  "PHASE",
                  /^(inventory|wait-desktop-drain)$/u,
                );
                const evidencePath = requiredEnvironment(env, "EVIDENCE_PATH");
                const summaryPath = requiredEnvironment(
                  { SUMMARY_PATH: env.SUMMARY_PATH || env.GITHUB_STEP_SUMMARY },
                  "SUMMARY_PATH",
                );
                const base = commonEvidence(env, now);

                try {
                  if (phase === "inventory") {
                    const mode = requiredEnvironment(
                      env,
                      "MODE",
                      /^(inventory|desktop-only|laptop-only|failover|laptop-power)$/u,
                    );
                    const topology = await fetchTopology(github.request);
                    const expectedState = assertMode(topology, mode);
                    const evidence = {
                      ...base,
                      phase,
                      mode,
                      status: "passed",
                      expectedState,
                      routingLabel: PRODUCTION_LABEL,
                      topology,
                    };
                    writeEvidence(evidencePath, evidence);
                    appendSummary(summaryPath, [
                      "### Production runner topology passed",
                      "",
                      `- Mode: \`${mode}\``,
                      `- Desktop group: \`${topology.groups[0].group.name}\` (REST group ID ${topology.groups[0].group.id}; ${topology.groups[0].onlineCount} online, ${topology.groups[0].idleCount} idle)`,
                      `- Laptop group: \`${topology.groups[1].group.name}\` (REST group ID ${topology.groups[1].group.id}; ${topology.groups[1].onlineCount} online, ${topology.groups[1].idleCount} idle)`,
                      `- Identical private repository access: ${topology.groups[0].selectedRepositories.map(({ fullName }) => `\`${fullName}\``).join(", ")}`,
                      "- REST group IDs prove independent groups; they are not scale-set IDs.",
                    ]);
                    core.setOutput("desktop-idle", String(topology.groups[0].idleCount));
                    core.setOutput("laptop-idle", String(topology.groups[1].idleCount));
                    return evidence;
                  }

                  const selector = Object.freeze({
                    runner: requiredEnvironment(env, "SELECTED_RUNNER"),
                    route: requiredEnvironment(env, "SELECTED_ROUTE"),
                    reason: requiredEnvironment(env, "SELECTED_REASON"),
                    idleRunnerCount: Number(
                      requiredEnvironment(env, "SELECTED_IDLE_COUNT", /^[1-9]\d*$/u),
                    ),
                  });
                  if (
                    selector.runner !== PRODUCTION_LABEL ||
                    selector.route !== "self-hosted" ||
                    selector.reason !== "idle"
                  ) {
                    throw new ProofError(
                      "invalid-input",
                      "hosted hold did not receive the exact successful selector outputs",
                    );
                  }
                  const maxWaitMinutes = Number(
                    requiredEnvironment(env, "MAX_WAIT_MINUTES", /^(?:[5-9]|1\d|2[0-5])$/u),
                  );
                  const result = await waitForDesktopDrain({
                    request: github.request,
                    maxWaitMinutes,
                    now,
                    sleep,
                    onObservation: (current) =>
                      core.info(
                        `read-only drain observation: desktop online=${current.desktopOnline}; laptop idle=${current.laptopIdle}; observed=${current.observedAt}`,
                      ),
                  });
                  const evidence = {
                    ...base,
                    phase,
                    mode: "failover",
                    status: "passed",
                    selector,
                    stableObservationsRequired: REQUIRED_STABLE_DRAIN_OBSERVATIONS,
                    pollIntervalSeconds: POLL_INTERVAL_MILLISECONDS / 1000,
                    result,
                  };
                  writeEvidence(evidencePath, evidence);
                  appendSummary(summaryPath, [
                    "### Hosted failover hold passed",
                    "",
                    `- Selector completed first with \`${selector.runner}\` and ${selector.idleRunnerCount} idle runners.`,
                    "- Desktop then remained at zero online runners for two observations.",
                    "- Laptop retained at least one online idle runner.",
                    "- The next governed job must still assert the acquired laptop identity.",
                  ]);
                  return evidence;
                } catch (error) {
                  const failure = safeFailure(error);
                  writeEvidence(evidencePath, {
                    ...base,
                    phase,
                    status: "failed",
                    failure,
                    observations: error instanceof ProofError ? error.evidence : undefined,
                  });
                  throw new ProofError(failure.code, failure.message);
                }
              }

              module.exports = Object.freeze({
                ACCEPTED_MODES,
                API_VERSION,
                HOSTS,
                ORGANIZATION,
                POLL_INTERVAL_MILLISECONDS,
                PRODUCTION_LABEL,
                PROOF_CALLER_WORKFLOW,
                PROOF_REPOSITORY,
                ProofError,
                assertMode,
                fetchTopology,
                listAll,
                runGitHubScript,
                waitForDesktopDrain,
              });
              return module.exports;
            })();
            await productionHaModule.runGitHubScript({github, core, env: process.env});
            // END GENERATED PRODUCTION HA DRAIN HOLD
      - name: Upload sanitized failover-hold evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-ha-drain-hold-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/production-ha-drain-hold.json
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}

  production-execution:
    name: Prove production acquisition
    if: >-
      ${{ always() &&
      inputs.mode != 'inventory' &&
      needs.select-production-runner.result == 'success' &&
      needs.validate-selection.result == 'success' &&
      (inputs.mode != 'failover' || needs.failover-hold.result == 'success') }}
    needs: [select-production-runner, validate-selection, failover-hold]
    runs-on: ${{ needs.select-production-runner.outputs.runner }}
    timeout-minutes: 35
    permissions: {}
    steps:
      - name: Assert exact acquired production host
        id: identity
        shell: bash
        env:
          EXPECTED_HOST: ${{ inputs.mode == 'desktop-only' && 'melo-desk-001' || 'melo-lap-001' }}
          RUNNER_ARCH: ${{ runner.arch }}
          RUNNER_ENVIRONMENT: ${{ runner.environment }}
          RUNNER_NAME: ${{ runner.name }}
          RUNNER_OS: ${{ runner.os }}
          SELECTED_RUNNER: ${{ needs.select-production-runner.outputs.runner }}
        run: |
          fail() { echo "::error::$1"; exit 1; }
          [[ "$SELECTED_RUNNER" = melodic-ubuntu-24.04-x64 ]] || fail "execution did not consume the governed selector label"
          [[ "$RUNNER_ENVIRONMENT" = self-hosted ]] || fail "runner.environment is not self-hosted"
          [[ "$RUNNER_OS" = Linux ]] || fail "runner.os is not Linux"
          [[ "$RUNNER_ARCH" = X64 ]] || fail "runner.arch is not X64"
          [[ "$RUNNER_NAME" =~ ^[A-Za-z0-9._-]{1,128}$ ]] || fail "runner.name is malformed"
          case "$EXPECTED_HOST" in
            melo-desk-001)
              [[ "$RUNNER_NAME" == ci-runner-melo-desk-001-* ]] || fail "desktop-only proof acquired another host"
              ;;
            melo-lap-001)
              [[ "$RUNNER_NAME" == ci-runner-melo-lap-001-* ]] || fail "laptop proof acquired another host"
              ;;
            *) fail "unexpected proof host" ;;
          esac
          echo "host=$EXPECTED_HOST" >>"$GITHUB_OUTPUT"
          echo "name=$RUNNER_NAME" >>"$GITHUB_OUTPUT"
      - name: Record sanitized acquisition evidence
        shell: bash
        env:
          ACQUIRED_HOST: ${{ steps.identity.outputs.host }}
          ACQUIRED_RUNNER: ${{ steps.identity.outputs.name }}
          EVIDENCE_PATH: ${{ runner.temp }}/production-ha-acquisition.json
          PROOF_MODE: ${{ inputs.mode }}
        run: |
          container_id=$(</etc/hostname)
          [[ "$container_id" =~ ^[A-Za-z0-9._-]{1,128}$ ]]
          observed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          printf '{\n  "schemaVersion": 1,\n  "status": "passed",\n  "mode": "%s",\n  "observedAt": "%s",\n  "runId": "%s",\n  "runAttempt": %s,\n  "job": "%s",\n  "runner": {"name": "%s", "host": "%s", "environment": "self-hosted", "os": "Linux", "arch": "X64", "containerId": "%s"}\n}\n' \
            "$PROOF_MODE" "$observed_at" "$GITHUB_RUN_ID" "$GITHUB_RUN_ATTEMPT" "$GITHUB_JOB" \
            "$ACQUIRED_RUNNER" "$ACQUIRED_HOST" "$container_id" >"$EVIDENCE_PATH"
          {
            echo "### Production acquisition passed"
            echo
            echo "- Mode: \`${PROOF_MODE}\`"
            echo "- Runner: \`${ACQUIRED_RUNNER}\`"
            echo "- Host: \`${ACQUIRED_HOST}\`"
            echo "- Runtime: self-hosted Linux X64"
            echo "- Container: \`${container_id}\`"
          } >>"$GITHUB_STEP_SUMMARY"
      - name: Record laptop power-survival heartbeats
        if: inputs.mode == 'laptop-power'
        shell: bash
        env:
          ACQUIRED_RUNNER: ${{ steps.identity.outputs.name }}
          HEARTBEAT_PATH: ${{ runner.temp }}/production-ha-laptop-heartbeats.jsonl
          PROOF_MINUTES: ${{ inputs.laptop-proof-minutes }}
        run: |
          started=$(date +%s)
          minimum=$((PROOF_MINUTES * 60))
          sequence=0
          while :; do
            now=$(date +%s)
            elapsed=$((now - started))
            observed_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
            printf '{"schemaVersion":1,"event":"heartbeat","sequence":%s,"observedAt":"%s","elapsedSeconds":%s,"runId":"%s","runnerName":"%s","host":"melo-lap-001"}\n' \
              "$sequence" "$observed_at" "$elapsed" "$GITHUB_RUN_ID" "$ACQUIRED_RUNNER" >>"$HEARTBEAT_PATH"
            echo "power-proof heartbeat sequence=$sequence elapsed=${elapsed}s observed=$observed_at"
            if (( elapsed >= minimum )); then
              break
            fi
            remaining=$((minimum - elapsed))
            sleep_for=15
            if (( remaining < sleep_for )); then
              sleep_for=$remaining
            fi
            sleep "$sleep_for"
            sequence=$((sequence + 1))
          done
          final_elapsed=$(($(date +%s) - started))
          test "$final_elapsed" -ge "$minimum"
          {
            echo "### Laptop heartbeat proof completed"
            echo
            echo "The already-acquired laptop job remained alive for ${final_elapsed} seconds."
            echo "Correlate its UTC heartbeats with external controller status and Windows power evidence."
          } >>"$GITHUB_STEP_SUMMARY"
      - name: Upload sanitized acquisition evidence
        if: ${{ always() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-ha-acquisition-${{ inputs.mode }}-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/production-ha-acquisition.json
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}
      - name: Upload sanitized laptop heartbeat evidence
        if: ${{ always() && inputs.mode == 'laptop-power' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-ha-laptop-heartbeats-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/production-ha-laptop-heartbeats.jsonl
          if-no-files-found: error
          retention-days: ${{ inputs.artifact-retention-days }}
