name: issue-triage-label-self

# Applies the floor label `priority: needs-triage` to an issue opened or
# reopened with no `priority:*` label. Dogfood caller of this repo's own
# issue-triage-label reusable (pinned to its merged SHA, not a PR head — the
# reusable's own security/logic surface is not redefinable by the caller
# introducing it). Uses this repo's real `priority: needs-triage` label, so
# this is a genuine end-to-end exercise of the reusable's label-set guard and
# fail-closed existence check, not a stub. `reopened` is included alongside
# `opened` so an issue reopened after its tier was cleared re-acquires the
# floor.
on:
  issues:
    types: [opened, reopened]

permissions: {}

jobs:
  issue-triage-label:
    permissions:
      issues: write # Downgraded to exactly what the called reusable needs.
    uses: melodic-software/ci-workflows/.github/workflows/issue-triage-label.yml@c5e729c0af0e55ffed4675ec85c1b57356fef79e # c5e729c 2026-07-21
